<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Positions Library</title>
    <style>
        html { min-height:100%; background:linear-gradient(180deg,#0f1c3f,#0a122b); }
        body { margin:0; min-height:100vh; font-family:Arial,sans-serif; background:linear-gradient(180deg,#0f1c3f,#0a122b); color:#fff; }
        .fullscreen-btn { position:fixed; top:10px; right:10px; z-index:1200; width:34px; height:34px; border:1px solid #3659bb; border-radius:10px; background:rgba(28,51,128,.92); color:#fff; font-size:16px; font-weight:700; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .page { width:min(1440px,95%); margin:20px auto 28px; }
        .topbar { display:flex; justify-content:space-between; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:16px; }
        .title { font-size:46px; font-weight:700; margin:0; }
        .sub { margin-top:8px; opacity:.76; font-size:17px; }
        .actions { display:flex; gap:10px; flex-wrap:wrap; }
        .btn { border:none; border-radius:12px; padding:12px 16px; background:#1c3380; border:1px solid #3659bb; color:#fff; font-size:16px; font-weight:700; cursor:pointer; }
        .btn.primary { background:#2f4fe0; }
        .btn.danger { background:#9f3434; border-color:#be5757; }
        .card { background:linear-gradient(180deg,#162b66,#0f1c3f); border:1px solid #2d488f; border-radius:22px; box-shadow:0 24px 56px rgba(0,0,0,.45); overflow:hidden; }
        .section { padding:16px; border-bottom:1px solid #27417f; }
        .section:last-child { border-bottom:none; }
        .section-title { font-size:20px; font-weight:800; margin:0 0 8px; }
        .section-sub { font-size:13px; opacity:.76; margin-bottom:12px; }
        .notice { padding:12px 14px; border-radius:14px; border:1px solid #556db2; background:rgba(20,38,89,.78); font-size:14px; line-height:1.5; margin-bottom:12px; display:none; }
        .chips { display:flex; gap:8px; flex-wrap:wrap; }
        .chip { padding:10px 14px; border:none; border-radius:999px; background:#1c3380; color:#fff; font-size:14px; font-weight:700; cursor:pointer; border:1px solid #2f4ea0; }
        .chip.active { background:#ffd84a; color:#101420; border-color:#ffe27a; }
        .list { display:grid; gap:12px; }
        .item { border:1px solid #3557b7; border-radius:18px; background:rgba(12,28,72,.72); padding:14px; display:grid; gap:12px; }
        .item-top { display:flex; justify-content:space-between; gap:12px; align-items:flex-start; }
        .item-title { font-size:18px; font-weight:800; }
        .item-sub { font-size:13px; opacity:.76; margin-top:4px; }
        .item-actions { display:flex; gap:8px; flex-wrap:wrap; }
        .item-body { display:grid; grid-template-columns:minmax(0,1fr) 280px; gap:14px; align-items:start; }
        .thumb-wrap { position:relative; width:280px; min-width:280px; border-radius:16px; overflow:hidden; background:#f7f7f4; aspect-ratio:1200/674; box-shadow:0 10px 24px rgba(0,0,0,.18); }
        .thumb-stage { position:absolute; inset:0; }
        .thumb-bg, .thumb-lines, .thumb-balls { position:absolute; top:50%; left:50%; width:56.1667%; height:178.0415%; transform:translate(-50%,-50%) rotate(90deg); transform-origin:center; }
        .thumb-bg { object-fit:cover; display:block; }
        .thumb-lines, .thumb-balls { display:block; }
        .empty { padding:14px; border-radius:14px; border:1px dashed rgba(255,255,255,.18); opacity:.74; }
        @media (max-width: 980px) { .item-body { grid-template-columns:1fr; } .thumb-wrap { width:100%; min-width:0; } }
    </style>
</head>
<body>
    <button id="fullscreenBtn" class="fullscreen-btn" type="button" onclick="toggleFullscreen()">⛶</button>
    <div class="page">
        <div class="topbar">
            <div>
                <h1 class="title">Positions Library</h1>
                <div class="sub">Deine gespeicherten Positionen mit Disziplin-Filter, Beschreibung und Vorschau.</div>
            </div>
            <div class="actions">
                <button class="btn primary" type="button" onclick="window.location.href='training_position_library_editor.html'">Neu</button>
                <button class="btn" type="button" onclick="window.location.href='training.html'">Zurück</button>
            </div>
        </div>

        <div class="card">
            <div class="section">
                <div id="noticeBox" class="notice"></div>
                <h2 class="section-title">Filter</h2>
                <div class="section-sub">Die Library startet jetzt ohne parallelen Editor. `Neu` oder `Bearbeiten` öffnet die eigene Anlegeseite.</div>
                <div class="chips" id="filterButtons"></div>
            </div>
            <div class="section">
                <div id="libraryList" class="list"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/user_menu.js"></script>
    <script>
        const disciplines = ["Alle", "Freie Partie", "Cadre 35/2", "Cadre 52/2", "Cadre 47/2", "Cadre 47/1", "Cadre 71/2", "Einband", "Dreiband"];
        const tableTemplates = { "Cadre 47/2": "assets/grosser-tisch-47-2.png", "Cadre 71/2": "assets/mb-71-2.png" };
        const defaultLayout = {
            red: { x: 236, y: 166 },
            yellow: { x: 259, y: 214 },
            white: { x: 232, y: 201 }
        };
        let currentUser = null;
        let activeFilter = "Alle";
        let libraryItems = [];

        function setNotice(text) {
            const box = document.getElementById("noticeBox");
            box.style.display = text ? "block" : "none";
            box.innerText = text || "";
        }
        function updateFullscreenButton() {
            const btn = document.getElementById("fullscreenBtn");
            if (!btn) return;
            btn.innerText = document.fullscreenElement ? "×" : "⛶";
        }
        async function toggleFullscreen() {
            try {
                if (document.fullscreenElement) await document.exitFullscreen();
                else await document.documentElement.requestFullscreen();
            } catch (_) {}
            updateFullscreenButton();
        }
        function getTemplateForDiscipline(discipline) { return tableTemplates[discipline] || "assets/grosser-tisch-47-2.png"; }
        function setFilter(value) {
            activeFilter = value || "Alle";
            document.querySelectorAll("#filterButtons .chip").forEach((btn) => btn.classList.toggle("active", btn.dataset.value === activeFilter));
            renderLibrary();
        }
        function buildFilterButtons() {
            const wrap = document.getElementById("filterButtons");
            wrap.innerHTML = "";
            disciplines.forEach((discipline) => {
                const btn = document.createElement("button");
                btn.className = "chip";
                btn.dataset.value = discipline;
                btn.innerText = discipline;
                btn.onclick = () => setFilter(discipline);
                wrap.appendChild(btn);
            });
            setFilter(activeFilter);
        }
        function renderThumbBallMarkup(layout) {
            return `
                <g transform="translate(${layout.red.x} ${layout.red.y})"><circle r="12" fill="#e02f2f"></circle></g>
                <g transform="translate(${layout.yellow.x} ${layout.yellow.y})"><circle r="12" fill="#ffe500"></circle></g>
                <g transform="translate(${layout.white.x} ${layout.white.y})"><circle r="12" fill="#fbfbfb" stroke="#7d7d7d" stroke-width="1.2"></circle></g>
            `;
        }
        function escapeHtml(value) {
            return String(value || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
        }
        function formatDate(value) {
            const date = new Date(value);
            return Number.isNaN(date.getTime()) ? "-" : date.toLocaleString("de-DE", { dateStyle: "short", timeStyle: "short" });
        }
        function renderLibrary() {
            const wrap = document.getElementById("libraryList");
            const visible = libraryItems.filter((item) => activeFilter === "Alle" || item.discipline === activeFilter);
            if (!visible.length) {
                wrap.innerHTML = `<div class="empty">Noch keine Position gespeichert${activeFilter !== "Alle" ? " für " + activeFilter : ""}.</div>`;
                return;
            }
            wrap.innerHTML = "";
            visible.forEach((item) => {
                const layout = item.ball_layout || defaultLayout;
                const lines = Array.isArray(item.line_paths) ? item.line_paths : [];
                const card = document.createElement("div");
                card.className = "item";
                card.innerHTML = `<div class="item-top"><div><div class="item-title">${escapeHtml(item.title || "Ohne Titel")}</div><div class="item-sub">${escapeHtml(item.discipline || "-")} • ${formatDate(item.updated_at)}${lines.length ? " • " + lines.length + " Linie" + (lines.length === 1 ? "" : "n") : ""}</div></div><div class="item-actions"><button class="btn" type="button" data-edit="${item.id}">Bearbeiten</button><button class="btn danger" type="button" data-delete="${item.id}">Löschen</button></div></div><div class="item-body"><div>${item.description ? escapeHtml(item.description).replace(/\n/g, "<br>") : '<span style="opacity:.68;">Keine Beschreibung</span>'}</div><div class="thumb-wrap"><div class="thumb-stage"><img class="thumb-bg" src="${getTemplateForDiscipline(item.discipline)}" alt="Position"><svg class="thumb-lines" viewBox="0 0 674 1200">${lines.map((line) => { const pts = Array.isArray(line.points) ? line.points.map((pt) => `${pt.x},${pt.y}`).join(" ") : ""; return pts ? `<polyline points="${pts}" fill="none" stroke="#7fd8ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"></polyline>` : ""; }).join("")}</svg><svg class="thumb-balls" viewBox="0 0 674 1200">${renderThumbBallMarkup(layout)}</svg></div></div></div>`;
                card.querySelector("[data-edit]").onclick = () => { window.location.href = "training_position_library_editor.html?id=" + encodeURIComponent(item.id); };
                card.querySelector("[data-delete]").onclick = () => deletePosition(item.id);
                wrap.appendChild(card);
            });
        }
        async function loadLibrary() {
            const { data, error } = await supabaseClient
                .from("training_position_library")
                .select("*")
                .eq("user_id", currentUser.id)
                .order("updated_at", { ascending: false });
            if (error) {
                setNotice("Die Positions-Library ist in Supabase noch nicht aktiv. Bitte SQL aus sql/training_position_library.sql ausführen.");
                libraryItems = [];
                renderLibrary();
                return;
            }
            setNotice("");
            libraryItems = data || [];
            renderLibrary();
        }
        async function deletePosition(id) {
            if (!id) return;
            if (!confirm("Diese Position wirklich löschen?")) return;
            const { error } = await supabaseClient.from("training_position_library").delete().eq("id", id).eq("user_id", currentUser.id);
            if (error) {
                alert("Position konnte nicht gelöscht werden: " + error.message);
                return;
            }
            await loadLibrary();
        }
        async function init() {
            currentUser = await requireAuth();
            if (!currentUser) return;
            buildFilterButtons();
            await loadLibrary();
        }
        document.addEventListener("fullscreenchange", updateFullscreenButton);
        updateFullscreenButton();
        init();
    </script>
</body>
</html>
