<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Positions Library</title>
    <style>
        html { min-height:100%; background:linear-gradient(180deg,#0f1c3f,#0a122b); }
        body { margin:0; min-height:100vh; font-family:Arial,sans-serif; background:linear-gradient(180deg,#0f1c3f,#0a122b); color:#fff; }
        .fullscreen-btn { position:fixed; top:10px; right:10px; z-index:1200; width:34px; height:34px; border:1px solid #3659bb; border-radius:10px; background:rgba(28,51,128,.92); color:#fff; font-size:16px; font-weight:700; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .page { width:min(1500px,96%); margin:16px auto 24px; }
        .topbar { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
        .title { font-size:46px; font-weight:700; margin:0; }
        .sub { margin-top:6px; opacity:.76; font-size:16px; }
        .actions { display:flex; gap:8px; flex-wrap:wrap; }
        .btn { border:none; border-radius:10px; padding:10px 13px; background:#1c3380; border:1px solid #3659bb; color:#fff; font-size:14px; font-weight:700; cursor:pointer; }
        .btn.primary { background:#2f4fe0; }
        .btn.danger { background:#9f3434; border-color:#be5757; }
        .card { background:linear-gradient(180deg,#162b66,#0f1c3f); border:1px solid #2d488f; border-radius:22px; box-shadow:0 24px 56px rgba(0,0,0,.45); overflow:hidden; }
        .section { padding:14px; border-bottom:1px solid #27417f; }
        .section:last-child { border-bottom:none; }
        .section-title { font-size:18px; font-weight:800; margin:0 0 6px; }
        .section-sub { font-size:12px; opacity:.76; margin-bottom:10px; }
        .notice { padding:12px 14px; border-radius:14px; border:1px solid #556db2; background:rgba(20,38,89,.78); font-size:14px; line-height:1.5; margin-bottom:12px; display:none; }
        .notice.warn { border-color:#b89a35; background:rgba(94,73,10,.35); color:#ffe7a0; }
        .chips { display:flex; gap:8px; flex-wrap:wrap; }
        .chip { padding:8px 11px; border:none; border-radius:999px; background:#1c3380; color:#fff; font-size:13px; font-weight:700; cursor:pointer; border:1px solid #2f4ea0; }
        .chip.active { background:#ffd84a; color:#101420; border-color:#ffe27a; }
        .filter-group { margin-top:10px; }
        .filter-label { font-size:12px; opacity:.72; margin:0 0 7px; font-weight:700; }
        .list { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:10px; }
        .item { border:1px solid #3557b7; border-radius:16px; background:rgba(12,28,72,.72); padding:10px; display:grid; gap:8px; }
        .item-top { display:flex; justify-content:space-between; gap:8px; align-items:flex-start; }
        .item-title { font-size:16px; font-weight:800; }
        .item-sub { font-size:12px; opacity:.76; margin-top:3px; }
        .item-meta { font-size:12px; opacity:.72; margin-top:4px; }
        .item-tags { display:flex; flex-wrap:wrap; gap:5px; margin-top:6px; }
        .item-tag { border:1px solid #4864bf; background:#172f72; color:#dce5ff; border-radius:999px; padding:4px 7px; font-size:11px; font-weight:700; }
        .item-check { display:flex; align-items:center; justify-content:center; min-width:28px; }
        .item-check input { width:18px; height:18px; accent-color:#ffd84a; cursor:pointer; }
        .item-body { display:grid; gap:8px; align-items:start; }
        .item-text { font-size:12px; line-height:1.35; opacity:.9; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; min-height:49px; }
        .thumb-wrap { position:relative; width:100%; min-width:0; border-radius:0; overflow:hidden; background:#f7f7f4; aspect-ratio:1200/674; box-shadow:0 8px 18px rgba(0,0,0,.16); cursor:pointer; }
        .thumb-wrap:hover { box-shadow:0 12px 24px rgba(0,0,0,.24); }
        .thumb-stage { position:absolute; inset:0; }
        .thumb-bg, .thumb-lines, .thumb-balls { position:absolute; top:50%; left:50%; width:56.1667%; height:178.0415%; transform:translate(-50%,-50%) rotate(90deg); transform-origin:center; }
        .thumb-bg { object-fit:cover; display:block; }
        .thumb-lines, .thumb-balls { display:block; }
        .empty { padding:14px; border-radius:14px; border:1px dashed rgba(255,255,255,.18); opacity:.74; }
        @media (max-width: 980px) { .list { grid-template-columns:repeat(auto-fill, minmax(220px, 1fr)); } .item-text { -webkit-line-clamp:4; } }
    </style>
</head>
<body>
    <button id="fullscreenBtn" class="fullscreen-btn" type="button" onclick="toggleFullscreen()">⛶</button>
    <div class="page">
        <div class="topbar">
            <div>
                <h1 class="title">Positions Library</h1>
            </div>
            <div class="actions">
                <button class="btn primary" id="newPositionBtn" type="button" onclick="window.location.href='training_position_library_editor.html'">Neu</button>
                <button class="btn danger" id="deleteSelectedBtn" type="button" onclick="deleteSelectedPositions()" style="display:none;">Auswahl löschen</button>
                <button class="btn" type="button" onclick="window.location.href='training.html'">Zurück</button>
            </div>
        </div>

        <div class="card">
            <div class="section">
                <div id="noticeBox" class="notice"></div>
                <div class="filter-group">
                    <div class="filter-label">Disziplin</div>
                    <div class="chips" id="filterButtons"></div>
                </div>
                <div class="filter-group" id="tagFilterGroup" style="display:none;">
                    <div class="filter-label">Tags</div>
                    <div class="chips" id="tagFilterButtons"></div>
                </div>
            </div>
            <div class="section">
                <div id="libraryList" class="list"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/position_library_access.js"></script>
    <script src="js/user_menu.js"></script>
    <script>
        const disciplines = ["Alle", "Freie Partie", "Cadre 35/2", "Cadre 52/2", "Cadre 47/2", "Cadre 47/1", "Cadre 71/2", "Einband", "Dreiband"];
        const tableTemplates = {
            "Freie Partie": "assets/discipline-mb-libre.png",
            "Cadre 35/2": "assets/discipline-tb-35.png",
            "Cadre 52/2": "assets/discipline-tb-52.png",
            "Cadre 47/2": "assets/discipline-mb-47.png",
            "Cadre 47/1": "assets/discipline-mb-47.png",
            "Cadre 71/2": "assets/discipline-mb-71.png",
            "Einband": "assets/discipline-mb-bande.png",
            "Dreiband": "assets/discipline-mb-bande.png"
        };
        const defaultLayout = {
            red: { x: 236, y: 166 },
            yellow: { x: 259, y: 214 },
            white: { x: 232, y: 201 }
        };
        const TABLE_RENDER_SPECS = {
            MB: { radius: 11.0, whiteStrokeWidth: 1.35 },
            TB: { radius: 14.9, whiteStrokeWidth: 1.86 }
        };
        let currentUser = null;
        let activeFilter = "Alle";
        let activeTagFilter = "Alle";
        let libraryItems = [];
        let selectedIds = new Set();
        let positionLibraryAccessMode = "edit";

        function setNotice(text, type) {
            const box = document.getElementById("noticeBox");
            box.style.display = text ? "block" : "none";
            box.className = "notice" + (type ? " " + type : "");
            box.innerText = text || "";
        }
        function updateFullscreenButton() {
            const btn = document.getElementById("fullscreenBtn");
            if (!btn) return;
            btn.innerText = document.fullscreenElement ? "×" : "⛶";
        }
        async function toggleFullscreen() {
            try {
                if (document.fullscreenElement) await document.exitFullscreen();
                else await document.documentElement.requestFullscreen();
            } catch (_) {}
            updateFullscreenButton();
        }
        function getTemplateForDiscipline(discipline) { return tableTemplates[discipline] || "assets/discipline-mb-47.png"; }
        function setFilter(value) {
            activeFilter = value || "Alle";
            document.querySelectorAll("#filterButtons .chip").forEach((btn) => btn.classList.toggle("active", btn.dataset.value === activeFilter));
            renderLibrary();
        }
        function normalizeTag(value) {
            return String(value || "").trim().replace(/[<>"']/g, "").replace(/\s+/g, " ").slice(0, 40);
        }
        function normalizeTags(value) {
            const source = Array.isArray(value) ? value : [];
            const seen = new Set();
            return source
                .map(normalizeTag)
                .filter(Boolean)
                .filter((tag) => {
                    const key = tag.toLowerCase();
                    if (seen.has(key)) return false;
                    seen.add(key);
                    return true;
                });
        }
        function hasMissingTagsColumn(error) {
            const message = String(error?.message || "");
            const details = String(error?.details || "");
            const hint = String(error?.hint || "");
            const code = String(error?.code || "");
            return message.includes("tags") || details.includes("tags") || hint.includes("tags") || code === "PGRST204";
        }
        function getAvailableTags() {
            return normalizeTags(libraryItems.flatMap((item) => Array.isArray(item.tags) ? item.tags : []))
                .sort((a, b) => a.localeCompare(b, "de"));
        }
        function setTagFilter(value) {
            activeTagFilter = value || "Alle";
            document.querySelectorAll("#tagFilterButtons .chip").forEach((btn) => btn.classList.toggle("active", btn.dataset.value === activeTagFilter));
            renderLibrary();
        }
        function buildTagFilterButtons() {
            const group = document.getElementById("tagFilterGroup");
            const wrap = document.getElementById("tagFilterButtons");
            if (!group || !wrap) return;
            const tags = getAvailableTags();
            if (!tags.length) {
                activeTagFilter = "Alle";
                group.style.display = "none";
                wrap.innerHTML = "";
                return;
            }
            group.style.display = "block";
            wrap.innerHTML = "";
            ["Alle", ...tags].forEach((tag) => {
                const btn = document.createElement("button");
                btn.className = "chip";
                btn.dataset.value = tag;
                btn.innerText = tag;
                btn.onclick = () => setTagFilter(tag);
                wrap.appendChild(btn);
            });
            if (activeTagFilter !== "Alle" && !tags.some((tag) => tag.toLowerCase() === activeTagFilter.toLowerCase())) {
                activeTagFilter = "Alle";
            }
            setTagFilter(activeTagFilter);
        }
        function buildFilterButtons() {
            const wrap = document.getElementById("filterButtons");
            wrap.innerHTML = "";
            disciplines.forEach((discipline) => {
                const btn = document.createElement("button");
                btn.className = "chip";
                btn.dataset.value = discipline;
                btn.innerText = discipline;
                btn.onclick = () => setFilter(discipline);
                wrap.appendChild(btn);
            });
            setFilter(activeFilter);
        }
        function getTableTypeForDiscipline(discipline) {
            return discipline === "Cadre 35/2" || discipline === "Cadre 52/2" ? "TB" : "MB";
        }
        function renderThumbBallMarkup(layout, discipline) {
            const spec = TABLE_RENDER_SPECS[getTableTypeForDiscipline(discipline)] || TABLE_RENDER_SPECS.MB;
            return `
                <g transform="translate(${layout.red.x} ${layout.red.y})"><circle r="${spec.radius}" fill="#e02f2f"></circle></g>
                <g transform="translate(${layout.yellow.x} ${layout.yellow.y})"><circle r="${spec.radius}" fill="#ffe500"></circle></g>
                <g transform="translate(${layout.white.x} ${layout.white.y})"><circle r="${spec.radius}" fill="#fbfbfb" stroke="#7d7d7d" stroke-width="${spec.whiteStrokeWidth}"></circle></g>
            `;
        }
        function escapeHtml(value) {
            return String(value || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#39;");
        }
        function formatDate(value) {
            const date = new Date(value);
            return Number.isNaN(date.getTime()) ? "-" : date.toLocaleString("de-DE", { dateStyle: "short", timeStyle: "short" });
        }
        function updateDeleteSelectedUi() {
            const button = document.getElementById("deleteSelectedBtn");
            if (!button) return;
            const canEdit = isPositionLibraryEditable(positionLibraryAccessMode);
            button.style.display = canEdit ? "inline-flex" : "none";
            button.disabled = !selectedIds.size;
            button.innerText = selectedIds.size ? `Auswahl löschen (${selectedIds.size})` : "Auswahl löschen";
        }
        function toggleSelection(id, checked) {
            if (!id) return;
            if (checked) selectedIds.add(id);
            else selectedIds.delete(id);
            updateDeleteSelectedUi();
        }
        function renderLibrary() {
            const wrap = document.getElementById("libraryList");
            const visible = libraryItems.filter((item) => {
                const tags = normalizeTags(item.tags || []);
                const disciplineMatches = activeFilter === "Alle" || item.discipline === activeFilter;
                const tagMatches = activeTagFilter === "Alle" || tags.some((tag) => tag.toLowerCase() === activeTagFilter.toLowerCase());
                return disciplineMatches && tagMatches;
            });
            if (!visible.length) {
                wrap.innerHTML = `<div class="empty">Noch keine Position gespeichert${activeFilter !== "Alle" ? " für " + activeFilter : ""}${activeTagFilter !== "Alle" ? " mit Tag " + activeTagFilter : ""}.</div>`;
                updateDeleteSelectedUi();
                return;
            }
            wrap.innerHTML = "";
            visible.forEach((item) => {
                const layout = item.ball_layout || defaultLayout;
                const lines = Array.isArray(item.line_paths) ? item.line_paths : [];
                const creatorName = escapeHtml(item.created_by_name || "Unbekannt");
                const tags = normalizeTags(item.tags || []);
                const tagsMarkup = tags.length ? `<div class="item-tags">${tags.map((tag) => `<span class="item-tag">${escapeHtml(tag)}</span>`).join("")}</div>` : "";
                const canEdit = isPositionLibraryEditable(positionLibraryAccessMode);
                const checkMarkup = canEdit
                    ? `<label class="item-check" title="Für Sammellöschen auswählen"><input type="checkbox" data-select="${item.id}" ${selectedIds.has(item.id) ? "checked" : ""}></label>`
                    : "";
                const card = document.createElement("div");
                card.className = "item";
                card.innerHTML = `<div class="item-top"><div><div class="item-title">${escapeHtml(item.title || "Ohne Titel")}</div><div class="item-sub">${escapeHtml(item.discipline || "-")} • ${formatDate(item.updated_at)}</div><div class="item-meta">Ersteller: ${creatorName}</div>${tagsMarkup}</div>${checkMarkup}</div><div class="item-body"><div class="thumb-wrap" data-open="${item.id}" title="Position öffnen"><div class="thumb-stage"><img class="thumb-bg" src="${getTemplateForDiscipline(item.discipline)}" alt="Position"><svg class="thumb-lines" viewBox="0 0 674 1200">${lines.map((line) => { const pts = Array.isArray(line.points) ? line.points.map((pt) => `${pt.x},${pt.y}`).join(" ") : ""; return pts ? `<polyline points="${pts}" fill="none" stroke="#7fd8ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"></polyline>` : ""; }).join("")}</svg><svg class="thumb-balls" viewBox="0 0 674 1200">${renderThumbBallMarkup(layout, item.discipline)}</svg></div></div><div class="item-text">${item.description ? escapeHtml(item.description).replace(/\n/g, "<br>") : '<span style="opacity:.68;">Keine Beschreibung</span>'}</div></div>`;
                card.querySelector("[data-open]").onclick = () => { window.location.href = "training_position_library_editor.html?id=" + encodeURIComponent(item.id); };
                const selectBox = card.querySelector("[data-select]");
                if (selectBox) {
                    selectBox.onchange = (event) => toggleSelection(item.id, !!event.target.checked);
                    selectBox.onclick = (event) => event.stopPropagation();
                }
                wrap.appendChild(card);
            });
            updateDeleteSelectedUi();
        }
        async function loadLibrary() {
            let query = supabaseClient
                .from("training_position_library")
                .select("id,title,discipline,updated_at,created_by_name,description,tags,ball_layout,line_paths")
                .order("updated_at", { ascending: false });
            if (isPositionLibraryEditable(positionLibraryAccessMode)) {
                query = query.eq("user_id", currentUser.id);
            }
            const { data, error } = await query;
            if (error) {
                if (!hasMissingTagsColumn(error)) {
                    setNotice("Die Positions-Library ist in Supabase noch nicht aktiv. Bitte SQL aus sql/training_position_library.sql ausführen.");
                    libraryItems = [];
                    buildTagFilterButtons();
                    renderLibrary();
                    return;
                }
                let fallbackQuery = supabaseClient
                    .from("training_position_library")
                    .select("id,title,discipline,updated_at,created_by_name,description,ball_layout,line_paths")
                    .order("updated_at", { ascending: false });
                if (isPositionLibraryEditable(positionLibraryAccessMode)) {
                    fallbackQuery = fallbackQuery.eq("user_id", currentUser.id);
                }
                const fallback = await fallbackQuery;
                if (fallback.error) {
                    setNotice("Die Positions-Library ist in Supabase noch nicht aktiv. Bitte SQL aus sql/training_position_library.sql ausführen.");
                    libraryItems = [];
                    buildTagFilterButtons();
                    renderLibrary();
                    return;
                }
                libraryItems = (fallback.data || []).map((item) => ({ ...item, tags: [] }));
                setNotice("Tag-Filter werden erst aktiv, nachdem das SQL aus sql/training_position_library.sql in Supabase ausgeführt wurde.", "warn");
                selectedIds = new Set([...selectedIds].filter((id) => libraryItems.some((item) => item.id === id)));
                buildTagFilterButtons();
                renderLibrary();
                return;
            }
            if (isPositionLibraryEditable(positionLibraryAccessMode)) setNotice("");
            libraryItems = data || [];
            selectedIds = new Set([...selectedIds].filter((id) => libraryItems.some((item) => item.id === id)));
            buildTagFilterButtons();
            renderLibrary();
        }
        async function deletePosition(id) {
            if (!isPositionLibraryEditable(positionLibraryAccessMode)) return;
            if (!id) return;
            if (!confirm("Diese Position wirklich löschen?")) return;
            const { error } = await supabaseClient.from("training_position_library").delete().eq("id", id).eq("user_id", currentUser.id);
            if (error) {
                alert("Position konnte nicht gelöscht werden: " + error.message);
                return;
            }
            await loadLibrary();
        }
        async function deleteSelectedPositions() {
            if (!isPositionLibraryEditable(positionLibraryAccessMode)) return;
            const ids = [...selectedIds];
            if (!ids.length) return;
            if (!confirm(`Diese ${ids.length} Position${ids.length === 1 ? "" : "en"} wirklich löschen?`)) return;
            const { error } = await supabaseClient.from("training_position_library").delete().in("id", ids).eq("user_id", currentUser.id);
            if (error) {
                alert("Positionen konnten nicht gelöscht werden: " + error.message);
                return;
            }
            selectedIds.clear();
            await loadLibrary();
        }
        async function init() {
            currentUser = await requireAuth();
            if (!currentUser) return;
            positionLibraryAccessMode = await getPositionLibraryAccess(currentUser);
            if (!isPositionLibraryVisible(positionLibraryAccessMode)) {
                window.location.href = "training.html";
                return;
            }
            document.getElementById("newPositionBtn").style.display = isPositionLibraryEditable(positionLibraryAccessMode) ? "inline-flex" : "none";
            updateDeleteSelectedUi();
            buildFilterButtons();
            await loadLibrary();
        }
        document.addEventListener("fullscreenchange", updateFullscreenButton);
        updateFullscreenButton();
        init();
    </script>
</body>
</html>
