<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Countdown HS Setup</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(180deg, #0f1c3f, #0a122b);
            color: white;
        }

        .page {
            width: min(1080px, 94%);
            margin: 44px auto;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 54px;
            font-weight: 700;
            letter-spacing: 0.4px;
        }

        .header p {
            margin: 10px 0 0;
            opacity: 0.75;
            font-size: 18px;
        }

        .card {
            background: linear-gradient(180deg, #162b66, #0f1c3f);
            border: 1px solid #2d488f;
            border-radius: 28px;
            padding: 28px 26px;
            box-shadow: 0 28px 60px rgba(0, 0, 0, 0.5);
        }

        .section {
            margin-bottom: 24px;
        }

        .section-title {
            margin: 0;
            font-size: 30px;
            font-weight: 700;
        }

        .section-sub {
            margin: 8px 0 14px;
            opacity: 0.74;
            font-size: 15px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .chip {
            padding: 12px 18px;
            border: none;
            border-radius: 12px;
            background: #1c3380;
            color: white;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            border: 1px solid #2f4ea0;
            transition: background .15s ease, border-color .15s ease, transform .15s ease, box-shadow .15s ease;
        }

        .chip:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
        }

        .chip.active {
            background: #ffd84a;
            color: #101420;
            border-color: #ffe27a;
            box-shadow: 0 8px 24px rgba(255, 216, 74, 0.28);
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .btn {
            padding: 16px 16px;
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 24px;
            font-weight: 700;
            cursor: pointer;
            transition: transform .16s ease, filter .16s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.06);
        }

        .btn-start {
            background: linear-gradient(180deg, #2f4fe0, #1c3380);
        }

        .btn-back {
            background: #233a8f;
        }

        @media (max-width: 760px) {
            .actions {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 36px;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="header">
            <h1>Countdown HS</h1>
            <p>Disziplin und Trainingsdauer wählen</p>
        </div>

        <div class="card">
            <div class="section">
                <h2 class="section-title">Disziplin</h2>
                <div class="section-sub">Trainingsmodus für einen Spieler</div>
                <div id="disciplineButtons" class="btn-group"></div>
            </div>

            <div class="section">
                <h2 class="section-title">Zeit</h2>
                <div class="section-sub">Countdown-Laufzeit</div>
                <div id="timeButtons" class="btn-group">
                    <button class="chip" data-minutes="30">30 min</button>
                    <button class="chip" data-minutes="45">45 min</button>
                    <button class="chip" data-minutes="60">1 Std</button>
                </div>
            </div>

            <div class="actions">
                <button class="btn btn-start" onclick="startCountdownTraining()">Starten</button>
                <button class="btn btn-back" onclick="window.location.href='training.html'">Zurück</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script>
        requireAuth();

        const disciplines = [
            "Freie Partie",
            "Cadre 35/2",
            "Cadre 52/2",
            "Cadre 47/2",
            "Cadre 47/1",
            "Cadre 71/2",
            "Einband",
            "Dreiband"
        ];

        let selectedDiscipline = "";
        let selectedMinutes = 0;

        function buildDisciplineButtons() {
            const container = document.getElementById("disciplineButtons");
            container.innerHTML = "";

            disciplines.forEach((discipline) => {
                const btn = document.createElement("button");
                btn.className = "chip";
                btn.innerText = discipline;
                btn.onclick = () => {
                    selectedDiscipline = discipline;
                    container.querySelectorAll(".chip").forEach((x) => x.classList.remove("active"));
                    btn.classList.add("active");
                };
                container.appendChild(btn);
            });
        }

        function bindTimeButtons() {
            const timeButtons = document.querySelectorAll("#timeButtons .chip");
            timeButtons.forEach((btn) => {
                btn.onclick = () => {
                    selectedMinutes = Number(btn.dataset.minutes || 0);
                    timeButtons.forEach((x) => x.classList.remove("active"));
                    btn.classList.add("active");
                };
            });
        }

        function startCountdownTraining() {
            if (!selectedDiscipline) {
                alert("Bitte eine Disziplin auswählen.");
                return;
            }
            if (!selectedMinutes) {
                alert("Bitte eine Zeit auswählen.");
                return;
            }
            const params = new URLSearchParams({
                discipline: selectedDiscipline,
                minutes: String(selectedMinutes)
            });
            window.location.href = "training_countdown_hs_run.html?" + params.toString();
        }

        buildDisciplineButtons();
        bindTimeButtons();
    </script>
</body>
</html>
