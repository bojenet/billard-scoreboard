<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Billard</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #1e1f29, #14151c);
            color: white;
        }

        .shell {
            height: 100%;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 12px;
            padding: 8px 10px;
            background: linear-gradient(180deg, #25293a, #1f2231);
            border-bottom: 1px solid #363b55;
            box-shadow: 0 10px 26px rgba(0, 0, 0, 0.35);
        }

        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            border: 1px solid #4d5ec0;
            background: #2f3c87;
            color: white;
            border-radius: 10px;
            padding: 7px 12px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: #3f4fa3;
            transform: translateY(-1px);
        }

        .frame {
            width: 100%;
            height: 100%;
            border: 0;
            background: #14151c;
        }
    </style>
</head>
<body>
    <div class="shell">
        <div class="topbar">
            <div class="actions">
                <button class="btn" type="button" onclick="goHome()">Startseite</button>
                <button class="btn" id="fullscreenBtn" type="button" onclick="toggleFullscreen()">Vollbild starten</button>
            </div>
        </div>
        <iframe id="appFrame" class="frame" src="home.html" title="Billard App"></iframe>
    </div>

    <script>
        function getAppFrame() {
            return document.getElementById("appFrame");
        }

        function goHome() {
            const frame = getAppFrame();
            if (!frame) return;
            frame.src = "home.html";
        }

        function updateFullscreenButton() {
            const btn = document.getElementById("fullscreenBtn");
            if (!btn) return;
            btn.innerText = document.fullscreenElement ? "Vollbild beenden" : "Vollbild starten";
        }

        async function toggleFullscreen() {
            try {
                if (document.fullscreenElement) {
                    await document.exitFullscreen();
                } else {
                    await document.documentElement.requestFullscreen();
                }
            } catch (error) {
                alert("Vollbild konnte nicht umgeschaltet werden.");
                console.warn("Fullscreen Toggle fehlgeschlagen:", error);
            } finally {
                updateFullscreenButton();
            }
        }

        document.addEventListener("fullscreenchange", updateFullscreenButton);
        updateFullscreenButton();
    </script>
</body>
</html>
