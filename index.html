<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Billard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(180deg, #1e1f29, #14151c);
            color: white;
            visibility: hidden;
        }

        body.auth-ready {
            visibility: visible;
        }

        #exitZone {
            position: fixed;
            top: 0;
            right: 0;
            width: 120px;
            height: 120px;
            z-index: 9999;
        }

        /* HEADER */
        .header {
            text-align: center;
            padding: 60px 0 20px 0;
            font-size: 48px;
            font-weight: 600;
            position: relative;
        }

        .header-actions {
            margin-top: 18px;
        }

        .header-btn {
            border: 1px solid #4d5ec0;
            background: #2f3c87;
            color: white;
            border-radius: 12px;
            padding: 10px 18px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .header-btn:hover {
            background: #3f4fa3;
            transform: translateY(-2px);
        }

        /* GRID */
        .grid {
            width: 1000px;
            max-width: 92%;
            margin: 60px auto;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
        }

        /* TILE */
        .tile {
            background: #2a2b35;
            border-radius: 25px;
            height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: 0.25s;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .admin-only {
            display: none;
        }

        .tile:hover {
            background: #3f4fa3;
            transform: translateY(-6px);
        }

        .tile-title {
            font-size: 26px;
            margin-bottom: 12px;
        }

        .tile-sub {
            font-size: 14px;
            opacity: 0.6;
        }

        /* LIVE STYLE */
        .tile.live {
            border: 2px solid #ff4d4d;
            animation: pulse 1.8s infinite;
        }

        .tile.invite {
            border: 2px solid #4da3ff;
            animation: pulseInvite 1.8s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(255, 77, 77, 0.6);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(255, 77, 77, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(255, 77, 77, 0);
            }
        }

        @keyframes pulseInvite {
            0% {
                box-shadow: 0 0 0 0 rgba(77, 163, 255, 0.6);
            }

            70% {
                box-shadow: 0 0 0 15px rgba(77, 163, 255, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(77, 163, 255, 0);
            }
        }

        .footer {
            text-align: center;
            margin-top: 100px;
            font-size: 14px;
            opacity: 0.4;
        }
    </style>
</head>

<body>

    <div id="exitZone"></div>

    <div class="header">
        Billard System
        <div class="header-actions">
            <button id="fullscreenBtn" class="header-btn" type="button" onclick="toggleFullscreen()">Vollbild starten</button>
        </div>
    </div>

    <div class="grid" id="mainGrid">

        <!-- Live Matches werden hier dynamisch eingefügt -->

        <div class="tile" onclick="window.location.href='match_setup.html'">
            <div class="tile-title">Match</div>
            <div class="tile-sub">Neue Partie starten</div>
        </div>

        <div class="tile" onclick="window.location.href='training.html'">
            <div class="tile-title">Training</div>
            <div class="tile-sub">Übungen & Serienmodus</div>
        </div>

        <div id="playersTile" class="tile" onclick="window.location.href='players.html'">
            <div class="tile-title">Spielerverwaltung</div>
            <div class="tile-sub">Spieler hinzufügen & löschen</div>
        </div>

        <div id="usersTile" class="tile admin-only" onclick="window.location.href='users.html'">
            <div class="tile-title">Userverwaltung</div>
            <div class="tile-sub">Rollen & Rechte verwalten</div>
        </div>

        <div class="tile" onclick="window.location.href='archive.html'">
            <div class="tile-title">Archiv</div>
            <div class="tile-sub">Gespielte Partien ansehen</div>
        </div>

    </div>

    <div class="footer">
        Scoreboard
    </div>

    <!-- EXIT ZONE -->
    <script>
        let exitTimer = null;
        const exitZone = document.getElementById("exitZone");

        exitZone.addEventListener("touchstart", () => {
            exitTimer = setTimeout(() => {
                window.open('', '_self');
                window.close();
            }, 5000);
        });

        exitZone.addEventListener("touchend", () => {
            clearTimeout(exitTimer);
        });

        function updateFullscreenButton() {
            const btn = document.getElementById("fullscreenBtn");
            if (!btn) return;
            btn.innerText = document.fullscreenElement ? "Vollbild beenden" : "Vollbild starten";
        }

        async function toggleFullscreen() {
            try {
                if (document.fullscreenElement) {
                    await document.exitFullscreen();
                } else {
                    await document.documentElement.requestFullscreen();
                }
            } catch (error) {
                alert("Vollbild konnte nicht umgeschaltet werden.");
                console.warn("Fullscreen Toggle fehlgeschlagen:", error);
            } finally {
                updateFullscreenButton();
            }
        }

        document.addEventListener("fullscreenchange", updateFullscreenButton);
        updateFullscreenButton();
    </script>

    <!-- SUPABASE -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/user_menu.js"></script>

    <!-- LOAD LIVE MATCHES -->
    <script>
        async function loadCountdownInvites(user) {
            if (!user?.email) return;
            const guestEmail = String(user.email).trim().toLowerCase();
            if (!guestEmail) return;

            const { data, error } = await supabaseClient
                .from("training_countdown_hs_sessions")
                .select("id,host_name,host_discipline,guest_discipline,duration_minutes,status")
                .eq("guest_email", guestEmail)
                .eq("status", "active")
                .order("created_at", { ascending: false })
                .limit(3);

            if (error) {
                console.warn("Countdown-Einladungen konnten nicht geladen werden:", error);
                return;
            }

            const invites = data || [];
            if (invites.length === 0) return;

            const grid = document.getElementById("mainGrid");
            invites.reverse().forEach((invite) => {
                const tile = document.createElement("div");
                tile.className = "tile invite";
                tile.onclick = () => {
                    window.location.href = "training_countdown_hs_run.html?session=" + invite.id;
                };

                tile.innerHTML = `
  <div class="tile-title">🔵 Countdown Einladung</div>
  <div class="tile-sub">${invite.host_name || "Spieler 1"} · ${invite.duration_minutes || 0} min</div>
  <div class="tile-sub" style="margin-top:8px;font-size:16px;opacity:0.9;">
    ${invite.host_discipline || "-"} vs ${invite.guest_discipline || "-"}
  </div>
`;
                grid.prepend(tile);
            });
        }

        async function loadLiveMatches() {
            const user = await requireAuth();
            if (!user) return;
            document.body.classList.add("auth-ready");
            const isAdmin = await hasAdminAccess(user);
            const usersTile = document.getElementById("usersTile");
            if (usersTile) {
                usersTile.style.display = isAdmin ? "flex" : "none";
            }

            await loadCountdownInvites(user);
            const ownedNames = await getOwnedPlayerNames(user.id);

            const { data, error } = await supabaseClient
                .from("matches")
                .select("*")
                .eq("status", 1)
                .eq("finished", 0)
                .order("started_at", { ascending: false });

            if (error) {
                console.log("Fehler:", error);
                return;
            }

            const filtered = isAdmin
                ? (data || [])
                : (data || []).filter((match) =>
                    isOwnedMatch(match, user.id, ownedNames)
                );

            if (!filtered || filtered.length === 0) return;

            const grid = document.getElementById("mainGrid");

            filtered.forEach(match => {

                const tile = document.createElement("div");
                tile.className = "tile live";
                tile.onclick = () => {
                    window.location.href = "scoreboard.html?match=" + match.id;
                };

                tile.innerHTML = `
  <div class="tile-title">🔴 ${match.player1} vs ${match.player2}</div>
  <div class="tile-sub">
    ${match.discipline1}
  </div>
  <div class="tile-sub" style="margin-top:8px;font-size:16px;opacity:0.9;">
    ${match.score1} : ${match.score2} · Aufnahme ${match.totalInnings}
  </div>
`;

                grid.prepend(tile);
            });
        }

        loadLiveMatches();
    </script>

</body>

</html>
