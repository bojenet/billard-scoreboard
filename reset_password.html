<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Neues Passwort</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(180deg, #0f1c3f, #0a122b);
            color: white;
            min-height: 100vh;
            display: grid;
            place-items: center;
        }

        .card {
            width: min(560px, 92%);
            background: linear-gradient(180deg, #162b66, #0f1c3f);
            border: 1px solid #2d488f;
            border-radius: 22px;
            padding: 30px 26px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 40px;
        }

        .sub {
            margin: 0 0 20px;
            opacity: 0.78;
            line-height: 1.45;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 10px;
        }

        .field label {
            font-size: 14px;
            opacity: 0.78;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            border: none;
            border-radius: 12px;
            padding: 12px 14px;
            font-size: 18px;
        }

        button {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 13px 14px;
            font-size: 20px;
            font-weight: 700;
            color: white;
            background: linear-gradient(180deg, #2f4fe0, #1c3380);
            cursor: pointer;
            margin-top: 8px;
        }

        button[disabled] {
            opacity: 0.68;
            cursor: wait;
        }

        .btn-link {
            background: transparent;
            border: 1px solid #3f5fc0;
            color: #dbe4ff;
        }

        .message {
            min-height: 22px;
            margin-top: 14px;
            font-size: 14px;
        }

        .message.error {
            color: #ffb6b6;
        }

        .message.ok {
            color: #b7f7c5;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Neues Passwort</h1>
        <p class="sub">Setze jetzt ein neues Passwort für dein Konto.</p>

        <div class="field">
            <label for="password">Neues Passwort</label>
            <input id="password" type="password" placeholder="Neues Passwort" autocomplete="new-password" />
        </div>

        <div class="field">
            <label for="confirmPassword">Passwort wiederholen</label>
            <input id="confirmPassword" type="password" placeholder="Passwort wiederholen" autocomplete="new-password" />
        </div>

        <button id="saveBtn" type="button" onclick="savePassword()">Passwort speichern</button>
        <button class="btn-link" type="button" onclick="window.location.href='/login.html'">Zum Login</button>

        <div id="messageBox" class="message"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        let busy = false;

        function getHashParams() {
            const hash = window.location.hash.startsWith("#") ? window.location.hash.slice(1) : window.location.hash;
            return new URLSearchParams(hash || "");
        }

        function getCombinedParam(name) {
            const query = new URLSearchParams(window.location.search).get(name);
            if (query) return query;
            return getHashParams().get(name);
        }

        function isRecoveryMode() {
            return getCombinedParam("type") === "recovery";
        }

        function setBusy(nextBusy) {
            busy = Boolean(nextBusy);
            document.querySelectorAll("button").forEach((btn) => {
                btn.disabled = busy;
            });
        }

        function setMessage(text, type) {
            const box = document.getElementById("messageBox");
            box.className = "message " + (type || "");
            box.innerText = text || "";
        }

        async function savePassword() {
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            if (!password || password.length < 6) {
                setMessage("Bitte ein neues Passwort mit mindestens 6 Zeichen eingeben.", "error");
                return;
            }
            if (password !== confirmPassword) {
                setMessage("Die beiden Passwörter stimmen nicht überein.", "error");
                return;
            }

            setBusy(true);
            const { error } = await supabaseClient.auth.updateUser({ password });
            setBusy(false);

            if (error) {
                setMessage("Neues Passwort konnte nicht gespeichert werden: " + error.message, "error");
                return;
            }

            setMessage("Passwort erfolgreich geändert. Du wirst zum Login weitergeleitet.", "ok");
            window.setTimeout(() => {
                window.location.replace("/login.html");
            }, 1200);
        }

        document.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !busy) savePassword();
        });

        (async function init() {
            if (!isRecoveryMode()) {
                setMessage("Der Reset-Link ist ungültig oder abgelaufen. Bitte neuen Link anfordern.", "error");
                return;
            }
            const { data, error } = await supabaseClient.auth.getSession();
            if (error) {
                setMessage("Recovery-Session konnte nicht geladen werden: " + error.message, "error");
                return;
            }
            if (!data?.session) {
                setMessage("Der Reset-Link ist ungültig oder abgelaufen. Bitte neuen Link anfordern.", "error");
            }
        })();
    </script>
</body>
</html>
