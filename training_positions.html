<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Positionstraining</title>
    <style>
        html { min-height: 100%; background: linear-gradient(180deg, #0f1c3f, #0a122b); }
        body { margin: 0; min-height: 100vh; font-family: Arial, sans-serif; background: linear-gradient(180deg, #0f1c3f, #0a122b); color: white; }
        .fullscreen-btn { position: fixed; top: 10px; right: 10px; z-index: 1200; width: 34px; height: 34px; border: 1px solid #3659bb; border-radius: 10px; background: rgba(28, 51, 128, 0.92); color: white; font-size: 16px; font-weight: 700; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .page { width: min(1320px, 94%); margin: 24px auto 34px; }
        .topbar { display:flex; justify-content:space-between; align-items:end; gap:16px; margin-bottom:18px; flex-wrap:wrap; }
        h1 { margin:0; font-size:52px; font-weight:800; }
        .sub { margin-top:8px; font-size:18px; opacity:.76; }
        .actions,.filter-group,.collection-group { display:flex; gap:10px; flex-wrap:wrap; }
        .btn { border:none; border-radius:12px; padding:12px 16px; background:#1c3380; border:1px solid #3659bb; color:white; font-size:16px; font-weight:700; cursor:pointer; }
        .btn.active { background:#ffd84a; color:#101420; border-color:#ffe27a; }
        .stats { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:14px; margin-bottom:18px; }
        .stat,.card { background:linear-gradient(180deg,#162b66,#0f1c3f); border:1px solid #2d488f; border-radius:18px; box-shadow:0 18px 36px rgba(0,0,0,.35); }
        .stat { padding:16px; }
        .stat-label { font-size:13px; opacity:.72; margin-bottom:8px; letter-spacing:1px; }
        .stat-value { font-size:34px; font-weight:800; }
        .card { border-radius:22px; padding:18px; box-shadow:0 26px 60px rgba(0,0,0,.45); }
        .toolbar { display:flex; justify-content:space-between; gap:14px; align-items:center; margin-bottom:14px; flex-wrap:wrap; }
        .collection { font-size:15px; opacity:.82; display:grid; gap:8px; }
        .collection-meta { font-size:13px; opacity:.72; }
        .notice { margin-bottom:14px; padding:12px 14px; border-radius:14px; border:1px solid #556db2; background:rgba(20,38,89,.78); font-size:14px; line-height:1.5; opacity:.9; }
        .grid { display:grid; grid-template-columns:repeat(6,minmax(0,1fr)); gap:14px; }
        .tile { border-radius:18px; padding:16px 14px; background:linear-gradient(180deg,#223d8f,#172c69); border:1px solid #3659bb; cursor:pointer; min-height:150px; display:flex; flex-direction:column; justify-content:space-between; transition:transform .16s ease, filter .16s ease, border-color .16s ease; }
        .tile:hover { transform:translateY(-2px); filter:brightness(1.05); }
        .tile.done { border-color:#4bd58a; box-shadow:inset 0 0 0 1px rgba(75,213,138,.4); }
        .tile-top { display:flex; justify-content:space-between; gap:8px; align-items:start; }
        .tile-no { font-size:28px; font-weight:800; }
        .badge { font-size:11px; padding:4px 7px; border-radius:999px; background:rgba(255,255,255,.12); }
        .tile-title { margin-top:12px; font-size:17px; font-weight:700; }
        .tile-sub { margin-top:8px; font-size:13px; opacity:.78; line-height:1.4; }
        .empty { padding:14px 4px 2px; opacity:.72; }
        @media (max-width:1100px) { .grid { grid-template-columns:repeat(4,minmax(0,1fr)); } }
        @media (max-width:760px) { h1 { font-size:36px; } .stats { grid-template-columns:repeat(2,minmax(0,1fr)); } .grid { grid-template-columns:repeat(2,minmax(0,1fr)); } }
    </style>
</head>
<body>
    <button id="fullscreenBtn" class="fullscreen-btn" type="button" onclick="toggleFullscreen()" title="Vollbild starten" aria-label="Vollbild starten">⛶</button>
    <div class="page">
        <div class="topbar">
            <div>
                <h1>Positionstraining</h1>
                <div class="sub">Fokus auf Notizen und Trainingsstatus</div>
            </div>
            <div class="actions">
                <button class="btn" onclick="window.location.href='training.html'">Zurück</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat"><div class="stat-label">POSITIONEN</div><div class="stat-value" id="totalPositions">0</div></div>
            <div class="stat"><div class="stat-label">TRAINIERT</div><div class="stat-value" id="trainedPositions">0</div></div>
            <div class="stat"><div class="stat-label">OFFEN</div><div class="stat-value" id="openPositions">0</div></div>
        </div>

        <div class="card">
            <div class="toolbar">
                <div class="collection">
                    <div>Sammlung: <strong id="collectionLabel">Roger Conti 1-62</strong></div>
                    <div class="collection-group">
                        <button class="btn active" id="collection1" onclick="setCollection('roger-conti')">1-62</button>
                        <button class="btn" id="collection2" onclick="setCollection('roger-conti-63-151')">63-151</button>
                    </div>
                    <div class="collection-meta" id="collectionMeta">Texte werden lokal vorbereitet und dann in den Katalog übernommen.</div>
                </div>
                <div class="filter-group">
                    <button class="btn active" id="filterAll" onclick="setFilter('all')">Alle</button>
                    <button class="btn" id="filterOpen" onclick="setFilter('open')">Offen</button>
                    <button class="btn" id="filterDone" onclick="setFilter('done')">Trainiert</button>
                </div>
            </div>
            <div class="notice" id="noticeBox" style="display:none;"></div>
            <div class="grid" id="positionsGrid"></div>
            <div class="empty" id="emptyState" style="display:none;">Keine Positionen für diesen Filter.</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/user_menu.js"></script>
    <script>
        const COLLECTIONS = {
            "roger-conti": { label: "Roger Conti 1-62", file: "data/roger_conti_positions.json", meta: "Mit vorhandenen PDF-Notizen und Ergänzungen." },
            "roger-conti-63-151": { label: "Roger Conti 63-151", file: "data/roger_conti_positions_63_150.json", meta: "Schwächere Scans werden nur lokal OCRt und danach selektiv importiert." }
        };
        let currentUser = null;
        let currentFilter = "all";
        let currentCollection = "roger-conti";
        let positions = [];
        let progressMap = {};
        const localCollectionCache = {};
        function updateFullscreenButton() {
            const btn = document.getElementById("fullscreenBtn");
            if (!btn) return;
            const active = !!document.fullscreenElement;
            btn.innerText = active ? "×" : "⛶";
            btn.title = active ? "Vollbild beenden" : "Vollbild starten";
            btn.setAttribute("aria-label", active ? "Vollbild beenden" : "Vollbild starten");
        }
        async function toggleFullscreen() {
            try {
                if (document.fullscreenElement) {
                    await document.exitFullscreen();
                } else {
                    await document.documentElement.requestFullscreen();
                }
            } catch (error) {
                console.warn("Fullscreen Toggle fehlgeschlagen:", error);
            } finally {
                updateFullscreenButton();
            }
        }

        function setNotice(text) {
            const el = document.getElementById("noticeBox");
            el.style.display = text ? "block" : "none";
            el.innerText = text || "";
        }
        function localStorageKey() { return "position_training_progress_" + String(currentUser?.id || "guest"); }
        function loadLocalProgress() {
            try {
                const raw = JSON.parse(localStorage.getItem(localStorageKey()) || "{}");
                progressMap = {};
                Object.entries(raw).forEach(([positionId, entry]) => {
                    progressMap[positionId] = { position_id: positionId, notes: entry.notes || "", trained: Boolean(entry.trained), updated_at: entry.updatedAt || "" };
                });
            } catch (_) { progressMap = {}; }
        }
        function getProgress(id) { return progressMap[id] || { position_id: id, notes: "", trained: false, updated_at: "" }; }
        function computeStats(item) {
            const p = getProgress(item.id);
            return { trained: Boolean(p.trained), data: p };
        }
        function setFilter(filter) {
            currentFilter = filter;
            ["all", "open", "done"].forEach((key) => {
                const el = document.getElementById("filter" + key.charAt(0).toUpperCase() + key.slice(1));
                if (el) el.classList.toggle("active", key === filter);
            });
            render();
        }
        async function setCollection(key) {
            if (!COLLECTIONS[key]) return;
            currentCollection = key;
            document.getElementById("collection1").classList.toggle("active", key === "roger-conti");
            document.getElementById("collection2").classList.toggle("active", key === "roger-conti-63-151");
            await loadCollection();
            render();
        }
        function shouldShow(item) {
            const stats = computeStats(item);
            if (currentFilter === "open") return !stats.trained;
            if (currentFilter === "done") return stats.trained;
            return true;
        }
        function renderStats() {
            const total = positions.length;
            const trainedCount = positions.filter((item) => computeStats(item).trained).length;
            document.getElementById("totalPositions").innerText = total;
            document.getElementById("trainedPositions").innerText = trainedCount;
            document.getElementById("openPositions").innerText = total - trainedCount;
        }
        function render() {
            const currentConfig = COLLECTIONS[currentCollection];
            document.getElementById("collectionLabel").innerText = currentConfig.label;
            document.getElementById("collectionMeta").innerText = currentConfig.meta;
            renderStats();
            const grid = document.getElementById("positionsGrid");
            const empty = document.getElementById("emptyState");
            const visible = positions.filter(shouldShow);
            grid.innerHTML = "";
            if (!visible.length) { empty.style.display = "block"; return; }
            empty.style.display = "none";
            visible.forEach((item) => {
                const stats = computeStats(item);
                const hasImportedText = (Array.isArray(item.comments) && item.comments.length > 0) || Boolean(item.sourceText || item.source_text);
                const tile = document.createElement("div");
                tile.className = "tile";
                if (stats.trained) tile.classList.add("done");
                const statusText = stats.trained ? "Trainiert" : "Offen";
                const sourceText = hasImportedText ? "Text importiert" : (currentCollection === "roger-conti-63-151" ? "Noch kein lokaler Import" : "Noch kein Text");
                tile.innerHTML = `
                    <div>
                        <div class="tile-top">
                            <div class="tile-no">${item.number}</div>
                            <div class="badge">${statusText}</div>
                        </div>
                        <div class="tile-title">${item.title}</div>
                    </div>
                    <div class="tile-sub">${sourceText}</div>
                `;
                tile.onclick = () => { window.location.href = "training_position_detail.html?id=" + encodeURIComponent(item.id); };
                grid.appendChild(tile);
            });
        }
        async function loadCatalogFromDb() {
            const { data, error } = await supabaseClient.from("training_positions_catalog").select("id,set_key,number,title,pdf_page,discipline,difficulty,description,comments,source_quality,source_text").eq("set_key", currentCollection).order("number", { ascending: true });
            if (error) throw error;
            return (data || []).map((item) => ({ ...item, pdfPage: item.pdf_page, sourceQuality: item.source_quality, sourceText: item.source_text || item.sourceText || "" }));
        }
        async function loadLocalCollection(key) {
            if (localCollectionCache[key]) return localCollectionCache[key];
            const res = await fetch(COLLECTIONS[key].file, { cache: "no-store" });
            const items = await res.json();
            localCollectionCache[key] = items;
            return items;
        }
        async function applyLocalOverrides(key, items) {
            const localItems = await loadLocalCollection(key);
            const localMap = new Map(localItems.map((item) => [item.id, item]));
            return items.map((item) => {
                const localItem = localMap.get(item.id);
                if (!localItem) return item;
                return {
                    ...item,
                    comments: Array.isArray(localItem.comments) && localItem.comments.length ? localItem.comments : item.comments,
                    sourceQuality: localItem.sourceQuality || item.sourceQuality,
                    sourceText: localItem.sourceText || item.sourceText || ""
                };
            });
        }
        async function loadCatalogFallback() {
            return await loadLocalCollection(currentCollection);
        }
        async function loadProgressFromDb(ids) {
            progressMap = {};
            if (!ids.length) return;
            const { data, error } = await supabaseClient.from("training_position_progress").select("position_id,notes,trained,updated_at").eq("user_id", currentUser.id).in("position_id", ids);
            if (error) throw error;
            (data || []).forEach((row) => { progressMap[row.position_id] = row; });
        }
        async function loadCollection() {
            setNotice("");
            try {
                positions = await loadCatalogFromDb();
                positions = await applyLocalOverrides(currentCollection, positions);
                await loadProgressFromDb(positions.map((item) => item.id));
            } catch (error) {
                console.warn("Positionstraining DB-Fallback aktiv:", error);
                positions = await loadCatalogFallback();
                loadLocalProgress();
                setNotice("Datenbanktabellen für Positionstraining noch nicht aktiv. Es läuft aktuell der JSON/localStorage-Fallback. SQL aus sql/training_positions.sql in Supabase ausführen.");
            }
        }
        async function init() { currentUser = await requireAuth(); if (!currentUser) return; updateFullscreenButton(); await loadCollection(); render(); }
        document.addEventListener("fullscreenchange", updateFullscreenButton);
        init();
    </script>
</body>
</html>
