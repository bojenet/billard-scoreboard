<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Positionstraining</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #0f1c3f, #0a122b);
            color: white;
        }

        .page {
            width: min(1320px, 94%);
            margin: 24px auto 34px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 16px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        h1 {
            margin: 0;
            font-size: 52px;
            font-weight: 800;
        }

        .sub {
            margin-top: 8px;
            font-size: 18px;
            opacity: 0.76;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            background: #1c3380;
            border: 1px solid #3659bb;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn.active {
            background: #ffd84a;
            color: #101420;
            border-color: #ffe27a;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 18px;
        }

        .stat {
            background: linear-gradient(180deg, #162b66, #0f1c3f);
            border: 1px solid #2d488f;
            border-radius: 18px;
            padding: 16px;
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.35);
        }

        .stat-label {
            font-size: 13px;
            opacity: 0.72;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 34px;
            font-weight: 800;
        }

        .card {
            background: linear-gradient(180deg, #162b66, #0f1c3f);
            border: 1px solid #2d488f;
            border-radius: 22px;
            padding: 18px;
            box-shadow: 0 26px 60px rgba(0, 0, 0, 0.45);
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .collection {
            font-size: 15px;
            opacity: 0.82;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 14px;
        }

        .tile {
            border-radius: 18px;
            padding: 16px 14px;
            background: linear-gradient(180deg, #223d8f, #172c69);
            border: 1px solid #3659bb;
            cursor: pointer;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform .16s ease, filter .16s ease, border-color .16s ease;
        }

        .tile:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .tile.done {
            border-color: #4bd58a;
            box-shadow: inset 0 0 0 1px rgba(75, 213, 138, 0.4);
        }

        .tile.weak {
            border-color: #ff7b7b;
            box-shadow: inset 0 0 0 1px rgba(255, 123, 123, 0.35);
        }

        .tile-top {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            align-items: start;
        }

        .tile-no {
            font-size: 28px;
            font-weight: 800;
        }

        .badge {
            font-size: 11px;
            padding: 4px 7px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
        }

        .tile-title {
            margin-top: 12px;
            font-size: 17px;
            font-weight: 700;
        }

        .tile-sub {
            margin-top: 8px;
            font-size: 13px;
            opacity: 0.78;
            line-height: 1.4;
        }

        .empty {
            padding: 14px 4px 2px;
            opacity: 0.72;
        }

        @media (max-width: 1100px) {
            .grid {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }

        @media (max-width: 760px) {
            h1 {
                font-size: 36px;
            }

            .stats {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <div>
                <h1>Positionstraining</h1>
                <div class="sub">Roger Conti 1-62 als Trainingssammlung</div>
            </div>
            <div class="actions">
                <button class="btn" onclick="window.location.href='training.html'">Zurück</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">POSITIONEN</div>
                <div class="stat-value" id="totalPositions">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">TRAINIERT</div>
                <div class="stat-value" id="trainedPositions">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">TREFFERQUOTE</div>
                <div class="stat-value" id="hitRate">0 %</div>
            </div>
            <div class="stat">
                <div class="stat-label">OFFEN</div>
                <div class="stat-value" id="openPositions">0</div>
            </div>
        </div>

        <div class="card">
            <div class="toolbar">
                <div class="collection">Sammlung: <strong>Roger Conti</strong></div>
                <div class="filter-group">
                    <button class="btn active" id="filterAll" onclick="setFilter('all')">Alle</button>
                    <button class="btn" id="filterOpen" onclick="setFilter('open')">Offen</button>
                    <button class="btn" id="filterWeak" onclick="setFilter('weak')">Schwach</button>
                    <button class="btn" id="filterDone" onclick="setFilter('done')">Trainiert</button>
                </div>
            </div>
            <div class="grid" id="positionsGrid"></div>
            <div class="empty" id="emptyState" style="display:none;">Keine Positionen für diesen Filter.</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/user_menu.js"></script>
    <script>
        let currentUser = null;
        let currentFilter = "all";
        let positions = [];
        let progress = {};

        function storageKey() {
            return "position_training_progress_" + String(currentUser?.id || "guest");
        }

        function loadProgress() {
            try {
                progress = JSON.parse(localStorage.getItem(storageKey()) || "{}");
            } catch (_) {
                progress = {};
            }
        }

        function getProgress(id) {
            return progress[id] || {
                hits: 0,
                misses: 0,
                bestSeries: 0,
                notes: "",
                lastTrained: ""
            };
        }

        function computeStats(item) {
            const p = getProgress(item.id);
            const total = Number(p.hits || 0) + Number(p.misses || 0);
            const trained = total > 0;
            const rate = total > 0 ? (Number(p.hits || 0) / total) : 0;
            return { total, trained, rate, data: p };
        }

        function setFilter(filter) {
            currentFilter = filter;
            ["all", "open", "weak", "done"].forEach((key) => {
                const el = document.getElementById("filter" + key.charAt(0).toUpperCase() + key.slice(1));
                if (el) el.classList.toggle("active", key === filter);
            });
            render();
        }

        function shouldShow(item) {
            const stats = computeStats(item);
            if (currentFilter === "open") return !stats.trained;
            if (currentFilter === "done") return stats.trained;
            if (currentFilter === "weak") return stats.trained && stats.rate < 0.6;
            return true;
        }

        function renderStats() {
            const total = positions.length;
            const trainedItems = positions.filter((item) => computeStats(item).trained);
            const trainedCount = trainedItems.length;
            const openCount = total - trainedCount;
            let hits = 0;
            let attempts = 0;
            trainedItems.forEach((item) => {
                const p = computeStats(item).data;
                hits += Number(p.hits || 0);
                attempts += Number(p.hits || 0) + Number(p.misses || 0);
            });
            const rate = attempts > 0 ? Math.round((hits / attempts) * 100) : 0;

            document.getElementById("totalPositions").innerText = total;
            document.getElementById("trainedPositions").innerText = trainedCount;
            document.getElementById("openPositions").innerText = openCount;
            document.getElementById("hitRate").innerText = rate + " %";
        }

        function render() {
            renderStats();
            const grid = document.getElementById("positionsGrid");
            const empty = document.getElementById("emptyState");
            const visible = positions.filter(shouldShow);

            grid.innerHTML = "";
            if (!visible.length) {
                empty.style.display = "block";
                return;
            }
            empty.style.display = "none";

            visible.forEach((item) => {
                const stats = computeStats(item);
                const tile = document.createElement("div");
                tile.className = "tile";
                if (stats.trained) tile.classList.add("done");
                if (stats.trained && stats.rate < 0.6) tile.classList.add("weak");
                const attempts = stats.total;
                const rateText = attempts > 0 ? Math.round(stats.rate * 100) + " %" : "offen";
                tile.innerHTML = `
                    <div>
                        <div class="tile-top">
                            <div class="tile-no">${item.number}</div>
                            <div class="badge">${attempts > 0 ? attempts + " Vers." : "neu"}</div>
                        </div>
                        <div class="tile-title">${item.title}</div>
                        <div class="tile-sub">Trefferquote: ${rateText}</div>
                    </div>
                    <div class="tile-sub">${stats.data.lastTrained ? "Zuletzt: " + new Date(stats.data.lastTrained).toLocaleDateString() : "Noch nicht trainiert"}</div>
                `;
                tile.onclick = () => {
                    window.location.href = "training_position_detail.html?id=" + encodeURIComponent(item.id);
                };
                grid.appendChild(tile);
            });
        }

        async function init() {
            currentUser = await requireAuth();
            if (!currentUser) return;
            loadProgress();
            const res = await fetch("data/roger_conti_positions.json", { cache: "no-store" });
            positions = await res.json();
            render();
        }

        init();
    </script>
</body>
</html>
