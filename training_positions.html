<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Positionstraining</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #0f1c3f, #0a122b);
            color: white;
        }

        .page {
            width: min(1320px, 94%);
            margin: 24px auto 34px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 16px;
            margin-bottom: 18px;
            flex-wrap: wrap;
        }

        h1 {
            margin: 0;
            font-size: 52px;
            font-weight: 800;
        }

        .sub {
            margin-top: 8px;
            font-size: 18px;
            opacity: 0.76;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            background: #1c3380;
            border: 1px solid #3659bb;
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
        }

        .btn.active {
            background: #ffd84a;
            color: #101420;
            border-color: #ffe27a;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 14px;
            margin-bottom: 18px;
        }

        .stat {
            background: linear-gradient(180deg, #162b66, #0f1c3f);
            border: 1px solid #2d488f;
            border-radius: 18px;
            padding: 16px;
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.35);
        }

        .stat-label {
            font-size: 13px;
            opacity: 0.72;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .stat-value {
            font-size: 34px;
            font-weight: 800;
        }

        .card {
            background: linear-gradient(180deg, #162b66, #0f1c3f);
            border: 1px solid #2d488f;
            border-radius: 22px;
            padding: 18px;
            box-shadow: 0 26px 60px rgba(0, 0, 0, 0.45);
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            gap: 14px;
            align-items: center;
            margin-bottom: 14px;
            flex-wrap: wrap;
        }

        .filter-group,
        .collection-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .collection {
            font-size: 15px;
            opacity: 0.82;
            display: grid;
            gap: 8px;
        }

        .collection-meta {
            font-size: 13px;
            opacity: 0.72;
        }

        .notice {
            margin-bottom: 14px;
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid #556db2;
            background: rgba(20, 38, 89, 0.78);
            font-size: 14px;
            line-height: 1.5;
            opacity: 0.9;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: 14px;
        }

        .tile {
            border-radius: 18px;
            padding: 16px 14px;
            background: linear-gradient(180deg, #223d8f, #172c69);
            border: 1px solid #3659bb;
            cursor: pointer;
            min-height: 150px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform .16s ease, filter .16s ease, border-color .16s ease;
        }

        .tile:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }

        .tile.done {
            border-color: #4bd58a;
            box-shadow: inset 0 0 0 1px rgba(75, 213, 138, 0.4);
        }

        .tile.weak {
            border-color: #ff7b7b;
            box-shadow: inset 0 0 0 1px rgba(255, 123, 123, 0.35);
        }

        .tile.ocr-pending {
            border-color: #d3a93c;
        }

        .tile.ocr-done {
            border-color: #78b8ff;
        }

        .tile-top {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            align-items: start;
        }

        .tile-no {
            font-size: 28px;
            font-weight: 800;
        }

        .badge {
            font-size: 11px;
            padding: 4px 7px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
        }

        .tile-title {
            margin-top: 12px;
            font-size: 17px;
            font-weight: 700;
        }

        .tile-sub {
            margin-top: 8px;
            font-size: 13px;
            opacity: 0.78;
            line-height: 1.4;
        }

        .empty {
            padding: 14px 4px 2px;
            opacity: 0.72;
        }

        @media (max-width: 1100px) {
            .grid {
                grid-template-columns: repeat(4, minmax(0, 1fr));
            }
        }

        @media (max-width: 760px) {
            h1 {
                font-size: 36px;
            }

            .stats {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <div>
                <h1>Positionstraining</h1>
                <div class="sub">DB-basierter Katalog mit OCR-Anfragen pro Position</div>
            </div>
            <div class="actions">
                <button class="btn" id="workerBtn" onclick="window.location.href='training_position_worker.html'" style="display:none;">OCR Worker</button>
                <button class="btn" onclick="window.location.href='training.html'">Zurück</button>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-label">POSITIONEN</div>
                <div class="stat-value" id="totalPositions">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">TRAINIERT</div>
                <div class="stat-value" id="trainedPositions">0</div>
            </div>
            <div class="stat">
                <div class="stat-label">TREFFERQUOTE</div>
                <div class="stat-value" id="hitRate">0 %</div>
            </div>
            <div class="stat">
                <div class="stat-label">OFFEN</div>
                <div class="stat-value" id="openPositions">0</div>
            </div>
        </div>

        <div class="card">
            <div class="toolbar">
                <div class="collection">
                    <div>Sammlung: <strong id="collectionLabel">Roger Conti 1-62</strong></div>
                    <div class="collection-group">
                        <button class="btn active" id="collection1" onclick="setCollection('roger-conti')">1-62</button>
                        <button class="btn" id="collection2" onclick="setCollection('roger-conti-63-151')">63-151</button>
                    </div>
                    <div class="collection-meta" id="collectionMeta">Katalog aus Datenbank, JSON nur als Fallback.</div>
                </div>
                <div class="filter-group">
                    <button class="btn active" id="filterAll" onclick="setFilter('all')">Alle</button>
                    <button class="btn" id="filterOpen" onclick="setFilter('open')">Offen</button>
                    <button class="btn" id="filterWeak" onclick="setFilter('weak')">Schwach</button>
                    <button class="btn" id="filterDone" onclick="setFilter('done')">Trainiert</button>
                </div>
            </div>
            <div class="notice" id="noticeBox" style="display:none;"></div>
            <div class="grid" id="positionsGrid"></div>
            <div class="empty" id="emptyState" style="display:none;">Keine Positionen für diesen Filter.</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/user_menu.js"></script>
    <script>
        const COLLECTIONS = {
            "roger-conti": {
                label: "Roger Conti 1-62",
                file: "data/roger_conti_positions.json",
                meta: "Mit extrahierten und ergänzten Notizen aus dem PDF."
            },
            "roger-conti-63-151": {
                label: "Roger Conti 63-151",
                file: "data/roger_conti_positions_63_150.json",
                meta: "Schwacher Scan: OCR-Anfrage pro Position möglich."
            }
        };

        let currentUser = null;
        let currentFilter = "all";
        let currentCollection = "roger-conti";
        let positions = [];
        let progressMap = {};
        let ocrMap = {};
        let usingDb = false;

        function setNotice(text) {
            const el = document.getElementById("noticeBox");
            if (!text) {
                el.style.display = "none";
                el.innerText = "";
                return;
            }
            el.style.display = "block";
            el.innerText = text;
        }

        function localStorageKey() {
            return "position_training_progress_" + String(currentUser?.id || "guest");
        }

        function loadLocalProgress() {
            try {
                const raw = JSON.parse(localStorage.getItem(localStorageKey()) || "{}");
                progressMap = {};
                Object.entries(raw).forEach(([positionId, entry]) => {
                    progressMap[positionId] = {
                        position_id: positionId,
                        hits: Number(entry.hits || 0),
                        misses: Number(entry.misses || 0),
                        notes: entry.notes || "",
                        last_trained: entry.lastTrained || ""
                    };
                });
            } catch (_) {
                progressMap = {};
            }
        }

        function getProgress(id) {
            return progressMap[id] || {
                position_id: id,
                hits: 0,
                misses: 0,
                notes: "",
                last_trained: ""
            };
        }

        function getOcrStatus(item) {
            return (ocrMap[item.id] && ocrMap[item.id].status) || item.ocr_status || item.ocrStatus || "idle";
        }

        function computeStats(item) {
            const p = getProgress(item.id);
            const total = Number(p.hits || 0) + Number(p.misses || 0);
            const trained = total > 0;
            const rate = total > 0 ? (Number(p.hits || 0) / total) : 0;
            return { total, trained, rate, data: p };
        }

        function setFilter(filter) {
            currentFilter = filter;
            ["all", "open", "weak", "done"].forEach((key) => {
                const el = document.getElementById("filter" + key.charAt(0).toUpperCase() + key.slice(1));
                if (el) el.classList.toggle("active", key === filter);
            });
            render();
        }

        async function setCollection(key) {
            if (!COLLECTIONS[key]) return;
            currentCollection = key;
            document.getElementById("collection1").classList.toggle("active", key === "roger-conti");
            document.getElementById("collection2").classList.toggle("active", key === "roger-conti-63-151");
            await loadCollection();
            render();
        }

        function shouldShow(item) {
            const stats = computeStats(item);
            if (currentFilter === "open") return !stats.trained;
            if (currentFilter === "done") return stats.trained;
            if (currentFilter === "weak") return stats.trained && stats.rate < 0.6;
            return true;
        }

        function renderStats() {
            const total = positions.length;
            const trainedItems = positions.filter((item) => computeStats(item).trained);
            const trainedCount = trainedItems.length;
            const openCount = total - trainedCount;
            let hits = 0;
            let attempts = 0;
            trainedItems.forEach((item) => {
                const p = computeStats(item).data;
                hits += Number(p.hits || 0);
                attempts += Number(p.hits || 0) + Number(p.misses || 0);
            });
            const rate = attempts > 0 ? Math.round((hits / attempts) * 100) : 0;

            document.getElementById("totalPositions").innerText = total;
            document.getElementById("trainedPositions").innerText = trainedCount;
            document.getElementById("openPositions").innerText = openCount;
            document.getElementById("hitRate").innerText = rate + " %";
        }

        function render() {
            const currentConfig = COLLECTIONS[currentCollection];
            document.getElementById("collectionLabel").innerText = currentConfig.label;
            document.getElementById("collectionMeta").innerText = currentConfig.meta;

            renderStats();
            const grid = document.getElementById("positionsGrid");
            const empty = document.getElementById("emptyState");
            const visible = positions.filter(shouldShow);

            grid.innerHTML = "";
            if (!visible.length) {
                empty.style.display = "block";
                return;
            }
            empty.style.display = "none";

            visible.forEach((item) => {
                const stats = computeStats(item);
                const ocrStatus = getOcrStatus(item);
                const tile = document.createElement("div");
                tile.className = "tile";
                if (stats.trained) tile.classList.add("done");
                if (stats.trained && stats.rate < 0.6) tile.classList.add("weak");
                if (ocrStatus === "pending" || ocrStatus === "running") tile.classList.add("ocr-pending");
                if (ocrStatus === "done") tile.classList.add("ocr-done");
                const attempts = stats.total;
                const rateText = attempts > 0 ? Math.round(stats.rate * 100) + " %" : "offen";
                const lastTrainedText = stats.data.last_trained ? ("Zuletzt: " + new Date(stats.data.last_trained).toLocaleDateString()) : "Noch nicht trainiert";
                const ocrText = ocrStatus === "idle" ? "OCR offen" : (ocrStatus === "pending" ? "OCR angefragt" : (ocrStatus === "running" ? "OCR läuft" : (ocrStatus === "done" ? "OCR fertig" : "OCR fehlgeschlagen")));
                tile.innerHTML = `
                    <div>
                        <div class="tile-top">
                            <div class="tile-no">${item.number}</div>
                            <div class="badge">${attempts > 0 ? attempts + " Vers." : ocrText}</div>
                        </div>
                        <div class="tile-title">${item.title}</div>
                        <div class="tile-sub">Trefferquote: ${rateText}</div>
                    </div>
                    <div class="tile-sub">${currentCollection === "roger-conti-63-151" ? ocrText : lastTrainedText}</div>
                `;
                tile.onclick = () => {
                    window.location.href = "training_position_detail.html?id=" + encodeURIComponent(item.id);
                };
                grid.appendChild(tile);
            });
        }

        async function loadCatalogFromDb() {
            const { data, error } = await supabaseClient
                .from("training_positions_catalog")
                .select("id,set_key,number,title,pdf_page,discipline,difficulty,description,comments,source_quality,ocr_status")
                .eq("set_key", currentCollection)
                .order("number", { ascending: true });
            if (error) throw error;
            return (data || []).map((item) => ({
                ...item,
                pdfPage: item.pdf_page,
                ocrStatus: item.ocr_status,
                sourceQuality: item.source_quality
            }));
        }

        async function loadCatalogFallback() {
            const res = await fetch(COLLECTIONS[currentCollection].file, { cache: "no-store" });
            return await res.json();
        }

        async function loadProgressFromDb(ids) {
            progressMap = {};
            if (!ids.length) return;
            const { data, error } = await supabaseClient
                .from("training_position_progress")
                .select("position_id,hits,misses,notes,last_trained")
                .eq("user_id", currentUser.id)
                .in("position_id", ids);
            if (error) throw error;
            (data || []).forEach((row) => {
                progressMap[row.position_id] = row;
            });
        }

        async function loadOcrFromDb(ids) {
            ocrMap = {};
            if (!ids.length) return;
            const { data, error } = await supabaseClient
                .from("training_position_ocr_requests")
                .select("position_id,status,created_at")
                .in("position_id", ids)
                .order("created_at", { ascending: false });
            if (error) throw error;
            (data || []).forEach((row) => {
                if (!ocrMap[row.position_id]) {
                    ocrMap[row.position_id] = row;
                }
            });
        }

        async function loadCollection() {
            setNotice("");
            try {
                positions = await loadCatalogFromDb();
                usingDb = true;
                await loadProgressFromDb(positions.map((item) => item.id));
                await loadOcrFromDb(positions.map((item) => item.id));
            } catch (error) {
                console.warn("Positionstraining DB-Fallback aktiv:", error);
                usingDb = false;
                positions = await loadCatalogFallback();
                loadLocalProgress();
                ocrMap = {};
                setNotice("Datenbanktabellen für Positionstraining noch nicht aktiv. Es läuft aktuell der JSON/localStorage-Fallback. SQL aus sql/training_positions.sql in Supabase ausführen.");
            }
        }

        async function init() {
            currentUser = await requireAuth();
            if (!currentUser) return;
            if (await hasAdminAccess(currentUser)) {
                document.getElementById('workerBtn').style.display = 'inline-flex';
            }
            await loadCollection();
            render();
        }

        init();
    </script>
</body>
</html>
