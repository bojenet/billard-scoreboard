<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Scoreboard</title>

    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(180deg, #0f1c3f, #0a122b);
            color: white;
        }

        /* ================= TOPBAR ================= */

        .topbar {
            height: 140px;
            background: linear-gradient(180deg, #162b66, #0f1c3f);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 80px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .player-name {
            font-size: 70px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .player-name.yellow {
            color: #ffd84a;
        }

        .player-sub {
            font-size: 18px;
            opacity: .7;
            margin-top: 6px;
        }

        .top-center {
            text-align: center;
        }

        .game-label {
            font-size: 13px;
            letter-spacing: 3px;
            opacity: .5;
        }

        .game-time {
            font-size: 30px;
            font-weight: 700;
            margin-top: 5px;
        }

        .discipline-info {
            font-size: 18px;
            margin-top: 6px;
            opacity: .6;
        }

        /* ================= MAIN ================= */

        .main {
            flex: 1;
            /* nimmt automatisch verfügbaren Platz */
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 80px;
            padding: 20px 40px;
        }

        .player {
            width: 650px;
            border-radius: 30px;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: .25s ease;
        }

        /* Aktiv Weiß */
        .player.active-white {
            background: #ffffff;
            color: #111;
            box-shadow: 0 25px 70px rgba(255, 255, 255, 0.15);
        }

        /* Aktiv Gelb */
        .player.active-yellow {
            background: #ffd84a;
            color: #111;
            box-shadow: 0 25px 70px rgba(255, 216, 74, 0.25);
        }

        /* Inaktiv */
        .player.inactive {
            background: #18295e;
            opacity: .4;
        }

        /* SCORE */

        .score {
            font-size: 360px;
            font-weight: 800;
            line-height: 1;
        }

        .discipline-big {
            font-size: 30px;
            font-weight: 700;
            margin-bottom: 25px;
            text-align: center;
            letter-spacing: 1px;
        }

        /* STATS */

        /* ================= FLAT STATS ================= */

        .stats-flat {
            display: flex;
            gap: 80px;
            margin-top: 40px;
            align-items: center;
        }

        .stat-flat {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: 600;
        }

        .stat-title {
            font-size: 20px;
            letter-spacing: 2px;
            opacity: .6;
            margin-bottom: 6px;
        }

        .stat-flat span:last-child {
            font-size: 48px;
        }

        /* ================= CENTER ================= */



        .center-wrapper {
            position: relative;
            width: 240px;
            height: 340px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .center-box {
            width: 240px;
            height: 240px;
            border-radius: 30px;
            background: linear-gradient(145deg, #1c3380, #162b66);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .series-display {
            position: absolute;
            top: 320px;
            /* exakt unter der Box */
            width: 100%;
            text-align: center;
            font-size: 130px;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
        }

        #totalInnings {
            font-size: 150px;
            /* gewünschte Größe */
            font-weight: 700;
        }

        /* ================= BUTTONS ================= */

        .controls {
            display: flex;
            justify-content: center;
            /* horizontal zentrieren */
            align-items: center;
            padding: 20px 0 40px 0;
        }

        .button-row button {
            background: #1c3380;
            color: white;
            border: none;
            padding: 28px 48px;
            /* deutlich größer */
            font-size: 28px;
            /* größere Schrift */
            font-weight: 600;
            border-radius: 22px;
            cursor: pointer;
            transition: .2s ease;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.5);
            min-width: 120px;
            /* gleiche Breite */
        }

        .button-row button:hover {
            background: #2f4fe0;
            transform: translateY(-3px);
        }

        .button-row button:active {
            transform: translateY(2px);
        }



        /* ================= END OVERLAY ================= */

        .end-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(6, 15, 40, .9);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .end-box {
            width: 80%;
            max-width: 1400px;
            max-height: 90vh;
            overflow: auto;
            background: linear-gradient(180deg, #162b66, #0f1c3f);
            padding: 60px 80px;
            border-radius: 40px;
            box-shadow: 0 40px 120px rgba(0, 0, 0, .7);
        }

        .end-box h1 {
            font-size: 56px;
            margin-bottom: 50px;
        }

        /* Spieler Zusammenfassung */

        .end-stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 50px;
        }

        .end-player {
            text-align: center;
        }

        .end-player h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .end-player div {
            font-size: 20px;
            margin: 8px 0;
        }

        /* Meta Infos */

        .end-meta {
            text-align: center;
            margin-bottom: 60px;
            font-size: 20px;
            opacity: .8;
        }

        .end-meta-top {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 40px;
            margin-bottom: 50px;
            font-size: 18px;
            opacity: .85;
        }

        .end-discipline {
            font-size: 18px;
            opacity: .7;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, .1);
            padding: 6px 0;
        }

        /* Serien Tabellen */

        .series-tables {
            display: flex;
            justify-content: center;
            gap: 80px;
            margin-bottom: 60px;
            flex-wrap: wrap;
        }

        .series-block {
            background: #0c1a45;
            padding: 30px;
            border-radius: 25px;
            min-width: 350px;
        }

        .series-block h3 {
            text-align: center;
            margin-bottom: 20px;
        }

        .series-block table {
            width: 100%;
            border-collapse: collapse;
            font-size: 16px;
        }

        .series-block th {
            background: #1c3380;
            padding: 10px;
        }

        .series-block td {
            padding: 8px;
        }

        .series-block th,
        .series-block td {
            border: 1px solid #2c4fc7;
            text-align: center;
        }

        /* Buttons */

        .end-buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }

        .end-buttons button {
            padding: 20px 50px;
            font-size: 22px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            transition: .2s;
        }

        .save-btn {
            background: #3c5eff;
            color: white;
        }

        .save-btn:hover {
            background: #5675ff;
        }

        .discard-btn {
            background: #2a2a2a;
            color: white;
        }

        .discard-btn:hover {
            background: #444;
        }

        .series-white {
            color: #ffffff;
        }

        .series-yellow {
            color: #ffd84a;
        }

        @keyframes flash {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(1.5);
            }

            100% {
                transform: scale(1);
            }
        }

        .flash {
            animation: flash .35s ease;
        }
    </style>
</head>

<body>

    <!-- ================= TOPBAR ================= -->

    <div class="topbar">
        <div>
            <div class="player-name" id="player1Name"></div>
            <div class="player-sub" id="player1Info"></div>
        </div>

        <div class="top-center">
            <div class="game-label">GAME TIME</div>
            <div class="game-time" id="gameTime">00:00</div>
            <div class="discipline-info" id="disciplineInfo"></div>
        </div>

        <div style="text-align:right;">
            <div class="player-name yellow" id="player2Name"></div>
            <div class="player-sub" id="player2Info"></div>
        </div>
    </div>

    <!-- ================= MAIN ================= -->

    <div class="main">

        <!-- PLAYER 1 -->
        <div class="player active-white" id="p1" onclick="playerClick(1)">

            <div class="discipline-big" id="discipline1Big"></div>

            <div class="score" id="score1">0</div>

            <div class="stats-flat">
                <div class="stat-flat">
                    <span class="stat-title">A</span>
                    <span id="inn1Display">0</span>
                </div>

                <div class="stat-flat">
                    <span class="stat-title">DS</span>
                    <span id="avg1">0.000</span>
                </div>

                <div class="stat-flat">
                    <span class="stat-title">HR</span>
                    <span id="hs1">0</span>
                </div>
            </div>

            <div id="list1" style="margin-top:15px;"></div>
        </div>


        <!-- CENTER -->

        <div id="nachstossLabel" style="
    position:absolute;
    top: 250px;
    width:100%;
    text-align:center;
    font-size:28px;
    font-weight:600;
    color:#ffd84a;
    display:none;">
            Nachstoß
        </div>

        <div class="center-wrapper">

            <div class="center-box">
                <div class="center-number" id="totalInnings">1</div>
            </div>

            <div id="currentSeries" class="series-display"></div>

        </div>


        <!-- PLAYER 2 -->
        <div class="player inactive" id="p2" onclick="playerClick(2)">

            <div class="discipline-big" id="discipline2Big"></div>

            <div class="score" id="score2">0</div>

            <div class="stats-flat">
                <div class="stat-flat">
                    <span class="stat-title">A</span>
                    <span id="inn2Display">0</span>
                </div>

                <div class="stat-flat">
                    <span class="stat-title">DS</span>
                    <span id="avg2">0.000</span>
                </div>

                <div class="stat-flat">
                    <span class="stat-title">HR</span>
                    <span id="hs2">0</span>
                </div>
            </div>

            <div id="list2" style="margin-top:15px;"></div>
        </div>

    </div>

    <!-- ================= BUTTONS ================= -->

    <div class="controls">

        <div class="button-row">
            <button onclick="addPoints(1)">+1</button>
            <button onclick="addPoints(5)">+5</button>
            <button class="main-btn" onclick="addPoints(10)">+10</button>
            <button onclick="addPoints(-1)">-1</button>
            <button onclick="undo()">Undo</button>
            <button class="abort-btn" onclick="abortMatch()">Zurück</button>
        </div>

    </div>

    <!-- ================= END SCREEN ================= -->

    <div id="endScreen" class="end-overlay">
        <div class="end-box">

            <h1 id="winnerText"></h1>

            <!-- META OBEN -->
            <div class="end-meta-top">

                <div class="meta-row">
                    <span>Dauer:</span>
                    <span id="endDuration"></span>
                </div>
            </div>

            <!-- SPIELER DATEN -->
            <div class="end-stats">

                <div class="end-player">
                    <h2 id="endName1"></h2>
                    <div class="end-discipline" id="endDisc1"></div>
                    <div>Punkte: <span id="endScore1"></span></div>
                    <div>Aufnahmen: <span id="endInnings"></span></div>
                    <div>DS: <span id="endAvg1"></span></div>
                    <div>HR: <span id="endHs1"></span></div>
                    <div>Prozent: <span id="endPercent1"></span></div>
                </div>

                <div class="end-player">
                    <h2 id="endName2"></h2>
                    <div class="end-discipline" id="endDisc2"></div>
                    <div>Punkte: <span id="endScore2"></span></div>
                    <div>Aufnahmen: <span id="endInnings"></span></div>
                    <div>DS: <span id="endAvg2"></span></div>
                    <div>HR: <span id="endHs2"></span></div>
                    <div>Prozent: <span id="endPercent2"></span></div>
                </div>

            </div>

            <!-- SERIEN -->
            <div class="series-tables">

                <div class="series-block">
                    <h3 id="seriesTitle1"></h3>
                    <table id="seriesTable1"></table>
                </div>

                <div class="series-block">
                    <h3 id="seriesTitle2"></h3>
                    <table id="seriesTable2"></table>
                </div>

            </div>

            <div class="end-buttons">
                <button class="save-btn" onclick="saveMatch()">Partie speichern</button>
                <button class="discard-btn" onclick="discardMatch()">Verwerfen</button>
            </div>

        </div>
    </div>
    <!-- ================= ABORT OVERLAY ================= -->
    <div id="abortOverlay" class="end-overlay">
        <div class="end-box" style="max-width:700px; text-align:center;">

            <h1>Partie wirklich abbrechen?</h1>

            <div style="margin-top:40px;" class="end-buttons">
                <button class="discard-btn" onclick="closeAbort()">Weiter spielen</button>
                <button class="save-btn" onclick="confirmAbort()">Abbrechen</button>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>


    <script>

        const matchId = new URLSearchParams(window.location.search).get("match");

        let score1 = 0, score2 = 0;
        let inn1 = 0, inn2 = 0;
        let totalInnings = 1;
        let activePlayer = 1;
        let finished = 0;
        let series1 = 0, series2 = 0;
        let high1 = 0, high2 = 0;
        let target1 = 0, target2 = 0;
        let history = [];
        let innings1 = [];
        let innings2 = [];
        let seconds = 0;
        let maxInnings = 0;
        let timerInterval;

        /* ================= TIMER ================= */

        function startTimer() {
            timerInterval = setInterval(() => {
                if (!finished) {
                    seconds++;
                    let m = Math.floor(seconds / 60);
                    let s = seconds % 60;
                    document.getElementById("gameTime").innerText =
                        String(m).padStart(2, "0") + ":" +
                        String(s).padStart(2, "0");
                }
            }, 1000);
        }

        /* ================= LOAD MATCH ================= */

        async function loadMatch() {

            const { data: d, error } = await supabaseClient
                .from("matches")
                .select("*")
                .eq("id", matchId)
                .single();

            if (error) {
                console.error(error);
                return;
            }

            document.getElementById("player1Name").innerText = d.player1;
            document.getElementById("player2Name").innerText = d.player2;

            target1 = Number(d.target1 || 0);
            target2 = Number(d.target2 || 0);
            maxInnings = Number(d.maxInnings || 0);

            score1 = d.score1 || 0;
            score2 = d.score2 || 0;
            inn1 = d.inn1 || 0;
            inn2 = d.inn2 || 0;
            totalInnings = d.totalInnings || 1;
            activePlayer = d.activePlayer || 1;
            finished = d.finished || 0;

            document.getElementById("discipline1Big").innerText =
                d.discipline1 + " – " + d.target1 +
                (maxInnings > 0 ? "/" + maxInnings : "");

            document.getElementById("discipline2Big").innerText =
                d.discipline2 + " – " + d.target2 +
                (maxInnings > 0 ? "/" + maxInnings : "");

            updateUI();
            startTimer();
        }

        /* ================= UPDATE UI ================= */

        function updateUI() {

            score1Elem = document.getElementById("score1");
            score2Elem = document.getElementById("score2");

            score1Elem.innerText = score1;
            score2Elem.innerText = score2;

            document.getElementById("totalInnings").innerText = totalInnings;

            let avg1 = inn1 > 0 ? (score1 / inn1).toFixed(3) : "0.000";
            let avg2 = inn2 > 0 ? (score2 / inn2).toFixed(3) : "0.000";
            let percent1 = target1 > 0 ? ((score1 / target1) * 100).toFixed(1) : "0.0";
            let percent2 = target2 > 0 ? ((score2 / target2) * 100).toFixed(1) : "0.0";

            document.getElementById("avg1").innerText = avg1;
            document.getElementById("avg2").innerText = avg2;
            document.getElementById("hs1").innerText = high1;
            document.getElementById("hs2").innerText = high2;
            document.getElementById("inn1Display").innerText = inn1;
            document.getElementById("inn2Display").innerText = inn2;

            document.getElementById("list1").innerText = innings1.join(",");
            document.getElementById("list2").innerText = innings2.join(",");

            p1.className = activePlayer === 1 ? "player active-white" : "player inactive";
            p2.className = activePlayer === 2 ? "player active-yellow" : "player inactive";
            // Scores
            document.getElementById("score1").innerText = score1;
            document.getElementById("score2").innerText = score2;

            // Serie im Center anzeigen
            let seriesDisplay = document.getElementById("currentSeries");

            if (activePlayer === 1) {

                seriesDisplay.innerText =
                    series1 > 0 ? "+" + series1 : "";

                seriesDisplay.style.color = "#ffffff";

            } else {

                seriesDisplay.innerText =
                    series2 > 0 ? "+" + series2 : "";

                seriesDisplay.style.color = "#ffd84a";
            }
            let nachstoss = document.getElementById("nachstossLabel");

            if (target1 > 0 && score1 >= target1 && inn1 > inn2) {
                nachstoss.style.display = "block";
            }
            else if (target2 > 0 && score2 >= target2 && inn2 > inn1) {
                nachstoss.style.display = "block";
            }
            else {
                nachstoss.style.display = "none";
            }

        }

        /* ================= POINTS ================= */

        function addPoints(value) {

            if (finished) return;

            saveState();

            if (activePlayer === 1) {

                series1 += value;
                if (series1 < 0) series1 = 0;

                // 🔒 Begrenzung auf Ziel
                if (target1 > 0 && score1 + series1 > target1) {
                    series1 = target1 - score1;
                }

            } else {

                series2 += value;
                if (series2 < 0) series2 = 0;

                // 🔒 Begrenzung auf Ziel
                if (target2 > 0 && score2 + series2 > target2) {
                    series2 = target2 - score2;
                }
            }

            updateUI();
        }

        /* ================= SWITCH ================= */

        function switchTo(p) {

            if (finished) return;
            if (p === activePlayer) return;

            saveState();

            if (activePlayer === 1) {

                // Serie wird jetzt verbucht
                score1 += series1;

                if (series1 > high1)
                    high1 = series1;

                innings1.push(series1);

                series1 = 0;
                inn1++;

            } else {

                score2 += series2;

                if (series2 > high2)
                    high2 = series2;

                innings2.push(series2);

                series2 = 0;
                inn2++;
            }

            // Neue Gesamtaufnahme
            if (activePlayer === 2 && p === 1)
                totalInnings++;

            activePlayer = p;

            updateUI();
            checkWinner();
            updateMatchInDB();
        }

        function playerClick(p) {

            if (finished) return;

            // Wenn aktiver Spieler → +1 Punkt
            if (p === activePlayer) {
                addPoints(1);
            }
            // Wenn anderer Spieler → Wechsel
            else {
                switchTo(p);
            }
        }

        async function updateMatchInDB() {

            const { error } = await supabaseClient
                .from("matches")
                .update({
                    score1,
                    score2,
                    inn1,
                    inn2,
                    totalInnings,
                    activePlayer,
                    finished
                })
                .eq("id", matchId);

            if (error) {
                console.error("Update Fehler:", error);
            }
        }

        function checkWinner() {

            // Beide Spieler haben gleich viele Aufnahmen gespielt
            if (inn1 === inn2) {

                // Zielprüfung jetzt erst erlauben
                if (target1 > 0 && score1 >= target1 && score2 < target2) {
                    showEnd(1);
                    return;
                }

                if (target2 > 0 && score2 >= target2 && score1 < target1) {
                    showEnd(2);
                    return;
                }

                // Beide Ziel erreicht → höhere Punktzahl gewinnt
                if (target1 > 0 && target2 > 0 &&
                    score1 >= target1 && score2 >= target2) {

                    if (score1 > score2) showEnd(1);
                    else if (score2 > score1) showEnd(2);
                    else showEnd(0);

                    return;
                }
            }

            // Max-Aufnahmen-Regel bleibt
            if (maxInnings > 0 && totalInnings >= maxInnings && inn1 === inn2) {

                let percent1 = target1 > 0 ? score1 / target1 : 0;
                let percent2 = target2 > 0 ? score2 / target2 : 0;

                if (percent1 > percent2) showEnd(1);
                else if (percent2 > percent1) showEnd(2);
                else showEnd(0);
            }
        }



        /* ================= UNDO ================= */

        function saveState() {
            history.push({
                score1, score2, inn1, inn2, totalInnings,
                activePlayer, series1, series2,
                high1, high2, finished,
                innings1: [...innings1],
                innings2: [...innings2]
            });
        }

        function undo() {
            if (history.length === 0) return;
            const prev = history.pop();
            score1 = prev.score1;
            score2 = prev.score2;
            inn1 = prev.inn1;
            inn2 = prev.inn2;
            totalInnings = prev.totalInnings;
            activePlayer = prev.activePlayer;
            series1 = prev.series1;
            series2 = prev.series2;
            high1 = prev.high1;
            high2 = prev.high2;
            finished = prev.finished;
            innings1 = [...prev.innings1];
            innings2 = [...prev.innings2];
            updateUI();
        }

        /* ================= END ================= */

        function showEnd(winner) {

            finished = 1;

            let avg1 = inn1 > 0 ? (score1 / inn1).toFixed(3) : "0.000";
            let avg2 = inn2 > 0 ? (score2 / inn2).toFixed(3) : "0.000";

            let percent1 = target1 > 0 ? ((score1 / target1) * 100).toFixed(1) : "0.0";
            let percent2 = target2 > 0 ? ((score2 / target2) * 100).toFixed(1) : "0.0";

            let durationMin = Math.floor(seconds / 60);
            let durationSec = seconds % 60;
            let durationStr =
                String(durationMin).padStart(2, "0") + ":" +
                String(durationSec).padStart(2, "0");

            if (winner === 1) {
                document.getElementById("winnerText").innerText =
                    player1Name.innerText + " gewinnt";
            }
            else if (winner === 2) {
                document.getElementById("winnerText").innerText =
                    player2Name.innerText + " gewinnt";
            }
            else {
                document.getElementById("winnerText").innerText =
                    "Unentschieden";
            }

            document.getElementById("endName1").innerText = player1Name.innerText;
            document.getElementById("endName2").innerText = player2Name.innerText;

            document.getElementById("endScore1").innerText = score1;
            document.getElementById("endScore2").innerText = score2;

            document.getElementById("endAvg1").innerText = avg1;
            document.getElementById("endAvg2").innerText = avg2;

            document.getElementById("endHs1").innerText = high1;
            document.getElementById("endHs2").innerText = high2;

            document.getElementById("endPercent1").innerText = percent1 + " %";
            document.getElementById("endPercent2").innerText = percent2 + " %";

            document.getElementById("endInnings").innerText = totalInnings;
            document.getElementById("endDuration").innerText = durationStr;

            document.getElementById("endScreen").style.display = "flex";

            buildSeriesTable(
                "seriesTable1",
                innings1,
                score1,
                player1Name.innerText
            );

            buildSeriesTable(
                "seriesTable2",
                innings2,
                score2,
                player2Name.innerText
            );
            document.getElementById("endDiscipline").innerText =
                document.getElementById("discipline1Big").innerText;

            document.getElementById("endTargetMeta").innerText =
                target1 + (maxInnings > 0 ? " / " + maxInnings : "");
            const disciplineText =
                document.getElementById("discipline1Big").innerText;

            document.getElementById("endDisc1").innerText = disciplineText;
            document.getElementById("endDisc2").innerText = disciplineText;

        }

        function goHome() {
            window.location.href = "/";
        }

        async function saveMatch() {

            const data = {
                matchId,
                player1: player1Name.innerText,
                player2: player2Name.innerText,
                score1,
                score2,
                innings: totalInnings,
                avg1: inn1 > 0 ? (score1 / inn1).toFixed(3) : "0.000",
                avg2: inn2 > 0 ? (score2 / inn2).toFixed(3) : "0.000",
                hs1: high1,
                hs2: high2,
                series1: innings1,
                series2: innings2,
                duration: seconds
            };

            const { error } = await supabaseClient
                .from("archive")
                .insert([data]);

            if (error) {
                console.error(error);
                return;
            }

            window.location.href = "/";
        }

        function buildSeriesTable(tableId, seriesArray, finalScore, name) {

            const table = document.getElementById(tableId);
            table.innerHTML = "";

            let cumulative = 0;

            let header = `
        <tr>
            <th>Aufn</th>
            <th>Serie</th>
            <th>Gesamt</th>
        </tr>
    `;

            table.innerHTML += header;

            for (let i = 0; i < seriesArray.length; i++) {

                cumulative += seriesArray[i];

                table.innerHTML += `
            <tr>
                <td>${i + 1}</td>
                <td>${seriesArray[i]}</td>
                <td>${cumulative}</td>
            </tr>
        `;
            }

            // Falls letzte Serie noch offen war (z.B. Sieg)
            if (cumulative < finalScore) {
                table.innerHTML += `
            <tr>
                <td>${seriesArray.length + 1}</td>
                <td>${finalScore - cumulative}</td>
                <td>${finalScore}</td>
            </tr>
        `;
            }
        }

        loadMatch();

        function abortMatch() {

            if (finished) {
                window.location.href = "/";
                return;
            }

            document.getElementById("abortOverlay").style.display = "flex";
        }

        function closeAbort() {
            document.getElementById("abortOverlay").style.display = "none";
        }

        function confirmAbort() {

            finished = 1;

            clearInterval(timerInterval);

            document.getElementById("abortOverlay").style.display = "none";

            window.location.href = "/";
        }
        function flashSeries() {

            const el = document.getElementById("currentSeries");

            el.classList.remove("flash");
            void el.offsetWidth;
            el.classList.add("flash");
        }

    </script>
</body>

</html>
