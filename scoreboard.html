<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Scoreboard</title>

    <style>
        html,
        body {
            margin: 0;
            height: 100%;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(180deg, #0f1c3f, #0a122b);
            color: white;
        }

        /* ================= TOPBAR ================= */

        .topbar {
            min-height: 96px;
            background: linear-gradient(180deg, #162b66, #0f1c3f);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px clamp(14px, 4vw, 80px);
            gap: clamp(8px, 2vw, 20px);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1200;
            width: 34px;
            height: 34px;
            border: 1px solid #3458b8;
            border-radius: 10px;
            background: rgba(28, 51, 128, 0.92);
            color: white;
            font-size: 16px;
            font-weight: 700;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 8px 22px rgba(0, 0, 0, 0.35);
        }

        .player-name {
            font-size: clamp(26px, 4.8vw, 70px);
            font-weight: 600;
            letter-spacing: 1px;
            line-height: 1.05;
        }

        .player-name.yellow {
            color: #ffd84a;
        }

        .player-sub {
            font-size: clamp(12px, 1.4vw, 18px);
            opacity: .7;
            margin-top: 4px;
        }

        .top-center {
            text-align: center;
        }

        .game-label {
            font-size: clamp(10px, 1vw, 13px);
            letter-spacing: clamp(1px, 0.3vw, 3px);
            opacity: .5;
        }

        .game-time {
            font-size: clamp(18px, 2.2vw, 30px);
            font-weight: 700;
            margin-top: 5px;
        }

        .discipline-info {
            font-size: clamp(12px, 1.3vw, 18px);
            margin-top: 6px;
            opacity: .6;
        }

        /* ================= MAIN ================= */

        .main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(10px, 3vw, 80px);
            padding: clamp(8px, 1.5vw, 20px) clamp(8px, 2.5vw, 40px);
            min-height: 0;
        }

        .player {
            width: min(41vw, 650px);
            border-radius: clamp(14px, 2.2vw, 30px);
            padding: clamp(12px, 2.2vw, 40px) clamp(8px, 1.6vw, 20px);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: .25s ease;
            min-width: 0;
            background: transparent;
            box-shadow: none;
        }

        /* Aktiv Weiß */
        .player.active-white {
            background: #ffffff;
            color: #111;
            box-shadow: 0 25px 70px rgba(255, 255, 255, 0.15);
        }

        /* Aktiv Gelb */
        .player.active-yellow {
            background: #ffd84a;
            color: #111;
            box-shadow: 0 25px 70px rgba(255, 216, 74, 0.25);
        }

        /* Inaktiv */
        .player.inactive-white {
            background: #122252;
            color: #ffffff;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.18);
        }

        .player.inactive-yellow {
            background: #122252;
            color: #ffd84a;
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.18);
        }

        /* SCORE */

        .score {
            font-size: clamp(88px, 21vw, 360px);
            font-weight: 800;
            line-height: 1;
        }

        .discipline-big {
            font-size: clamp(14px, 2vw, 30px);
            font-weight: 700;
            margin-bottom: clamp(8px, 1.6vw, 25px);
            text-align: center;
            letter-spacing: 1px;
        }

        /* STATS */

        /* ================= FLAT STATS ================= */

        .stats-flat {
            display: flex;
            gap: clamp(12px, 4.2vw, 80px);
            margin-top: clamp(8px, 2vw, 40px);
            align-items: center;
        }

        .stat-flat {
            display: flex;
            flex-direction: column;
            align-items: center;
            font-weight: 600;
        }

        .stat-title {
            font-size: clamp(11px, 1.2vw, 20px);
            letter-spacing: clamp(0px, 0.2vw, 2px);
            opacity: .6;
            margin-bottom: 4px;
        }

        .stat-flat span:last-child {
            font-size: clamp(22px, 3vw, 48px);
        }

        /* ================= CENTER ================= */



        .center-wrapper {
            position: relative;
            width: clamp(84px, 15vw, 240px);
            height: clamp(126px, 22vw, 340px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .center-box {
            width: clamp(84px, 15vw, 240px);
            height: clamp(84px, 15vw, 240px);
            border-radius: clamp(12px, 2vw, 30px);
            background: linear-gradient(145deg, #1c3380, #162b66);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .series-display {
            position: absolute;
            top: clamp(108px, 20.5vw, 320px);
            width: 100%;
            text-align: center;
            font-size: clamp(44px, 8vw, 130px);
            font-weight: 900;
            font-variant-numeric: tabular-nums;
        }

        #totalInnings {
            font-size: clamp(44px, 9vw, 150px);
            font-weight: 700;
        }

        /* ================= BUTTONS ================= */

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: clamp(8px, 1.6vw, 20px) clamp(8px, 1.2vw, 16px) clamp(10px, 2.4vw, 40px) clamp(8px, 1.2vw, 16px);
        }

        .button-row button {
            background: #1c3380;
            color: white;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(10px, 1.8vw, 28px) clamp(12px, 2.4vw, 48px);
            font-size: clamp(16px, 1.8vw, 28px);
            line-height: 1;
            font-weight: 600;
            border-radius: clamp(12px, 1.6vw, 22px);
            cursor: pointer;
            transition: .2s ease;
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.5);
            min-width: clamp(72px, 10vw, 120px);
        }

        .button-row {
            display: grid;
            grid-template-columns: repeat(6, minmax(0, 1fr));
            gap: clamp(6px, 1vw, 14px);
            width: min(1100px, 96vw);
        }

        .button-row button:hover {
            background: #2f4fe0;
            transform: translateY(-3px);
        }

        .button-row button:active {
            transform: translateY(2px);
        }



        /* ================= END OVERLAY ================= */

        .end-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(6, 15, 40, .9);
            backdrop-filter: blur(12px);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .end-box {
            width: 80%;
            max-width: 1400px;
            max-height: 90vh;
            overflow: auto;
            background: linear-gradient(180deg, #162b66, #0f1c3f);
            padding: 60px 80px;
            border-radius: 40px;
            box-shadow: 0 40px 120px rgba(0, 0, 0, .7);
        }

        .end-box h1 {
            font-size: 56px;
            margin-bottom: 50px;
        }

        /* Spieler Zusammenfassung */

        .end-stats {
            display: flex;
            justify-content: space-around;
            margin-bottom: 50px;
        }

        .end-player {
            text-align: center;
        }

        .end-player h2 {
            font-size: 32px;
            margin-bottom: 20px;
        }

        .end-player div {
            font-size: 20px;
            margin: 8px 0;
        }

        /* Meta Infos */

        .end-meta {
            text-align: center;
            margin-bottom: 60px;
            font-size: 20px;
            opacity: .8;
        }

        .end-meta-top {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px 40px;
            margin-bottom: 50px;
            font-size: 18px;
            opacity: .85;
        }

        .end-discipline {
            font-size: 18px;
            opacity: .7;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .meta-row {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, .1);
            padding: 6px 0;
        }

        /* Serien Tabellen */

        .series-tables {
            display: flex;
            justify-content: center;
            gap: 80px;
            margin-bottom: 60px;
            flex-wrap: wrap;
        }

        .series-block {
            background: #0c1a45;
            padding: 30px;
            border-radius: 25px;
            min-width: 350px;
        }

        .series-block h3 {
            text-align: center;
            margin-bottom: 20px;
        }

        .series-block table {
            width: 100%;
            border-collapse: collapse;
            font-size: 16px;
        }

        .series-block th {
            background: #1c3380;
            padding: 10px;
        }

        .series-block td {
            padding: 8px;
        }

        .series-block th,
        .series-block td {
            border: 1px solid #2c4fc7;
            text-align: center;
        }

        /* Buttons */

        .end-buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 20px;
        }

        .end-buttons button {
            padding: 20px 50px;
            font-size: 22px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            transition: .2s;
        }

        .save-btn {
            background: #3c5eff;
            color: white;
        }

        .save-btn:hover {
            background: #5675ff;
        }

        .discard-btn {
            background: #2a2a2a;
            color: white;
        }

        .discard-btn:hover {
            background: #444;
        }

        .series-white {
            color: #ffffff;
        }

        .series-yellow {
            color: #ffd84a;
        }

        @keyframes flash {
            0% {
                transform: scale(1);
            }

            40% {
                transform: scale(1.5);
            }

            100% {
                transform: scale(1);
            }
        }

        .flash {
            animation: flash .35s ease;
        }

        @media (max-width: 1200px) {
            .topbar {
                padding-left: 12px;
                padding-right: 12px;
            }

            .player {
                width: min(44vw, 520px);
            }
        }

        @media (max-width: 900px) {
            html,
            body {
                overflow: auto;
                height: auto;
                min-height: 100%;
            }

            .topbar {
                flex-wrap: wrap;
                justify-content: center;
                text-align: center;
            }

            .main {
                align-items: stretch;
            }

            .player {
                width: min(46vw, 380px);
                padding-left: 6px;
                padding-right: 6px;
            }

            .button-row {
                grid-template-columns: repeat(3, minmax(0, 1fr));
            }

            .end-box {
                width: 94%;
                padding: 24px 18px;
                border-radius: 20px;
            }
        }

        @media (max-width: 640px) {
            .main {
                gap: 6px;
                padding-left: 4px;
                padding-right: 4px;
            }

            .player {
                width: calc(50vw - 8px);
                border-radius: 10px;
            }

            .stats-flat {
                gap: 8px;
            }

            .series-display {
                font-size: clamp(28px, 7vw, 52px);
            }

            .button-row {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                width: 98vw;
            }

            .end-stats {
                flex-direction: column;
                gap: 18px;
            }

            .end-buttons {
                flex-direction: column;
                gap: 10px;
            }
        }
    </style>
</head>

<body>
    <button id="fullscreenBtn" class="fullscreen-btn" type="button" onclick="toggleFullscreen()" title="Vollbild starten" aria-label="Vollbild starten">⛶</button>

    <!-- ================= TOPBAR ================= -->

    <div class="topbar">
        <div>
            <div class="player-name" id="player1Name"></div>
            <div class="player-sub" id="player1Info"></div>
        </div>

        <div class="top-center">
            <div class="game-label">GAME TIME</div>
            <div class="game-time" id="gameTime">00:00:00</div>
            <div class="discipline-info" id="disciplineInfo"></div>
        </div>

        <div style="text-align:right;">
            <div class="player-name yellow" id="player2Name"></div>
            <div class="player-sub" id="player2Info"></div>
        </div>
    </div>

    <!-- ================= MAIN ================= -->

    <div class="main">

        <!-- PLAYER 1 -->
        <div class="player active-white" id="p1" onclick="playerClick(1)">

            <div class="discipline-big" id="discipline1Big"></div>

            <div class="score" id="score1">0</div>

            <div class="stats-flat">
                <div class="stat-flat">
                    <span class="stat-title">A</span>
                    <span id="inn1Display">0</span>
                </div>

                <div class="stat-flat">
                    <span class="stat-title">DS</span>
                    <span id="avg1">0.000</span>
                </div>

                <div class="stat-flat">
                    <span class="stat-title">HR</span>
                    <span id="hs1">0</span>
                </div>
            </div>

            <div id="list1" style="margin-top:15px;"></div>
        </div>


        <!-- CENTER -->

        <div id="nachstossLabel" style="
    position:absolute;
    top: 250px;
    width:100%;
    text-align:center;
    font-size:28px;
    font-weight:600;
    color:#ffd84a;
    display:none;">
            Nachstoß
        </div>

        <div class="center-wrapper">

            <div class="center-box">
                <div class="center-number" id="totalInnings">1</div>
            </div>

            <div id="currentSeries" class="series-display"></div>

        </div>


        <!-- PLAYER 2 -->
        <div class="player inactive" id="p2" onclick="playerClick(2)">

            <div class="discipline-big" id="discipline2Big"></div>

            <div class="score" id="score2">0</div>

            <div class="stats-flat">
                <div class="stat-flat">
                    <span class="stat-title">A</span>
                    <span id="inn2Display">0</span>
                </div>

                <div class="stat-flat">
                    <span class="stat-title">DS</span>
                    <span id="avg2">0.000</span>
                </div>

                <div class="stat-flat">
                    <span class="stat-title">HR</span>

                </div>
            </div>

            <div id="list2" style="margin-top:15px;"></div>
        </div>

    </div>

    <!-- ================= BUTTONS ================= -->

    <div class="controls">

        <div class="button-row">
            <button onclick="addPoints(1)">+1</button>
            <button onclick="addPoints(5)">+5</button>
            <button class="main-btn" onclick="addPoints(10)">+10</button>
            <button onclick="addPoints(-1)">-1</button>
            <button onclick="undo()">Undo</button>
            <button class="abort-btn" onclick="abortMatch()">Beenden</button>
        </div>

    </div>

    <!-- ================= END SCREEN ================= -->

    <div id="endScreen" class="end-overlay">
        <div class="end-box">

            <h1 id="winnerText"></h1>

            <!-- META OBEN -->
            <div class="end-meta-top">

                <div class="meta-row">
                    <span>Dauer:</span>
                    <span id="endDuration"></span>
                </div>
            </div>

            <!-- SPIELER DATEN -->
            <div class="end-stats">

                <div class="end-player">
                    <h2 id="endName1"></h2>
                    <div class="end-discipline" id="endDisc1"></div>
                    <div>Punkte: <span id="endScore1"></span></div>
                    <div>Aufnahmen: <span id="endInnings1"></span></div>
                    <div>DS: <span id="endAvg1"></span></div>
                    <div>HR: <span id="endHs1"></span></div>
                    <div>Prozent: <span id="endPercent1"></span></div>
                </div>

                <div class="end-player">
                    <h2 id="endName2"></h2>
                    <div class="end-discipline" id="endDisc2"></div>
                    <div>Punkte: <span id="endScore2"></span></div>
                    <div>Aufnahmen: <span id="endInnings2"></span></div>
                    <div>DS: <span id="endAvg2"></span></div>
                    <div>HR: <span id="endHs2"></span></div>

            <div class="series-tables">

                <div class="series-block">

        </div>
    </div>


    <!-- ================= BEENDEN OVERLAY ================= -->
    <div id="abortOverlay" class="end-overlay">
        <div class="end-box" style="max-width:800px; text-align:center;">

            <h1>Partie beenden?</h1>

            <div style="margin-top:20px; font-size:20px; opacity:.8;">
                Aktueller Stand:<br><br>
                <strong id="abortScoreText"></strong>
            </div>

            <div style="margin-top:50px;" class="end-buttons">
                <button class="discard-btn" onclick="closeAbort()">
                    Weiter spielen
                </button>

                <button class="save-btn" onclick="saveAndExit()">
                    Speichern
                </button>

                <button class="discard-btn" onclick="discardAndExit()">
                    Verwerfen
                </button>

        </div>
    </div>


    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>


    <script>


        const matchId = new URLSearchParams(window.location.search).get("match");

        let viewerMode = false;
        let score1 = 0, score2 = 0;
        let inn1 = 0, inn2 = 0;
        let totalInnings = 1;
        let activePlayer = 1;

        function updateFullscreenButton() {
            const btn = document.getElementById("fullscreenBtn");
            if (!btn) return;
            const active = !!document.fullscreenElement;
            btn.innerText = active ? "×" : "⛶";
            btn.title = active ? "Vollbild beenden" : "Vollbild starten";
            btn.setAttribute("aria-label", active ? "Vollbild beenden" : "Vollbild starten");
        }

        async function toggleFullscreen() {
            try {
                if (document.fullscreenElement) {
                    await document.exitFullscreen();
                } else {
                    await document.documentElement.requestFullscreen();
                }
            } catch (error) {
                alert("Vollbild konnte nicht umgeschaltet werden.");
                console.warn("Fullscreen Toggle fehlgeschlagen:", error);
            } finally {
                updateFullscreenButton();
            }
        }

        let finished = 0;
        let series1 = 0, series2 = 0;
        let high1 = 0, high2 = 0;
        let target1 = 0, target2 = 0;
        let history = [];
        let innings1 = [];
        let innings2 = [];
        let seconds = 0;
        let maxInnings = 0;
        let startedAtIso = "";
        let timerInterval;
        let channel;
        let currentUserId = "";
        let ownedPlayerNames = [];

        function normalizeEmail(value) {
            return String(value || "").trim().toLowerCase();
        }

        async function loadMatchResultRecipients(playerNames) {
            const cleanNames = Array.from(new Set((playerNames || []).map((name) => String(name || "").trim()).filter(Boolean)));
            if (!cleanNames.length) return [];

            let result = await supabaseClient
                .from("players")
                .select("id,name,email,send_match_result_email,user_id")
                .eq("user_id", currentUserId)
                .in("name", cleanNames);

            let data = result.data || [];
            let error = result.error;
            const message = String(error?.message || "").toLowerCase();

            if (error && (message.includes("user_id") || message.includes("email") || message.includes("send_match_result_email"))) {
                console.warn("players-Mailfelder noch nicht aktiv oder user_id fehlt:", error);
                return [];
            }

            if (error) {
                console.warn("Spieler-Maildaten konnten nicht geladen werden:", error);
                return [];
            }

            return data
                .filter((row) => Boolean(row.send_match_result_email) && normalizeEmail(row.email))
                .map((row) => ({
                    name: String(row.name || "").trim(),
                    email: normalizeEmail(row.email)
                }))
                .filter((row, index, list) => list.findIndex((item) => item.email === row.email) === index);
        }

        async function sendMatchResultEmails(matchPayload) {
            const recipients = await loadMatchResultRecipients([matchPayload.player1, matchPayload.player2]);
            if (!recipients.length) return { skipped: true, reason: "no-recipients" };

            const body = {
                matchId,
                recipients,
                match: matchPayload
            };

            const sendPromise = supabaseClient.functions.invoke("send-match-result", { body });
            const timeoutPromise = new Promise((resolve) => {
                setTimeout(() => resolve({ data: null, error: { message: "timeout" } }), 8000);
            });
            const result = await Promise.race([sendPromise, timeoutPromise]);

            if (result?.error) {
                console.warn("Ergebnis-Mail konnte nicht gesendet werden:", result.error);
                return { skipped: false, ok: false, error: result.error };
            }

            return { skipped: false, ok: true, data: result?.data || null };
        }

        /* ================= TIMER ================= */

        function startTimer(startedAt) {

            timerInterval = setInterval(() => {

                const startTime = new Date(startedAt).getTime();
                const now = Date.now();

                const diff = Math.floor((now - startTime) / 1000);
                seconds = diff;

                const h = Math.floor(diff / 3600);
                const m = Math.floor((diff % 3600) / 60);
                const s = diff % 60;

                document.getElementById("gameTime").innerText =
                    String(h).padStart(2, "0") + ":" +
                    String(m).padStart(2, "0") + ":" +
                    String(s).padStart(2, "0");

            }, 1000);
        }


        /* ================= LOAD MATCH ================= */

        async function loadMatch() {
            const user = await requireAuth();
            if (!user) return;
            currentUserId = user.id;
            const isAdmin = await hasAdminAccess(user);
            ownedPlayerNames = await getOwnedPlayerNames(currentUserId);

            const { data: d, error } = await supabaseClient
                .from("matches")
                .select("*")
                .eq("id", matchId)
                .single();

            if (error) {
                console.error(error);
                return;
            }

            if (!isAdmin && !isOwnedMatch(d, currentUserId, ownedPlayerNames)) {
                document.body.innerHTML = "<div style='padding:40px;font-family:Arial'>Kein Zugriff auf diese Partie.</div>";
                return;
            }

            if (d.controlMode === "remote") {
                viewerMode = true;
            } else {
                viewerMode = false;
            }


            document.getElementById("player1Name").innerText = d.player1;
            document.getElementById("player2Name").innerText = d.player2;

            target1 = Number(d.target1 || 0);
            target2 = Number(d.target2 || 0);
            maxInnings = Number(d.maxInnings || 0);

            score1 = d.score1 || 0;
            score2 = d.score2 || 0;
            inn1 = d.inn1 || 0;
            inn2 = d.inn2 || 0;
            totalInnings = d.totalInnings || 1;
            activePlayer = d.activePlayer || 1;
            finished = d.finished || 0;
            series1 = d.series1 || 0;
            series2 = d.series2 || 0;
            high1 = d.high1 || 0;
            high2 = d.high2 || 0;
            reconcileInningsLists();

            document.getElementById("discipline1Big").innerText =
                d.discipline1 + " – " + d.target1 +
                (maxInnings > 0 ? "/" + maxInnings : "");

            document.getElementById("discipline2Big").innerText =
                d.discipline2 + " – " + d.target2 +
                (maxInnings > 0 ? "/" + maxInnings : "");

            updateUI();
            startedAtIso = d.started_at || "";
            startTimer(d.started_at);
            subscribeToMatch();
            showEndIfFinished();

            applyControlMode();
            showQRTemporarily();


            console.log("started_at:", d.started_at);
            console.log(d.controlMode);
            console.log("viewerMode:", viewerMode);

        }

        function applyControlMode() {

            const controls = document.querySelector(".controls");

            console.log("applyControlMode läuft – viewerMode:", viewerMode);

            if (!controls) {
                console.log("KEINE .controls gefunden!");
                return;
            }

            if (viewerMode) {

                controls.style.display = "none";

                document.getElementById("p1").onclick = null;
                document.getElementById("p2").onclick = null;

            } else {

                controls.style.display = "flex";
            }
        }




        function showQRTemporarily() {

            const qrBox = document.getElementById("qrBox");
            if (!qrBox) return;

            const remoteUrl =
                window.location.origin +
                "/remote.html?match=" + matchId;

            qrBox.style.display = "block";
            document.getElementById("qrcode").innerHTML = "";

            new QRCode(document.getElementById("qrcode"), {
                text: remoteUrl,
                width: 180,
                height: 180
            });

            setTimeout(() => {
                qrBox.style.display = "none";
            }, 60000);
        }


        /* ================= UPDATE UI ================= */

        function updateUI() {

            score1Elem = document.getElementById("score1");
            score2Elem = document.getElementById("score2");

            score1Elem.innerText = score1;
            score2Elem.innerText = score2;

            document.getElementById("totalInnings").innerText = totalInnings;

            let avg1 = inn1 > 0 ? (score1 / inn1).toFixed(3) : "0.000";
            let avg2 = inn2 > 0 ? (score2 / inn2).toFixed(3) : "0.000";
            let percent1 = target1 > 0 ? ((score1 / target1) * 100).toFixed(1) : "0.0";
            let percent2 = target2 > 0 ? ((score2 / target2) * 100).toFixed(1) : "0.0";

            document.getElementById("avg1").innerText = avg1;
            document.getElementById("avg2").innerText = avg2;
            document.getElementById("hs1").innerText = high1;
            document.getElementById("hs2").innerText = high2;
            document.getElementById("inn1Display").innerText = inn1;
            document.getElementById("inn2Display").innerText = inn2;

            document.getElementById("list1").innerText = innings1.join(",");
            document.getElementById("list2").innerText = innings2.join(",");

            p1.className = activePlayer === 1 ? "player active-white" : "player inactive-white";
            p2.className = activePlayer === 2 ? "player active-yellow" : "player inactive-yellow";
            // Scores
            document.getElementById("score1").innerText = score1;
            document.getElementById("score2").innerText = score2;

            // Serie im Center anzeigen
            let seriesDisplay = document.getElementById("currentSeries");

            if (activePlayer === 1) {

                seriesDisplay.innerText =
                    series1 > 0 ? "+" + series1 : "";

                seriesDisplay.style.color = "#ffffff";

            } else {

                seriesDisplay.innerText =
                    series2 > 0 ? "+" + series2 : "";

                seriesDisplay.style.color = "#ffd84a";
            }
            let nachstoss = document.getElementById("nachstossLabel");

            const showNachstossByTargetP1 =
                target1 > 0 &&
                score1 >= target1 &&
                inn1 > inn2;

            const showNachstossByMaxForP2 =
                maxInnings > 0 &&
                inn2 >= maxInnings &&
                inn1 < inn2;

            nachstoss.style.display =
                (showNachstossByTargetP1 || showNachstossByMaxForP2)
                    ? "block"
                    : "none";

        }

        /* ================= POINTS ================= */

        async function addPoints(value) {

            if (finished) return;

            saveState();

            if (activePlayer === 1) {

                series1 += value;
                if (series1 < 0) series1 = 0;

                // 🔒 Begrenzung auf Ziel
                if (target1 > 0 && score1 + series1 > target1) {
                    series1 = target1 - score1;
                }

            } else {

                series2 += value;
                if (series2 < 0) series2 = 0;

                // 🔒 Begrenzung auf Ziel
                if (target2 > 0 && score2 + series2 > target2) {
                    series2 = target2 - score2;
                }
            }

            updateUI();
            await updateMatchInDB();
        }

        /* ================= SWITCH ================= */

        function switchTo(p) {

            if (finished) return;
            if (p === activePlayer) return;

            saveState();

            if (activePlayer === 1) {

                // Serie wird jetzt verbucht
                score1 += series1;

                if (series1 > high1)
                    high1 = series1;

                innings1.push(series1);

                series1 = 0;
                inn1++;

            } else {

                score2 += series2;

                if (series2 > high2)
                    high2 = series2;

                innings2.push(series2);

                series2 = 0;
                inn2++;
            }

            // Neue Gesamtaufnahme
            if (activePlayer === 2 && p === 1)
                totalInnings++;

            activePlayer = p;

            updateUI();
            checkWinner();
            updateMatchInDB();
        }

        function playerClick(p) {

            if (finished) return;

            // Wenn aktiver Spieler → +1 Punkt
            if (p === activePlayer) {
                addPoints(1);
            }
            // Wenn anderer Spieler → Wechsel
            else {
                switchTo(p);
            }
        }

        async function updateMatchInDB() {

            const { error } = await supabaseClient
                .from("matches")
                .update({
                    score1,
                    score2,
                    inn1,
                    inn2,
                    totalInnings,
                    activePlayer,
                    finished,
                    series1,
                    series2,
                    high1,
                    high2
                })
                .eq("id", matchId);

            if (error) {
                console.error("Update Fehler:", error);
            }
        }

        function checkWinner() {

            // Beide Spieler haben gleich viele Aufnahmen gespielt
            if (inn1 === inn2) {

                // Zielprüfung jetzt erst erlauben
                if (target1 > 0 && score1 >= target1 && score2 < target2) {
                    showEnd(1);
                    return;
                }

                if (target2 > 0 && score2 >= target2 && score1 < target1) {
                    showEnd(2);
                    return;
                }

                // Beide Ziel erreicht → höhere Punktzahl gewinnt
                if (target1 > 0 && target2 > 0 &&
                    score1 >= target1 && score2 >= target2) {

                    if (score1 > score2) showEnd(1);
                    else if (score2 > score1) showEnd(2);
                    else showEnd(0);

                    return;
                }
            }

            // Max-Aufnahmen-Regel:
            // totalInnings zeigt im UI die "laufende" Aufnahme (startet bei 1),
            // deshalb auf tatsächlich gespielte Aufnahmen je Spieler prüfen.
            if (maxInnings > 0 && inn1 === inn2 && inn1 >= maxInnings) {

                let percent1 = target1 > 0 ? score1 / target1 : 0;
                let percent2 = target2 > 0 ? score2 / target2 : 0;

                if (percent1 > percent2) showEnd(1);
                else if (percent2 > percent1) showEnd(2);
                else showEnd(0);
            }
        }

        function getWinnerFromCurrentState() {
            if (score1 > score2) return 1;
            if (score2 > score1) return 2;
            return 0;
        }

        function showEndIfFinished() {
            if (!finished) return;
            const endScreen = document.getElementById("endScreen");
            if (!endScreen || endScreen.style.display === "flex") return;
            showEnd(getWinnerFromCurrentState());
        }



        /* ================= UNDO ================= */

        function saveState() {
            history.push({
                score1, score2, inn1, inn2, totalInnings,
                activePlayer, series1, series2,
                high1, high2, finished,
                innings1: [...innings1],
                innings2: [...innings2]
            });
        }

        async function undo() {
            if (history.length === 0) return;
            const prev = history.pop();
            score1 = prev.score1;
            score2 = prev.score2;
            inn1 = prev.inn1;
            inn2 = prev.inn2;
            totalInnings = prev.totalInnings;
            activePlayer = prev.activePlayer;
            series1 = prev.series1;
            series2 = prev.series2;
            high1 = prev.high1;
            high2 = prev.high2;
            finished = prev.finished;
            innings1 = [...prev.innings1];
            innings2 = [...prev.innings2];
            updateUI();
            await updateMatchInDB();
        }

        /* ================= END ================= */

        function showEnd(winner) {

            finished = 1;

            let avg1 = inn1 > 0 ? (score1 / inn1).toFixed(3) : "0.000";
            let avg2 = inn2 > 0 ? (score2 / inn2).toFixed(3) : "0.000";

            let percent1 = target1 > 0 ? ((score1 / target1) * 100).toFixed(1) : "0.0";
            let percent2 = target2 > 0 ? ((score2 / target2) * 100).toFixed(1) : "0.0";

            let durationH = Math.floor(seconds / 3600);
            let durationMin = Math.floor((seconds % 3600) / 60);
            let durationSec = seconds % 60;
            let durationStr =
                String(durationH).padStart(2, "0") + ":" +
                String(durationMin).padStart(2, "0") + ":" +
                String(durationSec).padStart(2, "0");

            if (winner === 1) {
                document.getElementById("winnerText").innerText =
                    player1Name.innerText + " gewinnt";
            }
            else if (winner === 2) {
                document.getElementById("winnerText").innerText =
                    player2Name.innerText + " gewinnt";
            }
            else {
                document.getElementById("winnerText").innerText =
                    "Unentschieden";
            }

            document.getElementById("endName1").innerText = player1Name.innerText;
            document.getElementById("endName2").innerText = player2Name.innerText;

            document.getElementById("endScore1").innerText = score1;
            document.getElementById("endScore2").innerText = score2;

            document.getElementById("endAvg1").innerText = avg1;
            document.getElementById("endAvg2").innerText = avg2;

            document.getElementById("endHs1").innerText = high1;
            document.getElementById("endHs2").innerText = high2;

            document.getElementById("endPercent1").innerText = percent1 + " %";
            document.getElementById("endPercent2").innerText = percent2 + " %";

            document.getElementById("endInnings1").innerText = inn1;
            document.getElementById("endInnings2").innerText = inn2;
            document.getElementById("endDuration").innerText = durationStr;

            document.getElementById("endScreen").style.display = "flex";

            buildSeriesTable(
                "seriesTable1",
                innings1,
                score1,
                player1Name.innerText
            );

            buildSeriesTable(
                "seriesTable2",
                innings2,
                score2,
                player2Name.innerText
            );
            document.getElementById("endDiscipline").innerText =
                document.getElementById("discipline1Big").innerText;

            document.getElementById("endTargetMeta").innerText =
                target1 + (maxInnings > 0 ? " / " + maxInnings : "");
            const disciplineText =
                document.getElementById("discipline1Big").innerText;

            document.getElementById("endDisc1").innerText = disciplineText;
            document.getElementById("endDisc2").innerText = disciplineText;

        }

        function goHome() {
            window.location.href = "/";
        }

        async function saveMatch() {

            const finalSeries1 = [...innings1];
            const finalSeries2 = [...innings2];

            // Wenn die letzte Aufnahme noch nicht per Spielerwechsel verbucht wurde,
            // beim Speichern in den Serienverlauf aufnehmen.
            if (series1 > 0 && finalSeries1.length < inn1) {
                finalSeries1.push(series1);
            }
            if (series2 > 0 && finalSeries2.length < inn2) {
                finalSeries2.push(series2);
            }

            const data = {
                score1,
                score2,
                inn1,
                inn2,
                totalInnings,
                activePlayer,
                series1,
                series2,
                high1,
                high2,
                status: 0,
                finished: 1
            };

            const { error } = await supabaseClient
                .from("matches")
                .update(data)
                .eq("id", matchId);

            if (error) {
                console.error("Speichern fehlgeschlagen:", error);
                alert("Speichern fehlgeschlagen. Bitte erneut versuchen.");
                return;
            }

            const archiveData = {
                matchId,
                created_by: currentUserId,
                player1: player1Name.innerText,
                player2: player2Name.innerText,
                score1,
                score2,
                innings: totalInnings,
                avg1: inn1 > 0 ? (score1 / inn1).toFixed(3) : "0.000",
                avg2: inn2 > 0 ? (score2 / inn2).toFixed(3) : "0.000",
                hs1: high1,
                hs2: high2,
                series1: finalSeries1,
                series2: finalSeries2,
                duration: seconds,
                status: 0
            };

            const matchMailPayload = {
                ...archiveData,
                discipline1: document.getElementById("discipline1Big").innerText,
                discipline2: document.getElementById("discipline2Big").innerText,
                target1,
                target2,
                maxInnings,
                startedAt: startedAtIso || new Date(Date.now() - (seconds * 1000)).toISOString(),
                finishedAt: new Date().toISOString()
            };

            try {
                localStorage.setItem(
                    "series_" + matchId,
                    JSON.stringify({
                        series1: finalSeries1,
                        series2: finalSeries2,
                        savedAt: new Date().toISOString()
                    })
                );
            } catch (e) {
                console.warn("Lokaler Serien-Cache fehlgeschlagen:", e);
            }

            const { data: existingArchiveRows, error: existingArchiveError } = await supabaseClient
                .from("archive")
                .select("id")
                .eq("matchId", matchId)
                .order("created_at", { ascending: false })
                .limit(1);

            if (existingArchiveError) {
                console.error("Archivsuche fehlgeschlagen:", existingArchiveError);
                window.location.href = "/";
                return;
            }

            let archiveWriteError = null;
            if (existingArchiveRows && existingArchiveRows.length > 0) {
                const existingId = existingArchiveRows[0].id;
                const { error } = await supabaseClient
                    .from("archive")
                    .update(archiveData)
                    .eq("id", existingId);
                archiveWriteError = error;
            } else {
                const { error } = await supabaseClient
                    .from("archive")
                    .insert([archiveData]);
                archiveWriteError = error;
            }

            if (archiveWriteError) {
                console.error("Archivspeicherung fehlgeschlagen:", archiveWriteError);
            }

            await sendMatchResultEmails(matchMailPayload);

            window.location.href = "/";
        }

        function buildSeriesTable(tableId, seriesArray, finalScore, name) {

            const table = document.getElementById(tableId);
            table.innerHTML = "";

            let cumulative = 0;

            let header = `
        <tr>
            <th>Aufn</th>
            <th>Serie</th>
            <th>Gesamt</th>
        </tr>
    `;

            table.innerHTML += header;

            for (let i = 0; i < seriesArray.length; i++) {

                cumulative += seriesArray[i];

                table.innerHTML += `
            <tr>
                <td>${i + 1}</td>
                <td>${seriesArray[i]}</td>
                <td>${cumulative}</td>
            </tr>
        `;
            }

            // Falls letzte Serie noch offen war (z.B. Sieg)
            if (cumulative < finalScore) {
                table.innerHTML += `
            <tr>
                <td>${seriesArray.length + 1}</td>
                <td>${finalScore - cumulative}</td>
                <td>${finalScore}</td>
            </tr>
        `;
            }
        }

        loadMatch();

        function abortMatch() {

            // Text vorbereiten
            document.getElementById("abortScoreText").innerText =
                player1Name.innerText + " " + score1 +
                " : " +
                score2 + " " + player2Name.innerText;

            document.getElementById("abortOverlay").style.display = "flex";
        }

        function closeAbort() {
            document.getElementById("abortOverlay").style.display = "none";
        }

        function confirmAbort() {

            finished = 1;

            clearInterval(timerInterval);

            document.getElementById("abortOverlay").style.display = "none";

            window.location.href = "/";
        }

        async function saveAndExit() {

            await saveMatch(); // nutzt deine bestehende Funktion

            // saveMatch macht already redirect
        }

        async function discardMatch() {
            await discardAndExit();
        }

        async function discardAndExit() {

            clearInterval(timerInterval);

            if (channel) {
                supabaseClient.removeChannel(channel);
            }

            const { data, error, count } = await supabaseClient
                .from("matches")
                .delete()
                .eq("id", matchId)
                .select("id", { count: "exact" });

            if (!error && (count ?? data?.length ?? 0) > 0) {
                window.location.href = "/";
                return;
            }

            // Falls DELETE (z.B. wegen RLS) nicht möglich ist:
            // Match als verworfen markieren, damit es nicht mehr als "live" erscheint.
            if (error) {
                console.warn("DELETE fehlgeschlagen, versuche Fallback-Update:", error);
            } else {
                console.warn("DELETE ohne Treffer, versuche Fallback-Update:", { matchId });
            }

            const { error: updateError } = await supabaseClient
                .from("matches")
                .update({
                    status: -1,
                    finished: 1
                })
                .eq("id", matchId);

            if (updateError) {
                console.error("Verwerfen fehlgeschlagen (DELETE + Fallback):", updateError);
                alert("Verwerfen fehlgeschlagen. Bitte erneut versuchen.");
                return;
            }

            window.location.href = "/";
        }




        function flashSeries() {

            const el = document.getElementById("currentSeries");

            el.classList.remove("flash");
            void el.offsetWidth;
            el.classList.add("flash");
        }

        function subscribeToMatch() {

            channel = supabaseClient
                .channel('match-' + matchId)
                .on(
                    'postgres_changes',
                    {
                        event: 'UPDATE',
                        schema: 'public',
                        table: 'matches',
                        filter: 'id=eq.' + matchId
                    },
                    (payload) => {

                        const d = payload.new;
                        const previous = {
                            score1,
                            score2,
                            inn1,
                            inn2,
                            series1,
                            series2
                        };

                        if (d) {
                            syncRemoteSeriesFromDelta(previous, d);
                        }

                        score1 = d.score1;
                        score2 = d.score2;
                        inn1 = d.inn1;
                        inn2 = d.inn2;
                        totalInnings = d.totalInnings;
                        activePlayer = d.activePlayer;
                        finished = d.finished;
                        series1 = d.series1 || 0;
                        series2 = d.series2 || 0;
                        high1 = d.high1 || 0;
                        high2 = d.high2 || 0;
                        reconcileInningsLists();

                        updateUI();
                        showEndIfFinished();
                    }
                )
                .subscribe();
        }

        function syncRemoteSeriesFromDelta(previous, current) {
            const prevInn1 = Number(previous.inn1 || 0);
            const prevInn2 = Number(previous.inn2 || 0);
            const curInn1 = Number(current.inn1 || 0);
            const curInn2 = Number(current.inn2 || 0);

            // Undo/History-Restore: Serienliste an tatsächliche Aufnahmenzahl anpassen.
            if (curInn1 < innings1.length) innings1 = innings1.slice(0, curInn1);
            if (curInn2 < innings2.length) innings2 = innings2.slice(0, curInn2);

            // Spieler 1 hat eine Aufnahme abgeschlossen.
            if (curInn1 > prevInn1) {
                const byScoreDelta = Math.max(0, Number(current.score1 || 0) - Number(previous.score1 || 0));
                const oldSeries1 = Number(previous.series1 || 0);
                const committed = byScoreDelta > 0 ? byScoreDelta : oldSeries1;
                if (innings1.length < curInn1) {
                    innings1.push(committed);
                }
                // Falls mehrere Aufnahmen zwischen zwei Realtime-Events passiert sind:
                // fehlende Einträge als 0 auffüllen, damit A und Serienliste synchron bleiben.
                while (innings1.length < curInn1) {
                    innings1.push(0);
                }
            }

            // Spieler 2 hat eine Aufnahme abgeschlossen.
            if (curInn2 > prevInn2) {
                const byScoreDelta = Math.max(0, Number(current.score2 || 0) - Number(previous.score2 || 0));
                const oldSeries2 = Number(previous.series2 || 0);
                const committed = byScoreDelta > 0 ? byScoreDelta : oldSeries2;
                if (innings2.length < curInn2) {
                    innings2.push(committed);
                }
                while (innings2.length < curInn2) {
                    innings2.push(0);
                }
            }

            // Sicherheitsnetz bei größeren Sprüngen.
            if (innings1.length > curInn1) innings1 = innings1.slice(0, curInn1);
            if (innings2.length > curInn2) innings2 = innings2.slice(0, curInn2);
        }

        function reconcileInningsLists() {
            const targetInn1 = Math.max(0, Number(inn1 || 0));
            const targetInn2 = Math.max(0, Number(inn2 || 0));

            if (innings1.length > targetInn1) innings1 = innings1.slice(0, targetInn1);
            if (innings2.length > targetInn2) innings2 = innings2.slice(0, targetInn2);

            while (innings1.length < targetInn1) innings1.push(0);
            while (innings2.length < targetInn2) innings2.push(0);
        }

        document.addEventListener("fullscreenchange", updateFullscreenButton);
        updateFullscreenButton();

    </script>
