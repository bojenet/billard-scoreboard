<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Userverwaltung</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(180deg, #0f1c3f, #0a122b);
      color: white;
    }

    .page {
      width: min(1100px, 94%);
      margin: 34px auto 30px;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 44px;
      text-align: center;
    }

    .card {
      background: linear-gradient(180deg, #162b66, #0f1c3f);
      border: 1px solid #2d488f;
      border-radius: 20px;
      box-shadow: 0 22px 50px rgba(0, 0, 0, 0.45);
      overflow: hidden;
      margin-bottom: 18px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      border-bottom: 1px solid #27417f;
      padding: 12px 14px;
      text-align: left;
      font-size: 16px;
    }

    th {
      background: #12255a;
      font-size: 14px;
      letter-spacing: 0.4px;
      opacity: 0.9;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .uid {
      opacity: 0.7;
      font-size: 12px;
      word-break: break-all;
    }

    .muted {
      opacity: 0.72;
      font-size: 13px;
    }

    .section-title {
      margin: 22px 0 10px;
      font-size: 24px;
      font-weight: 800;
    }

    select {
      background: #1c3380;
      color: white;
      border: 1px solid #3659bb;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 15px;
      font-weight: 600;
    }

    .save-btn {
      border: none;
      border-radius: 9px;
      background: #2f4fe0;
      color: white;
      font-size: 14px;
      font-weight: 700;
      padding: 8px 12px;
      cursor: pointer;
    }

    .actions {
      margin-top: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .btn {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      background: #1c3380;
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .msg {
      font-size: 14px;
      opacity: 0.85;
      min-height: 20px;
    }

    .msg.ok { color: #b6f5c4; }
    .msg.err { color: #ffb6b6; }
  </style>
</head>
<body>
  <div class="page">
    <h1>Userverwaltung</h1>
    <div class="card">
      <table id="usersTable">
        <tr>
          <th>E-Mail</th>
          <th>User ID</th>
          <th>Rolle</th>
          <th>Positions Library</th>
          <th>Training</th>
          <th>Turnier</th>
          <th>Letzter Login</th>
          <th>Aktion</th>
        </tr>
      </table>
    </div>

    <h2 class="section-title">Letzte Logins</h2>
    <div class="card">
      <table id="loginEventsTable">
        <tr>
          <th>Zeit</th>
          <th>E-Mail</th>
          <th>User ID</th>
          <th>Browser</th>
        </tr>
      </table>
    </div>

    <div class="actions">
      <button class="btn" onclick="window.location.href='index.html'">Zurück</button>
      <div id="msg" class="msg"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/position_library_access.js"></script>
  <script src="js/training_access.js"></script>
  <script src="js/tournament_access.js"></script>
  <script src="js/user_menu.js"></script>
  <script>
    function setMsg(text, type) {
      const el = document.getElementById("msg");
      el.className = "msg " + (type || "");
      el.innerText = text || "";
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatDateTime(value) {
      if (!value) return "-";
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "-";
      return date.toLocaleString("de-DE", {
        day: "2-digit",
        month: "2-digit",
        year: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function summarizeUserAgent(value) {
      const ua = String(value || "");
      if (!ua) return "-";
      const browser = ua.includes("Firefox/") ? "Firefox" :
        ua.includes("Edg/") ? "Edge" :
        ua.includes("Chrome/") ? "Chrome" :
        ua.includes("Safari/") ? "Safari" : "Browser";
      const platform = ua.includes("iPhone") ? "iPhone" :
        ua.includes("iPad") ? "iPad" :
        ua.includes("Mac OS X") ? "macOS" :
        ua.includes("Windows") ? "Windows" :
        ua.includes("Android") ? "Android" : "";
      return [browser, platform].filter(Boolean).join(" / ");
    }

    async function loadUsers() {
      const admin = await requireAdmin();
      if (!admin) return;

      const { data: profiles, error: profilesError } = await supabaseClient
        .from("profiles")
        .select("id,email")
        .order("email", { ascending: true });

      if (profilesError) {
        setMsg("Profiles laden fehlgeschlagen: " + profilesError.message, "err");
        return;
      }

      const { data: roles, error: rolesError } = await supabaseClient
        .from("user_roles")
        .select("user_id,role,position_library_access,training_access,tournament_access");

      if (rolesError) {
        setMsg("Rollen laden fehlgeschlagen: " + rolesError.message, "err");
        return;
      }

      const { data: loginEvents, error: loginEventsError } = await supabaseClient
        .from("login_events")
        .select("user_id,email,user_agent,created_at")
        .order("created_at", { ascending: false })
        .limit(200);

      if (loginEventsError) {
        setMsg("Login-Tracking laden fehlgeschlagen. Bitte SQL aus sql/user_admin_roles.sql ausführen.", "err");
      }

      const roleByUser = {};
      (roles || []).forEach((r) => {
        roleByUser[r.user_id] = {
          role: r.role || "member",
          position_library_access: r.position_library_access || "edit",
          training_access: r.training_access || "edit",
          tournament_access: r.tournament_access || "edit"
        };
      });

      const table = document.getElementById("usersTable");
      table.innerHTML = `
        <tr>
          <th>E-Mail</th>
          <th>User ID</th>
          <th>Rolle</th>
          <th>Positions Library</th>
          <th>Training</th>
          <th>Turnier</th>
          <th>Letzter Login</th>
          <th>Aktion</th>
        </tr>
      `;

      const latestLoginByUser = {};
      (loginEvents || []).forEach((entry) => {
        if (!latestLoginByUser[entry.user_id]) latestLoginByUser[entry.user_id] = entry;
      });

      (profiles || []).forEach((p) => {
        const row = document.createElement("tr");
        const roleInfo = roleByUser[p.id] || {};
        const role = roleInfo.role || "member";
        const positionLibraryAccess = normalizePositionLibraryAccess(roleInfo.position_library_access);
        const trainingAccess = normalizeTrainingAccess(roleInfo.training_access);
        const tournamentAccess = normalizeTournamentAccess(roleInfo.tournament_access);
        row.innerHTML = `
          <td>${p.email || "-"}</td>
          <td class="uid">${p.id}</td>
          <td>
            <select id="role_${p.id}">
              <option value="member" ${role === "member" ? "selected" : ""}>member</option>
              <option value="admin" ${role === "admin" ? "selected" : ""}>admin</option>
            </select>
          </td>
          <td>
            <select id="position_library_access_${p.id}">
              <option value="hidden" ${positionLibraryAccess === "hidden" ? "selected" : ""}>ausblenden</option>
              <option value="read" ${positionLibraryAccess === "read" ? "selected" : ""}>lesen</option>
              <option value="edit" ${positionLibraryAccess === "edit" ? "selected" : ""}>editieren</option>
            </select>
          </td>
          <td>
            <select id="training_access_${p.id}">
              <option value="hidden" ${trainingAccess === "hidden" ? "selected" : ""}>ausblenden</option>
              <option value="read" ${trainingAccess === "read" ? "selected" : ""}>lesen</option>
              <option value="edit" ${trainingAccess === "edit" ? "selected" : ""}>editieren</option>
            </select>
          </td>
          <td>
            <select id="tournament_access_${p.id}">
              <option value="hidden" ${tournamentAccess === "hidden" ? "selected" : ""}>ausblenden</option>
              <option value="read" ${tournamentAccess === "read" ? "selected" : ""}>lesen</option>
              <option value="edit" ${tournamentAccess === "edit" ? "selected" : ""}>editieren</option>
            </select>
          </td>
          <td>${formatDateTime(latestLoginByUser[p.id]?.created_at)}</td>
          <td>
            <button class="save-btn" onclick="saveRole('${p.id}')">Speichern</button>
          </td>
        `;
        table.appendChild(row);
      });

      renderLoginEvents(loginEvents || []);
    }

    function renderLoginEvents(events) {
      const table = document.getElementById("loginEventsTable");
      table.innerHTML = `
        <tr>
          <th>Zeit</th>
          <th>E-Mail</th>
          <th>User ID</th>
          <th>Browser</th>
        </tr>
      `;

      if (!events.length) {
        const row = document.createElement("tr");
        row.innerHTML = `<td colspan="4" class="muted">Noch keine Login-Einträge vorhanden.</td>`;
        table.appendChild(row);
        return;
      }

      events.slice(0, 50).forEach((entry) => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${formatDateTime(entry.created_at)}</td>
          <td>${escapeHtml(entry.email || "-")}</td>
          <td class="uid">${escapeHtml(entry.user_id || "-")}</td>
          <td class="muted">${escapeHtml(summarizeUserAgent(entry.user_agent))}</td>
        `;
        table.appendChild(row);
      });
    }

    async function saveRole(userId) {
      const admin = await requireAdmin();
      if (!admin) return;
      setMsg("", "");

      const role = document.getElementById("role_" + userId).value;
      const positionLibraryAccess = normalizePositionLibraryAccess(document.getElementById("position_library_access_" + userId).value);
      const trainingAccess = normalizeTrainingAccess(document.getElementById("training_access_" + userId).value);
      const tournamentAccess = normalizeTournamentAccess(document.getElementById("tournament_access_" + userId).value);
      const { error } = await supabaseClient
        .from("user_roles")
        .upsert([{ user_id: userId, role, position_library_access: positionLibraryAccess, training_access: trainingAccess, tournament_access: tournamentAccess }], { onConflict: "user_id" });

      if (error) {
        setMsg("Rolle speichern fehlgeschlagen: " + error.message, "err");
        return;
      }

      setMsg("Rolle gespeichert.", "ok");
    }

    loadUsers();
  </script>
</body>
</html>
