<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Stream Scoreboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            color-scheme: dark;
        }

        html,
        body {
            margin: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: transparent;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            visibility: hidden;
        }

        body.stream-ready {
            visibility: visible;
        }

        .canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
        }

        .overlay {
            position: absolute;
            left: 20px;
            bottom: 20px;
            width: min(760px, calc(100vw - 40px));
            display: grid;
            gap: 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 18px 46px rgba(0, 0, 0, 0.36);
            background: rgba(20, 30, 86, 0.94);
            backdrop-filter: blur(8px);
        }

        .match-bar {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            align-items: center;
            padding: 8px 12px 7px;
            background: linear-gradient(90deg, rgba(86, 105, 233, 0.96), rgba(64, 78, 180, 0.96));
            color: #f8fbff;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.02em;
        }

        .match-bar-main {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .inning-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 4px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.16);
            font-size: 14px;
            font-weight: 800;
        }

        .inning-chip strong {
            font-size: 22px;
            line-height: 1;
        }

        .player-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 96px 82px;
            align-items: stretch;
            min-height: 62px;
            background: rgba(36, 50, 130, 0.94);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
        }

        .player-row.active {
            background: rgba(55, 71, 173, 0.98);
        }

        .player-row.player-yellow .player-name {
            color: #ffcf53;
        }

        .player-name-cell {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
            padding: 0 14px;
        }

        .player-marker {
            width: 18px;
            height: 18px;
            border-radius: 999px;
            border: 2px solid rgba(255, 255, 255, 0.9);
            background: #f7f7f7;
            flex: 0 0 auto;
        }

        .player-row.player-yellow .player-marker {
            background: #ffd84a;
        }

        .player-name {
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #fff;
            font-size: clamp(24px, 2vw, 36px);
            font-weight: 800;
            line-height: 1;
        }

        .score-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(28px, 2.6vw, 44px);
            font-weight: 900;
            font-variant-numeric: tabular-nums;
            color: #fff;
            background: rgba(73, 89, 194, 0.92);
        }

        .target-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            background: #ffffff;
            color: #131313;
            font-size: clamp(24px, 2.2vw, 40px);
            font-weight: 900;
            font-variant-numeric: tabular-nums;
        }

        .meta-strip {
            display: flex;
            gap: 16px;
            align-items: center;
            padding: 7px 12px 8px;
            background: rgba(17, 25, 77, 0.96);
            color: rgba(255, 255, 255, 0.86);
            font-size: 13px;
            font-weight: 600;
        }

        .series-pill {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 44px;
            padding: 2px 10px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.12);
            font-weight: 800;
            color: #fff;
        }

        .error-box {
            position: fixed;
            left: 50%;
            bottom: 26px;
            transform: translateX(-50%);
            width: min(720px, calc(100vw - 48px));
            padding: 18px 20px;
            border-radius: 20px;
            background: rgba(35, 10, 14, 0.92);
            border: 1px solid rgba(255, 108, 108, 0.35);
            color: #fff;
            box-shadow: 0 22px 70px rgba(0, 0, 0, 0.35);
            font-size: 18px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 700px) {
            .overlay {
                width: calc(100vw - 24px);
                left: 12px;
                bottom: 12px;
            }

            .player-row {
                grid-template-columns: minmax(0, 1fr) 72px 64px;
                min-height: 48px;
            }

            .match-bar {
                font-size: 12px;
                gap: 8px;
            }

            .inning-chip strong {
                font-size: 18px;
            }

            .meta-strip {
                gap: 10px;
                font-size: 11px;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div id="overlay" class="overlay hidden">
            <div class="match-bar">
                <div id="disciplineLine" class="match-bar-main">Disziplin</div>
                <div class="inning-chip">INNING <strong id="totalInnings">1</strong></div>
            </div>

            <section id="player1Panel" class="player-row player-white">
                <div class="player-name-cell">
                    <div class="player-marker"></div>
                    <div id="player1Name" class="player-name">Spieler 1</div>
                </div>
                <div id="score1" class="score-cell">0</div>
                <div id="target1" class="target-cell">0</div>
            </section>

            <section id="player2Panel" class="player-row player-yellow">
                <div class="player-name-cell">
                    <div class="player-marker"></div>
                    <div id="player2Name" class="player-name">Spieler 2</div>
                </div>
                <div id="score2" class="score-cell">0</div>
                <div id="target2" class="target-cell">0</div>
            </section>

            <div class="meta-strip">
                <span id="liveLine">Live verbunden</span>
                <span id="seriesBadge" class="series-pill"></span>
            </div>
        </div>
    </div>

    <div id="errorBox" class="error-box hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get("match");
        let streamToken = urlParams.get("token") || "";

        let channel = null;
        let pollInterval = null;
        let currentUserId = "";
        let ownedPlayerNames = [];

        let player1 = "";
        let player2 = "";
        let discipline1 = "";
        let discipline2 = "";
        let target1 = 0;
        let target2 = 0;
        let score1 = 0;
        let score2 = 0;
        let inn1 = 0;
        let inn2 = 0;
        let totalInnings = 1;
        let activePlayer = 1;
        let series1 = 0;
        let series2 = 0;
        let high1 = 0;
        let high2 = 0;
        let maxInnings = 0;

        function generateStreamToken() {
            if (window.crypto && typeof window.crypto.randomUUID === "function") {
                return window.crypto.randomUUID().replace(/-/g, "");
            }
            return Math.random().toString(36).slice(2) + Date.now().toString(36);
        }

        function writeTokenToUrl(token) {
            if (!matchId || !token) return;
            const next = new URL(window.location.href);
            next.searchParams.set("match", matchId);
            next.searchParams.set("token", token);
            window.history.replaceState({}, "", next.toString());
            streamToken = token;
        }

        function showError(message) {
            const errorBox = document.getElementById("errorBox");
            errorBox.textContent = message;
            errorBox.classList.remove("hidden");
            document.getElementById("overlay").classList.add("hidden");
            document.body.classList.add("stream-ready");
        }

        function showInfo(message) {
            const errorBox = document.getElementById("errorBox");
            errorBox.textContent = message;
            errorBox.classList.remove("hidden");
            document.body.classList.add("stream-ready");
        }

        function setLiveStatus(text) {
            document.getElementById("liveLine").textContent = text;
        }

        function formatAvg(score, innings) {
            return innings > 0 ? (score / innings).toFixed(3) : "0.000";
        }

        function remaining(score, target) {
            if (!target || target <= 0) return "-";
            return String(Math.max(0, Number(target) - Number(score)));
        }

        function render() {
            document.getElementById("player1Name").textContent = player1 || "Spieler 1";
            document.getElementById("player2Name").textContent = player2 || "Spieler 2";
            document.getElementById("score1").textContent = String(score1 || 0);
            document.getElementById("score2").textContent = String(score2 || 0);
            document.getElementById("target1").textContent = String(target1 || 0);
            document.getElementById("target2").textContent = String(target2 || 0);
            document.getElementById("totalInnings").textContent = String(totalInnings || 1);
            document.getElementById("disciplineLine").textContent =
                String(discipline1 || discipline2 || "-") +
                (target1 > 0 ? " [" + String(target1) + "]" : "") +
                (maxInnings > 0 ? "  ·  Max " + String(maxInnings) : "");

            const player1Panel = document.getElementById("player1Panel");
            const player2Panel = document.getElementById("player2Panel");
            player1Panel.classList.toggle("active", Number(activePlayer) === 1);
            player2Panel.classList.toggle("active", Number(activePlayer) === 2);

            const currentSeries = Number(activePlayer) === 1 ? Number(series1 || 0) : Number(series2 || 0);
            const seriesBadge = document.getElementById("seriesBadge");
            seriesBadge.textContent = currentSeries > 0 ? "+" + String(currentSeries) : "";
            seriesBadge.style.color = Number(activePlayer) === 2 ? "#ffd84a" : "#ffffff";

            document.getElementById("overlay").classList.remove("hidden");
            document.body.classList.add("stream-ready");
        }

        function applyMatch(d) {
            player1 = String(d.player1 || "");
            player2 = String(d.player2 || "");
            discipline1 = String(d.discipline1 || "");
            discipline2 = String(d.discipline2 || "");
            target1 = Number(d.target1 || 0);
            target2 = Number(d.target2 || 0);
            score1 = Number(d.score1 || 0);
            score2 = Number(d.score2 || 0);
            inn1 = Number(d.inn1 || 0);
            inn2 = Number(d.inn2 || 0);
            totalInnings = Number(d.totalInnings || 1);
            activePlayer = Number(d.activePlayer || 1);
            series1 = Number(d.series1 || 0);
            series2 = Number(d.series2 || 0);
            high1 = Number(d.high1 || 0);
            high2 = Number(d.high2 || 0);
            maxInnings = Number(d.maxInnings || 0);
            render();
        }

        async function fetchMatch() {
            const { data, error } = await supabaseClient
                .from("matches")
                .select("*")
                .eq("id", matchId)
                .single();

            if (error) throw error;
            return data;
        }

        async function fetchPublicStreamMatch() {
            const functionUrl = "https://kstqhcaazuuxchqtnyfc.supabase.co/functions/v1/get-stream-match";
            const response = await fetch(functionUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ match: matchId, token: streamToken })
            });

            let payload = null;
            try {
                payload = await response.json();
            } catch (_) {
                payload = null;
            }

            if (!response.ok) {
                const reasonParts = [
                    payload?.error,
                    payload?.message,
                    payload?.details,
                    payload?.hint,
                    payload?.code
                ].filter(Boolean);
                throw new Error("Function-Aufruf fehlgeschlagen: " + (reasonParts.join(" | ") || ("HTTP " + response.status)));
            }

            if (!payload?.match) {
                const reason = payload?.error ? String(payload.error) : "stream-match-not-found";
                throw new Error("Kein Stream-Match gefunden: " + reason);
            }
            return payload.match;
        }

        async function verifyAccess() {
            const user = await requireAuth();
            if (!user) return null;
            currentUserId = user.id;
            const isAdmin = await hasAdminAccess(user);
            ownedPlayerNames = await getOwnedPlayerNames(currentUserId);
            return { user, isAdmin };
        }

        async function ensureStreamToken(matchRow, access) {
            if (!access || !matchRow) return;

            const existingToken = String(matchRow.stream_token || "").trim();
            if (existingToken) {
                writeTokenToUrl(existingToken);
                return;
            }

            const nextToken = generateStreamToken();
            const { error } = await supabaseClient
                .from("matches")
                .update({ stream_token: nextToken })
                .eq("id", matchId);

            if (error) {
                const message = String(error.message || "").toLowerCase();
                if (message.includes("stream_token") || message.includes("column")) {
                    console.warn("stream_token-Spalte fehlt noch in der Datenbank:", error);
                    showInfo("Stream-Link noch nicht aktiv. Bitte zuerst das SQL fuer 'stream_token' in Supabase ausfuehren.");
                    return;
                }
                console.warn("Stream-Token konnte nicht gespeichert werden:", error);
                showInfo("Stream-Link konnte nicht erzeugt werden.");
                return;
            }

            writeTokenToUrl(nextToken);
        }

        function startPolling(usePublicToken = false) {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                try {
                    const data = usePublicToken ? await fetchPublicStreamMatch() : await fetchMatch();
                    applyMatch(data);
                    setLiveStatus("Autom. Sync aktiv");
                } catch (error) {
                    console.warn("Stream-Polling fehlgeschlagen:", error);
                }
            }, 4000);
        }

        function subscribe() {
            if (channel) {
                supabaseClient.removeChannel(channel);
            }

            channel = supabaseClient
                .channel("stream-match-" + matchId)
                .on(
                    "postgres_changes",
                    {
                        event: "UPDATE",
                        schema: "public",
                        table: "matches",
                        filter: "id=eq." + matchId
                    },
                    (payload) => {
                        if (!payload?.new) return;
                        applyMatch(payload.new);
                        setLiveStatus("Live verbunden");
                    }
                )
                .subscribe((status) => {
                    if (status === "SUBSCRIBED") {
                        setLiveStatus("Live verbunden");
                    } else if (status === "CHANNEL_ERROR" || status === "TIMED_OUT") {
                        setLiveStatus("Autom. Sync aktiv");
                    }
                });
        }

        async function init() {
            if (!matchId) {
                showError("Kein Match angegeben. Bitte '?match=...' an die Stream-URL anhängen.");
                return;
            }

            if (streamToken) {
                const data = await fetchPublicStreamMatch();
                applyMatch(data);
                setLiveStatus("OBS-Link aktiv");
                startPolling(true);
                return;
            }

            const access = await verifyAccess();
            if (!access) return;

            const data = await fetchMatch();
            if (!access.isAdmin && !isOwnedMatch(data, currentUserId, ownedPlayerNames)) {
                showError("Kein Zugriff auf diese Partie.");
                return;
            }

            await ensureStreamToken(data, access);
            applyMatch(data);
            subscribe();
            startPolling();
        }

        init().catch((error) => {
            console.error("Stream-Scoreboard konnte nicht geladen werden:", error);
            const message = String((error && error.message) || "Unbekannter Fehler");
            showError("Stream-Scoreboard konnte nicht geladen werden. " + message);
        });
    </script>
</body>

</html>
