<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Stream Scoreboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --overlay-width: 1020px;
            --overlay-height: 104px;
            --blue-deep: rgba(15, 28, 63, 0.94);
            --blue-mid: rgba(28, 51, 128, 0.96);
            --blue-panel: rgba(18, 34, 82, 0.96);
            --yellow: rgba(255, 216, 74, 0.98);
            --white: rgba(255, 255, 255, 0.98);
        }

        html,
        body {
            margin: 0;
            width: var(--overlay-width);
            height: var(--overlay-height);
            overflow: hidden;
            background: rgba(0, 0, 0, 0) !important;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        body {
            visibility: hidden;
        }

        body.stream-ready {
            visibility: visible;
        }

        .canvas {
            position: fixed;
            inset: 0;
            width: var(--overlay-width);
            height: var(--overlay-height);
            pointer-events: none;
            background: rgba(0, 0, 0, 0);
        }

        .overlay {
            position: absolute;
            inset: 0;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 120px minmax(0, 1fr);
            gap: 10px;
            align-items: stretch;
        }

        .card {
            border-radius: 24px;
            overflow: hidden;
            box-shadow:
                0 12px 24px rgba(0, 0, 0, 0.28),
                inset 0 1px 0 rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.08);
            min-width: 0;
        }

        .player-card {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 88px 46px;
            background: linear-gradient(180deg, var(--blue-panel), var(--blue-deep));
        }

        .player-main {
            display: grid;
            align-content: center;
            gap: 4px;
            min-width: 0;
            padding: 10px 16px;
        }

        .player-name {
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #ffffff;
            font-size: clamp(18px, 1.2vw, 28px);
            font-weight: 700;
            line-height: 1;
        }

        .player-two .player-name {
            color: #ffd84a;
        }

        .player-sub {
            min-width: 0;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: rgba(255, 255, 255, 0.64);
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .score-box {
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(49, 74, 173, 0.96), var(--blue-mid));
            color: #ffffff;
            font-size: clamp(26px, 1.9vw, 40px);
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            border-left: 1px solid rgba(255, 255, 255, 0.08);
        }

        .series-box {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(16px, 1.1vw, 22px);
            font-weight: 800;
            font-variant-numeric: tabular-nums;
            color: #101010;
            border-left: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(9, 17, 42, 0.55);
        }

        .series-box.active-white {
            background: var(--white);
        }

        .series-box.active-yellow {
            background: var(--yellow);
        }

        .innings-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(180deg, rgba(16, 28, 70, 0.98), rgba(10, 20, 55, 0.98));
            color: #ffffff;
            text-align: center;
        }

        .innings-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.56);
        }

        .innings-value {
            margin-top: 4px;
            font-size: clamp(22px, 1.6vw, 32px);
            font-weight: 800;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }

        .error-box {
            position: fixed;
            left: 50%;
            bottom: 26px;
            transform: translateX(-50%);
            width: min(720px, calc(100vw - 48px));
            padding: 18px 20px;
            border-radius: 20px;
            background: rgba(35, 10, 14, 0.92);
            border: 1px solid rgba(255, 108, 108, 0.35);
            color: #fff;
            box-shadow: 0 22px 70px rgba(0, 0, 0, 0.35);
            font-size: 18px;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 700px) {
            :root {
                --overlay-width: 860px;
                --overlay-height: 96px;
            }

            .overlay {
                grid-template-columns: minmax(0, 1fr) 104px minmax(0, 1fr);
                gap: 8px;
            }

            .player-card {
                grid-template-columns: minmax(0, 1fr) 78px 40px;
            }
        }
    </style>
</head>

<body>
    <div class="canvas">
        <div id="overlay" class="overlay hidden">
            <section class="card player-card player-one">
                <div class="player-main">
                    <div id="player1Name" class="player-name">Spieler 1</div>
                    <div id="player1Sub" class="player-sub">Disziplin · Distanz</div>
                </div>
                <div id="score1" class="score-box">0</div>
                <div id="series1" class="series-box"></div>
            </section>

            <section class="card innings-card">
                <div class="innings-label">Aufn.</div>
                <div id="totalInnings" class="innings-value">1</div>
            </section>

            <section class="card player-card player-two">
                <div class="player-main">
                    <div id="player2Name" class="player-name">Spieler 2</div>
                    <div id="player2Sub" class="player-sub">Disziplin · Distanz</div>
                </div>
                <div id="score2" class="score-box">0</div>
                <div id="series2" class="series-box"></div>
            </section>
        </div>
    </div>

    <div id="errorBox" class="error-box hidden"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const matchId = urlParams.get("match");
        let streamToken = urlParams.get("token") || "";

        let channel = null;
        let pollInterval = null;
        let currentUserId = "";
        let ownedPlayerNames = [];

        let player1 = "";
        let player2 = "";
        let discipline1 = "";
        let discipline2 = "";
        let target1 = 0;
        let target2 = 0;
        let score1 = 0;
        let score2 = 0;
        let inn1 = 0;
        let inn2 = 0;
        let totalInnings = 1;
        let activePlayer = 1;
        let series1 = 0;
        let series2 = 0;
        let high1 = 0;
        let high2 = 0;
        let maxInnings = 0;

        function generateStreamToken() {
            if (window.crypto && typeof window.crypto.randomUUID === "function") {
                return window.crypto.randomUUID().replace(/-/g, "");
            }
            return Math.random().toString(36).slice(2) + Date.now().toString(36);
        }

        function writeTokenToUrl(token) {
            if (!matchId || !token) return;
            const next = new URL(window.location.href);
            next.searchParams.set("match", matchId);
            next.searchParams.set("token", token);
            window.history.replaceState({}, "", next.toString());
            streamToken = token;
        }

        function showError(message) {
            const errorBox = document.getElementById("errorBox");
            errorBox.textContent = message;
            errorBox.classList.remove("hidden");
            document.getElementById("overlay").classList.add("hidden");
            document.body.classList.add("stream-ready");
        }

        function showInfo(message) {
            const errorBox = document.getElementById("errorBox");
            errorBox.textContent = message;
            errorBox.classList.remove("hidden");
            document.body.classList.add("stream-ready");
        }

        function render() {
            document.getElementById("player1Name").textContent = player1 || "Spieler 1";
            document.getElementById("player2Name").textContent = player2 || "Spieler 2";
            document.getElementById("player1Sub").textContent =
                String(discipline1 || "-") + " · " + String(target1 || 0);
            document.getElementById("player2Sub").textContent =
                String(discipline2 || discipline1 || "-") + " · " + String(target2 || 0);
            document.getElementById("score1").textContent = String(score1 || 0);
            document.getElementById("score2").textContent = String(score2 || 0);
            document.getElementById("totalInnings").textContent = String(totalInnings || 1);

            const series1Cell = document.getElementById("series1");
            const series2Cell = document.getElementById("series2");
            series1Cell.textContent = Number(activePlayer) === 1 && Number(series1 || 0) > 0 ? String(series1 || 0) : "";
            series2Cell.textContent = Number(activePlayer) === 2 && Number(series2 || 0) > 0 ? String(series2 || 0) : "";
            series1Cell.className = "series-box" + (Number(activePlayer) === 1 ? " active-white" : "");
            series2Cell.className = "series-box" + (Number(activePlayer) === 2 ? " active-yellow" : "");

            document.getElementById("overlay").classList.remove("hidden");
            document.body.classList.add("stream-ready");
        }

        function applyMatch(d) {
            player1 = String(d.player1 || "");
            player2 = String(d.player2 || "");
            discipline1 = String(d.discipline1 || "");
            discipline2 = String(d.discipline2 || "");
            target1 = Number(d.target1 || 0);
            target2 = Number(d.target2 || 0);
            score1 = Number(d.score1 || 0);
            score2 = Number(d.score2 || 0);
            inn1 = Number(d.inn1 || 0);
            inn2 = Number(d.inn2 || 0);
            totalInnings = Number(d.totalInnings || 1);
            activePlayer = Number(d.activePlayer || 1);
            series1 = Number(d.series1 || 0);
            series2 = Number(d.series2 || 0);
            high1 = Number(d.high1 || 0);
            high2 = Number(d.high2 || 0);
            maxInnings = Number(d.maxInnings || 0);
            render();
        }

        async function fetchMatch() {
            const { data, error } = await supabaseClient
                .from("matches")
                .select("*")
                .eq("id", matchId)
                .single();

            if (error) throw error;
            return data;
        }

        async function fetchPublicStreamMatch() {
            const functionUrl = "https://kstqhcaazuuxchqtnyfc.supabase.co/functions/v1/get-stream-match";
            const response = await fetch(functionUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ match: matchId, token: streamToken })
            });

            let payload = null;
            try {
                payload = await response.json();
            } catch (_) {
                payload = null;
            }

            if (!response.ok) {
                const reasonParts = [
                    payload?.error,
                    payload?.message,
                    payload?.details,
                    payload?.hint,
                    payload?.code
                ].filter(Boolean);
                throw new Error("Function-Aufruf fehlgeschlagen: " + (reasonParts.join(" | ") || ("HTTP " + response.status)));
            }

            if (!payload?.match) {
                const reason = payload?.error ? String(payload.error) : "stream-match-not-found";
                throw new Error("Kein Stream-Match gefunden: " + reason);
            }
            return payload.match;
        }

        async function verifyAccess() {
            const user = await requireAuth();
            if (!user) return null;
            currentUserId = user.id;
            const isAdmin = await hasAdminAccess(user);
            ownedPlayerNames = await getOwnedPlayerNames(currentUserId);
            return { user, isAdmin };
        }

        async function ensureStreamToken(matchRow, access) {
            if (!access || !matchRow) return;

            const existingToken = String(matchRow.stream_token || "").trim();
            if (existingToken) {
                writeTokenToUrl(existingToken);
                return;
            }

            const nextToken = generateStreamToken();
            const { error } = await supabaseClient
                .from("matches")
                .update({ stream_token: nextToken })
                .eq("id", matchId);

            if (error) {
                const message = String(error.message || "").toLowerCase();
                if (message.includes("stream_token") || message.includes("column")) {
                    console.warn("stream_token-Spalte fehlt noch in der Datenbank:", error);
                    showInfo("Stream-Link noch nicht aktiv. Bitte zuerst das SQL fuer 'stream_token' in Supabase ausfuehren.");
                    return;
                }
                console.warn("Stream-Token konnte nicht gespeichert werden:", error);
                showInfo("Stream-Link konnte nicht erzeugt werden.");
                return;
            }

            writeTokenToUrl(nextToken);
        }

        function startPolling(usePublicToken = false) {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(async () => {
                try {
                    const data = usePublicToken ? await fetchPublicStreamMatch() : await fetchMatch();
                    applyMatch(data);
                } catch (error) {
                    console.warn("Stream-Polling fehlgeschlagen:", error);
                }
            }, 4000);
        }

        function subscribe() {
            if (channel) {
                supabaseClient.removeChannel(channel);
            }

            channel = supabaseClient
                .channel("stream-match-" + matchId)
                .on(
                    "postgres_changes",
                    {
                        event: "UPDATE",
                        schema: "public",
                        table: "matches",
                        filter: "id=eq." + matchId
                    },
                    (payload) => {
                        if (!payload?.new) return;
                        applyMatch(payload.new);
                    }
                )
                .subscribe();
        }

        async function init() {
            if (!matchId) {
                showError("Kein Match angegeben. Bitte '?match=...' an die Stream-URL anhängen.");
                return;
            }

            if (streamToken) {
                const data = await fetchPublicStreamMatch();
                applyMatch(data);
                startPolling(true);
                return;
            }

            const access = await verifyAccess();
            if (!access) return;

            const data = await fetchMatch();
            if (!access.isAdmin && !isOwnedMatch(data, currentUserId, ownedPlayerNames)) {
                showError("Kein Zugriff auf diese Partie.");
                return;
            }

            await ensureStreamToken(data, access);
            applyMatch(data);
            subscribe();
            startPolling();
        }

        init().catch((error) => {
            console.error("Stream-Scoreboard konnte nicht geladen werden:", error);
            const message = String((error && error.message) || "Unbekannter Fehler");
            showError("Stream-Scoreboard konnte nicht geladen werden. " + message);
        });
    </script>
</body>

</html>
