<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Training</title>
    <style>
        html {
            min-height: 100%;
            background: linear-gradient(180deg, #1e1f29, #14151c);
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #1e1f29, #14151c);
            color: white;
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1200;
            width: 34px;
            height: 34px;
            border: 1px solid #4d5ec0;
            border-radius: 10px;
            background: rgba(47, 60, 135, 0.92);
            color: white;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .header {
            text-align: center;
            padding: 56px 0 18px;
            font-size: 48px;
            font-weight: 700;
        }

        .sub {
            text-align: center;
            opacity: 0.75;
            font-size: 18px;
            margin-bottom: 34px;
        }

        .grid {
            width: min(1240px, 92%);
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 26px;
        }

        .tile {
            min-height: 220px;
            border-radius: 20px;
            background: linear-gradient(180deg, #2b2e40, #25293a);
            border: 1px solid #3a4060;
            box-shadow: 0 18px 36px rgba(0, 0, 0, 0.35);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform .18s ease, background .18s ease;
            text-align: center;
            padding: 20px;
        }

        .tile:hover {
            transform: translateY(-4px);
            background: linear-gradient(180deg, #36407a, #2c3361);
        }

        .tile-title {
            font-size: 34px;
            font-weight: 700;
            margin-bottom: 12px;
        }

        .tile-sub {
            font-size: 18px;
            opacity: 0.82;
        }

        .actions {
            width: min(1050px, 92%);
            margin: 30px auto 40px;
            display: flex;
            justify-content: center;
        }

        .btn {
            padding: 14px 26px;
            border: none;
            border-radius: 12px;
            background: #4352a8;
            color: white;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
        }

        .invite {
            border: 2px solid #4da3ff;
            animation: pulseInvite 1.8s infinite;
        }

        @keyframes pulseInvite {
            0% { box-shadow: 0 0 0 0 rgba(77, 163, 255, 0.6); }
            70% { box-shadow: 0 0 0 15px rgba(77, 163, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(77, 163, 255, 0); }
        }

        @media (max-width: 900px) {
            .header {
                font-size: 40px;
            }

            .grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <button id="fullscreenBtn" class="fullscreen-btn" type="button" onclick="toggleFullscreen()" title="Vollbild starten" aria-label="Vollbild starten">⛶</button>
    <div class="header">Training</div>
    <div class="sub">Bitte Trainingsmodus wählen</div>

    <div class="grid">
        <div class="tile" onclick="window.location.href='training_go_on.html'">
            <div class="tile-title">Go-on Partie</div>
            <div class="tile-sub">Solo mit Disziplin und Distanz</div>
        </div>

        <div class="tile" onclick="window.location.href='training_countdown_hs.html'">
            <div class="tile-title">Challenge</div>
            <div class="tile-sub">Allein oder mit User</div>
        </div>

        <div class="tile" onclick="window.location.href='training_remote_match.html'">
            <div class="tile-title">Remote Match</div>
            <div class="tile-sub">2 Spieler, Distanz und Positionsgrafiken</div>
        </div>

        <div class="tile" onclick="window.location.href='training_positions.html'">
            <div class="tile-title">Positionstraining</div>
            <div class="tile-sub">Roger Conti 1-62</div>
        </div>
    </div>

    <div class="actions">
        <button class="btn" onclick="window.location.href='index.html'">Zurück</button>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/user_menu.js"></script>
<script>
    function updateFullscreenButton() {
        const btn = document.getElementById("fullscreenBtn");
        if (!btn) return;
        const active = !!document.fullscreenElement;
        btn.innerText = active ? "×" : "⛶";
        btn.title = active ? "Vollbild beenden" : "Vollbild starten";
        btn.setAttribute("aria-label", active ? "Vollbild beenden" : "Vollbild starten");
    }
    async function toggleFullscreen() {
        try {
            if (document.fullscreenElement) {
                await document.exitFullscreen();
            } else {
                await document.documentElement.requestFullscreen();
            }
        } catch (error) {
            console.warn("Fullscreen Toggle fehlgeschlagen:", error);
        } finally {
            updateFullscreenButton();
        }
    }
    document.addEventListener("fullscreenchange", updateFullscreenButton);
    updateFullscreenButton();
    async function loadRemoteMatchInvites(user) {
        if (!user?.email) return;
        const email = String(user.email).trim().toLowerCase();
        if (!email) return;
        const { data, error } = await supabaseClient
            .from("training_remote_match_sessions")
            .select("id,host_name,host_discipline,guest_discipline,target_points,status")
            .eq("guest_email", email)
            .eq("status", "active")
            .order("created_at", { ascending: false })
            .limit(3);
        if (error || !Array.isArray(data) || !data.length) return;
        const grid = document.querySelector(".grid");
        data.reverse().forEach((invite) => {
            const tile = document.createElement("div");
            tile.className = "tile invite";
            tile.onclick = () => {
                window.location.href = "training_remote_match_run.html?session=" + invite.id;
            };
            tile.innerHTML = `
                <div class="tile-title">Remote Einladung</div>
                <div class="tile-sub">${invite.host_name || "Spieler 1"} · ${invite.target_points || 0} Punkte</div>
                <div class="tile-sub" style="margin-top:8px;font-size:16px;opacity:0.9;">
                    ${invite.host_discipline || "-"} vs ${invite.guest_discipline || "-"}
                </div>
            `;
            grid.prepend(tile);
        });
    }

    (async () => {
        const user = await requireAuth();
        if (!user) return;
        await loadRemoteMatchInvites(user);
    })();
</script>
</html>
