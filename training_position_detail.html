<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Trainingsposition</title>
    <style>
        html { min-height: 100%; background: linear-gradient(180deg,#0f1c3f,#0a122b); }
        body { margin:0; min-height:100vh; font-family:Arial,sans-serif; background:linear-gradient(180deg,#0f1c3f,#0a122b); color:white; }
        .fullscreen-btn { position: fixed; top: 10px; right: 10px; z-index: 1200; width: 34px; height: 34px; border: 1px solid #3659bb; border-radius: 10px; background: rgba(28, 51, 128, 0.92); color: white; font-size: 16px; font-weight: 700; display:flex; align-items:center; justify-content:center; cursor:pointer; }
        .page { width:min(1500px,96%); margin:20px auto 28px; }
        .topbar { display:flex; justify-content:space-between; gap:14px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
        .left h1 { margin:0; font-size:46px; }
        .sub { margin-top:8px; opacity:.76; font-size:17px; }
        .actions { display:flex; gap:10px; flex-wrap:wrap; }
        .btn { border:none; border-radius:12px; padding:12px 16px; background:#1c3380; border:1px solid #3659bb; color:white; font-size:16px; font-weight:700; cursor:pointer; transition:transform .15s ease, box-shadow .16s ease, filter .15s ease, background .16s ease, border-color .16s ease; }
        .btn:hover { transform:translateY(-1px); filter:brightness(1.06); box-shadow:0 10px 22px rgba(0,0,0,.2); }
        .btn:active { transform:translateY(1px); filter:brightness(.94); }
        .btn.primary { background:#2f4fe0; }
        .btn.primary.saving { background:#2743bd; border-color:#6f8cff; box-shadow:inset 0 2px 10px rgba(0,0,0,.25); transform:translateY(1px); }
        .btn.primary.saved { background:#3e62ff; border-color:#9ab0ff; box-shadow:0 0 0 3px rgba(117,146,255,.24), 0 10px 24px rgba(67,99,255,.28); }
        .layout { display:grid; grid-template-columns:minmax(0,1.7fr) minmax(420px,1fr); gap:18px; }
        .card { background:linear-gradient(180deg,#162b66,#0f1c3f); border:1px solid #2d488f; border-radius:22px; box-shadow:0 24px 56px rgba(0,0,0,.45); overflow:hidden; }
        .viewer-head { padding:14px 16px; border-bottom:1px solid #27417f; display:flex; justify-content:space-between; gap:10px; align-items:center; flex-wrap:wrap; }
        .viewer-title { font-size:22px; font-weight:800; }
        .viewer-sub { font-size:14px; opacity:.76; margin-top:4px; }
        .viewer { height:78vh; min-height:760px; background:#08122f; }
        .viewer iframe { width:100%; height:100%; border:none; background:white; }
        .side { padding:16px; display:grid; gap:12px; }
        .notice { padding:12px 14px; border-radius:14px; border:1px solid #556db2; background:rgba(20,38,89,.78); font-size:14px; line-height:1.5; opacity:.92; }
        .meta { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
        .pill { padding:6px 10px; border-radius:999px; font-size:12px; font-weight:700; background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.16); }
        .train-box { display:flex; align-items:center; gap:12px; padding:14px 16px; border-radius:16px; border:1px solid #3a60bf; background:rgba(17,38,89,.72); }
        .train-box input { width:22px; height:22px; }
        .train-label { font-size:20px; font-weight:800; }
        .table-card { padding:16px; border-radius:18px; border:1px solid #3a60bf; background:rgba(11,25,61,.76); display:grid; gap:12px; }
        .table-head { display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap; }
        .table-title { font-size:18px; font-weight:800; }
        .table-sub { font-size:13px; opacity:.78; }
        .table-btn { border:none; border-radius:10px; padding:10px 12px; background:#2143a1; border:1px solid #4d70d5; color:white; font-size:13px; font-weight:700; cursor:pointer; }
        .table-wrap { position:relative; border-radius:24px; overflow:hidden; background:#2b1809; box-shadow:inset 0 0 0 2px rgba(255,255,255,.06), 0 18px 34px rgba(0,0,0,.28); aspect-ratio: 2 / 1; }
        .table-svg { width:100%; height:100%; display:block; }
        .table-ball { cursor:grab; touch-action:none; }
        .table-ball:active { cursor:grabbing; }
        .table-legend { display:flex; gap:14px; flex-wrap:wrap; font-size:13px; opacity:.82; }
        .legend-item { display:flex; align-items:center; gap:8px; }
        .legend-dot { width:12px; height:12px; border-radius:999px; box-shadow:0 0 0 1px rgba(255,255,255,.25); }
        .field label { display:block; font-size:13px; opacity:.8; margin-bottom:6px; }
        .field textarea { width:100%; box-sizing:border-box; border:1px solid #3959ab; border-radius:12px; padding:14px 14px; color:white; background:#112659; min-height:640px; resize:vertical; font-size:18px; line-height:1.55; }
        .hint { font-size:13px; opacity:.74; line-height:1.5; }
        @media (max-width:1100px) { .layout { grid-template-columns:1fr; } .viewer { height:68vh; min-height:560px; } .field textarea { min-height:420px; } }
    </style>
</head>
<body>
    <button id="fullscreenBtn" class="fullscreen-btn" type="button" onclick="toggleFullscreen()" title="Vollbild starten" aria-label="Vollbild starten">⛶</button>
    <div class="page">
        <div class="topbar">
            <div class="left">
                <h1 id="pageTitle">Position</h1>
                <div class="sub" id="pageSub">Trainingsposition</div>
            </div>
            <div class="actions">
                <button class="btn" onclick="goPrev()">Vorherige</button>
                <button class="btn" onclick="goNext()">Nächste</button>
                <button class="btn" onclick="window.location.href='training_positions.html'">Übersicht</button>
            </div>
        </div>

        <div class="layout">
            <div class="card">
                <div class="viewer-head">
                    <div>
                        <div class="viewer-title" id="viewerTitle">Roger Conti</div>
                        <div class="viewer-sub" id="viewerSub">PDF-Seite</div>
                    </div>
                    <button class="btn primary" id="openPdfBtn" type="button">PDF separat öffnen</button>
                </div>
                <div class="viewer"><iframe id="pdfFrame" title="Trainingsposition PDF"></iframe></div>
            </div>

            <div class="card">
                <div class="side">
                    <div class="notice" id="noticeBox" style="display:none;"></div>
                    <div class="meta">
                        <div class="pill" id="qualityPill">Quelle</div>
                    </div>
                    <div class="table-card">
                        <div class="table-head">
                            <div>
                                <div class="table-title">Billardtisch</div>
                                <div class="table-sub">Ziehe die drei Bälle per Hand an die gewünschte Position.</div>
                            </div>
                            <button class="table-btn" type="button" onclick="resetTableBalls()">Zurücksetzen</button>
                        </div>
                        <div class="table-wrap">
                            <svg id="trainingTable" class="table-svg" viewBox="0 0 1000 500" aria-label="Interaktiver Billardtisch">
                                <defs>
                                    <radialGradient id="clothGlow" cx="50%" cy="42%" r="72%">
                                        <stop offset="0%" stop-color="#3cbf8e"></stop>
                                        <stop offset="100%" stop-color="#15724f"></stop>
                                    </radialGradient>
                                    <radialGradient id="redBallFill" cx="35%" cy="30%" r="70%">
                                        <stop offset="0%" stop-color="#ffd8d8"></stop>
                                        <stop offset="30%" stop-color="#ff7d7d"></stop>
                                        <stop offset="100%" stop-color="#ba2020"></stop>
                                    </radialGradient>
                                    <radialGradient id="yellowBallFill" cx="35%" cy="30%" r="70%">
                                        <stop offset="0%" stop-color="#fff7cf"></stop>
                                        <stop offset="30%" stop-color="#ffe87e"></stop>
                                        <stop offset="100%" stop-color="#d3a200"></stop>
                                    </radialGradient>
                                    <radialGradient id="whiteBallFill" cx="35%" cy="30%" r="70%">
                                        <stop offset="0%" stop-color="#ffffff"></stop>
                                        <stop offset="100%" stop-color="#d7dce9"></stop>
                                    </radialGradient>
                                </defs>
                                <rect x="18" y="18" width="964" height="464" rx="34" fill="#4b2d12"></rect>
                                <rect x="58" y="58" width="884" height="384" rx="20" fill="url(#clothGlow)" stroke="#7be0bf" stroke-opacity="0.22" stroke-width="4"></rect>
                                <line x1="500" y1="58" x2="500" y2="442" stroke="#dff8ec" stroke-opacity="0.25" stroke-width="3"></line>
                                <circle cx="500" cy="250" r="72" fill="none" stroke="#dff8ec" stroke-opacity="0.25" stroke-width="3"></circle>
                                <circle cx="500" cy="250" r="6" fill="#e6fff4" fill-opacity="0.45"></circle>
                                <g id="ball-red" class="table-ball" data-ball="red">
                                    <circle r="20" fill="url(#redBallFill)" stroke="#ffffff" stroke-opacity="0.45" stroke-width="2"></circle>
                                    <circle r="7" cx="-6" cy="-6" fill="#ffffff" fill-opacity="0.42"></circle>
                                </g>
                                <g id="ball-yellow" class="table-ball" data-ball="yellow">
                                    <circle r="20" fill="url(#yellowBallFill)" stroke="#ffffff" stroke-opacity="0.45" stroke-width="2"></circle>
                                    <circle r="7" cx="-6" cy="-6" fill="#ffffff" fill-opacity="0.42"></circle>
                                </g>
                                <g id="ball-white" class="table-ball" data-ball="white">
                                    <circle r="20" fill="url(#whiteBallFill)" stroke="#394461" stroke-opacity="0.4" stroke-width="2"></circle>
                                    <circle r="7" cx="-6" cy="-6" fill="#ffffff" fill-opacity="0.72"></circle>
                                </g>
                            </svg>
                        </div>
                        <div class="table-legend">
                            <div class="legend-item"><span class="legend-dot" style="background:#cf2e2e;"></span><span>Rot</span></div>
                            <div class="legend-item"><span class="legend-dot" style="background:#e0bb20;"></span><span>Gelb</span></div>
                            <div class="legend-item"><span class="legend-dot" style="background:#eef2fb;"></span><span>Weiß</span></div>
                        </div>
                    </div>
                    <label class="train-box">
                        <input id="trainedCheckbox" type="checkbox">
                        <span class="train-label">Trainiert</span>
                    </label>
                    <div class="field">
                        <label for="notesInput">Notizen</label>
                        <textarea id="notesInput" placeholder="Eigene Notizen, Hinweise, Varianten, wichtige Punkte"></textarea>
                    </div>
                    <button class="btn primary" id="saveBtn" onclick="savePositionState()">Speichern</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/user_menu.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const positionId = params.get("id") || "";
        const COLLECTIONS = {
            "roger-conti": { file: "data/roger_conti_positions.json", label: "Roger Conti 1-62", pdfPath: "https://kstqhcaazuuxchqtnyfc.supabase.co/storage/v1/object/sign/pdf/Conti_1_62.pdf?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV83MDBhNTU0Ny1jODNmLTQ5NzUtOWViMi01ODA4ZGQyOWZjZWUiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJwZGYvQ29udGlfMV82Mi5wZGYiLCJpYXQiOjE3NzIzNDg3NTUsImV4cCI6MTgwMzg4NDc1NX0.cmqqXoE50h-86B5iIqEF4LSuB4B0E7Uqc6hNzRXBukg" },
            "roger-conti-63-151": { file: "data/roger_conti_positions_63_150.json", label: "Roger Conti 63-151", pdfPath: "https://kstqhcaazuuxchqtnyfc.supabase.co/storage/v1/object/sign/pdf/Conti_63-151.pdf?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV83MDBhNTU0Ny1jODNmLTQ5NzUtOWViMi01ODA4ZGQyOWZjZWUiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJwZGYvQ29udGlfNjMtMTUxLnBkZiIsImlhdCI6MTc3MjQ1Nzk0MywiZXhwIjoxODAzOTkzOTQzfQ.3c2paRxUB3ifN6kZSkeAJ81YWjv_-AxmuDqv5PNJAXQ" }
        };
        let currentUser = null, positions = [], currentPosition = null, currentCollection = null, entry = null;
        let saveInProgress = false;
        let savedPulseTimeout = null;
        const localCollectionCache = {};
        const TABLE_DEFAULT_LAYOUT = {
            red: { x: 300, y: 250 },
            yellow: { x: 700, y: 185 },
            white: { x: 700, y: 315 }
        };
        const TABLE_BOUNDS = { minX: 78, maxX: 922, minY: 78, maxY: 422, radius: 20 };
        let tableBallLayout = { ...TABLE_DEFAULT_LAYOUT };
        let activeBallDrag = null;
        let activeBallElement = null;
        let activePointerId = null;
        function updateFullscreenButton() {
            const btn = document.getElementById("fullscreenBtn");
            if (!btn) return;
            const active = !!document.fullscreenElement;
            btn.innerText = active ? "×" : "⛶";
            btn.title = active ? "Vollbild beenden" : "Vollbild starten";
            btn.setAttribute("aria-label", active ? "Vollbild beenden" : "Vollbild starten");
        }
        async function toggleFullscreen() {
            try {
                if (document.fullscreenElement) {
                    await document.exitFullscreen();
                } else {
                    await document.documentElement.requestFullscreen();
                }
            } catch (error) {
                console.warn("Fullscreen Toggle fehlgeschlagen:", error);
            } finally {
                updateFullscreenButton();
            }
        }

        function setNotice(text) {
            const el = document.getElementById("noticeBox");
            el.style.display = text ? "block" : "none";
            el.innerText = text || "";
        }
        function tableStorageKey() {
            return "position_training_table_" + String(currentUser?.id || "guest") + "_" + String(currentPosition?.id || "unknown");
        }
        function clamp(value, min, max) {
            return Math.min(max, Math.max(min, value));
        }
        function getDefaultTableLayout() {
            return {
                red: { ...TABLE_DEFAULT_LAYOUT.red },
                yellow: { ...TABLE_DEFAULT_LAYOUT.yellow },
                white: { ...TABLE_DEFAULT_LAYOUT.white }
            };
        }
        function persistTableLayout() {
            if (!currentPosition) return;
            localStorage.setItem(tableStorageKey(), JSON.stringify(tableBallLayout));
        }
        function loadTableLayout() {
            tableBallLayout = getDefaultTableLayout();
            if (!currentPosition) return;
            try {
                const raw = JSON.parse(localStorage.getItem(tableStorageKey()) || "null");
                ["red", "yellow", "white"].forEach((key) => {
                    if (!raw || !raw[key]) return;
                    tableBallLayout[key] = {
                        x: clamp(Number(raw[key].x) || TABLE_DEFAULT_LAYOUT[key].x, TABLE_BOUNDS.minX, TABLE_BOUNDS.maxX),
                        y: clamp(Number(raw[key].y) || TABLE_DEFAULT_LAYOUT[key].y, TABLE_BOUNDS.minY, TABLE_BOUNDS.maxY)
                    };
                });
            } catch (_) {
                tableBallLayout = getDefaultTableLayout();
            }
        }
        function renderTableBalls() {
            ["red", "yellow", "white"].forEach((key) => {
                const el = document.getElementById("ball-" + key);
                const pos = tableBallLayout[key];
                if (el && pos) el.setAttribute("transform", "translate(" + pos.x + " " + pos.y + ")");
            });
        }
        function updateBallPosition(ballKey, x, y) {
            tableBallLayout[ballKey] = {
                x: clamp(x, TABLE_BOUNDS.minX, TABLE_BOUNDS.maxX),
                y: clamp(y, TABLE_BOUNDS.minY, TABLE_BOUNDS.maxY)
            };
            renderTableBalls();
            persistTableLayout();
        }
        function getSvgPoint(event) {
            const svg = document.getElementById("trainingTable");
            const rect = svg.getBoundingClientRect();
            const clientX = event.clientX ?? (event.touches && event.touches[0] && event.touches[0].clientX) ?? 0;
            const clientY = event.clientY ?? (event.touches && event.touches[0] && event.touches[0].clientY) ?? 0;
            const x = ((clientX - rect.left) / rect.width) * 1000;
            const y = ((clientY - rect.top) / rect.height) * 500;
            return { x, y };
        }
        function handleBallPointerMove(event) {
            if (!activeBallDrag) return;
            event.preventDefault();
            const point = getSvgPoint(event);
            updateBallPosition(activeBallDrag, point.x, point.y);
        }
        function stopBallDrag() {
            if (activeBallElement && activeBallElement.releasePointerCapture) {
                try { activeBallElement.releasePointerCapture(activePointerId); } catch (_) {}
            }
            activeBallDrag = null;
            activeBallElement = null;
            activePointerId = null;
        }
        function startBallDrag(event) {
            const ballKey = event.currentTarget.dataset.ball;
            if (!ballKey) return;
            activeBallDrag = ballKey;
            activeBallElement = event.currentTarget;
            activePointerId = event.pointerId;
            if (activeBallElement.setPointerCapture) {
                try { activeBallElement.setPointerCapture(event.pointerId); } catch (_) {}
            }
            event.preventDefault();
        }
        function bindTableEvents() {
            document.querySelectorAll(".table-ball").forEach((el) => {
                el.addEventListener("pointerdown", startBallDrag);
            });
            window.addEventListener("pointermove", handleBallPointerMove);
            window.addEventListener("pointerup", stopBallDrag);
            window.addEventListener("pointercancel", stopBallDrag);
        }
        function resetTableBalls() {
            tableBallLayout = getDefaultTableLayout();
            renderTableBalls();
            persistTableLayout();
        }
        function setSaveButtonState(label, disabled) {
            const btn = document.getElementById("saveBtn");
            btn.disabled = disabled;
            btn.style.opacity = disabled ? "0.72" : "1";
            btn.style.cursor = disabled ? "wait" : "pointer";
        }
        function setSaveButtonVisualState(state) {
            const btn = document.getElementById("saveBtn");
            btn.classList.remove("saving", "saved");
            if (savedPulseTimeout) {
                clearTimeout(savedPulseTimeout);
                savedPulseTimeout = null;
            }
            if (state === "saving") {
                btn.classList.add("saving");
                return;
            }
            if (state === "saved") {
                btn.classList.add("saved");
                savedPulseTimeout = window.setTimeout(() => {
                    btn.classList.remove("saved");
                    savedPulseTimeout = null;
                }, 900);
            }
        }
        function localStorageKey() { return "position_training_progress_" + String(currentUser?.id || "guest"); }
        function loadLocalProgressMap() { try { return JSON.parse(localStorage.getItem(localStorageKey()) || "{}"); } catch (_) { return {}; } }
        function saveLocalProgressMap(map) { localStorage.setItem(localStorageKey(), JSON.stringify(map)); }
        function getDefaultNotes() {
            if (entry && entry.notes) return entry.notes;
            if (currentPosition && Array.isArray(currentPosition.comments) && currentPosition.comments.length) return currentPosition.comments.join("\n\n");
            if (currentPosition && currentPosition.sourceText) return currentPosition.sourceText;
            if (currentCollection === "roger-conti-63-151") return "Für diese Position liegt noch kein importierter Text vor. Notizen hier manuell ergänzen oder lokal OCRen und später importieren.";
            return "";
        }
        function renderState() {
            document.getElementById("trainedCheckbox").checked = Boolean(entry?.trained);
            document.getElementById("notesInput").value = getDefaultNotes();
            loadTableLayout();
            renderTableBalls();
            if (!saveInProgress) {
                setSaveButtonState("Speichern", false);
            }
        }
        function renderMeta() {
            document.getElementById("pageTitle").innerText = "Position " + currentPosition.number;
            document.getElementById("pageSub").innerText = COLLECTIONS[currentCollection].label;
            document.getElementById("viewerTitle").innerText = COLLECTIONS[currentCollection].label + " - Fiche " + currentPosition.number;
            document.getElementById("viewerSub").innerText = currentPosition.pdfPage ? ("PDF-Seite " + currentPosition.pdfPage) : "PDF-Seite nicht gesetzt";
            document.getElementById("qualityPill").innerText = currentPosition.sourceQuality === "poor-scan" ? "Quelle: schwacher Scan" : (currentPosition.sourceQuality === "imported-text" ? "Quelle: importierter Text" : "Quelle: PDF mit Text");
        }
        function renderViewer() {
            const pdfUrl = COLLECTIONS[currentCollection].pdfPath + "#page=" + currentPosition.pdfPage + "&view=FitH&pagemode=none";
            document.getElementById("pdfFrame").src = pdfUrl;
            document.getElementById("openPdfBtn").onclick = () => window.open(pdfUrl, "_blank");
        }
        async function loadLocalCollection(key) {
            if (localCollectionCache[key]) return localCollectionCache[key];
            const res = await fetch(COLLECTIONS[key].file, { cache: "no-store" });
            const items = await res.json();
            localCollectionCache[key] = items;
            return items;
        }
        async function applyLocalOverrides(key, items) {
            const localItems = await loadLocalCollection(key);
            const localMap = new Map(localItems.map((item) => [item.id, item]));
            return items.map((item) => {
                const localItem = localMap.get(item.id);
                if (!localItem) return item;
                return {
                    ...item,
                    comments: Array.isArray(localItem.comments) && localItem.comments.length ? localItem.comments : item.comments,
                    sourceQuality: localItem.sourceQuality || item.sourceQuality,
                    sourceText: localItem.sourceText || item.sourceText || ""
                };
            });
        }
        async function loadPositionAndCollectionFromDb() {
            const { data: pos, error: posError } = await supabaseClient.from("training_positions_catalog").select("id,set_key,number,title,pdf_page,discipline,difficulty,description,comments,source_quality,source_text").eq("id", positionId).maybeSingle();
            if (posError || !pos) throw posError || new Error("Position nicht gefunden");
            currentPosition = { ...pos, pdfPage: pos.pdf_page, sourceQuality: pos.source_quality, sourceText: pos.source_text || pos.sourceText || "" };
            currentCollection = pos.set_key;
            const { data: list, error: listError } = await supabaseClient.from("training_positions_catalog").select("id,set_key,number,title,pdf_page,discipline,difficulty,description,comments,source_quality,source_text").eq("set_key", currentCollection).order("number", { ascending: true });
            if (listError) throw listError;
            positions = (list || []).map((item) => ({ ...item, pdfPage: item.pdf_page, sourceQuality: item.source_quality, sourceText: item.source_text || item.sourceText || "" }));
            positions = await applyLocalOverrides(currentCollection, positions);
            currentPosition = positions.find((item) => item.id === currentPosition.id) || currentPosition;
            const { data: progressRow, error: progressError } = await supabaseClient.from("training_position_progress").select("position_id,notes,trained,updated_at").eq("user_id", currentUser.id).eq("position_id", currentPosition.id).maybeSingle();
            if (progressError) throw progressError;
            entry = progressRow || { position_id: currentPosition.id, notes: "", trained: false, updated_at: "" };
        }
        async function loadFallback() {
            for (const [key, cfg] of Object.entries(COLLECTIONS)) {
                const items = await loadLocalCollection(key);
                const found = items.find((x) => x.id === positionId) || null;
                if (found) { currentCollection = key; positions = items; currentPosition = found; break; }
            }
            if (!currentPosition) {
                positions = await loadLocalCollection("roger-conti"); currentCollection = "roger-conti"; currentPosition = positions[0] || null;
            }
            const map = loadLocalProgressMap();
            const raw = map[currentPosition.id] || {};
            entry = { position_id: currentPosition.id, notes: raw.notes || "", trained: Boolean(raw.trained), updated_at: raw.updatedAt || "" };
        }
        async function savePositionState() {
            if (saveInProgress) return;
            saveInProgress = true;
            entry.notes = document.getElementById("notesInput").value || "";
            entry.trained = document.getElementById("trainedCheckbox").checked;
            entry.updated_at = new Date().toISOString();
            setSaveButtonState("Speichern", true);
            setSaveButtonVisualState("saving");
            try {
                const payload = { position_id: currentPosition.id, user_id: currentUser.id, notes: entry.notes || "", trained: Boolean(entry.trained), updated_at: entry.updated_at };
                const { error } = await supabaseClient.from("training_position_progress").upsert(payload, { onConflict: "position_id,user_id" });
                if (error) throw error;
            } catch (error) {
                const map = loadLocalProgressMap();
                map[currentPosition.id] = { notes: entry.notes || "", trained: Boolean(entry.trained), updatedAt: entry.updated_at };
                saveLocalProgressMap(map);
                console.warn("Positionstraining lokal gespeichert:", error);
            }
            saveInProgress = false;
            setSaveButtonState("Speichern", false);
            setSaveButtonVisualState("saved");
            renderState();
        }
        function goToPosition(index) { if (index < 0 || index >= positions.length) return; window.location.href = "training_position_detail.html?id=" + encodeURIComponent(positions[index].id); }
        function goPrev() { const index = positions.findIndex((x) => x.id === currentPosition.id); goToPosition(index - 1); }
        function goNext() { const index = positions.findIndex((x) => x.id === currentPosition.id); goToPosition(index + 1); }
        async function init() {
            currentUser = await requireAuth(); if (!currentUser) return;
            updateFullscreenButton();
            try { await loadPositionAndCollectionFromDb(); } catch (error) { console.warn("Positionstraining DB-Fallback aktiv:", error); setNotice("Datenbanktabellen für Positionstraining noch nicht aktiv. JSON/localStorage-Fallback läuft. SQL aus sql/training_positions.sql in Supabase ausführen."); await loadFallback(); }
            if (!currentPosition) return;
            bindTableEvents();
            renderMeta(); renderViewer(); renderState();
        }
        document.addEventListener("fullscreenchange", updateFullscreenButton);
        init();
    </script>
</body>
</html>
