<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Neues Match</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            background: linear-gradient(180deg, #1e1f29, #14151c);
            color: white;
        }

        .header {
            text-align: center;
            padding: 18px 0 10px 0;
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 0.4px;
        }


        .container {
            width: min(1560px, 94%);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            padding-bottom: 20px;
        }

        .players-row {
            display: flex;
            gap: 18px;
            flex: 1;
        }

        .player-column {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .section {
            background: linear-gradient(180deg, #2a2d3d, #232635);
            padding: 18px 18px 14px;
            border-radius: 20px;
            margin-bottom: 12px;
            border: 1px solid #34384f;
            box-shadow: 0 16px 34px rgba(0, 0, 0, 0.32);
        }

        .section h3 {
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .player-column .field-title {
            margin: 12px 0 8px;
            font-weight: 700;
            opacity: 0.94;
            font-size: 18px;
            line-height: 1.2;
        }

        .row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1.3fr;
            gap: 12px;
            align-items: start;
        }

        select,
        input {
            font-size: 17px;
            padding: 10px 12px;
            border-radius: 12px;
            border: none;
        }

        input {
            background: #f2f4fa;
        }

        .points-box {
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-width: 0;
        }

        .points-box .field-title,
        .max-innings-inline .field-title {
            margin: 0 0 8px;
        }

        .setup-pair {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 220px;
            gap: 12px;
            align-items: start;
            width: 100%;
            min-width: 0;
        }

        .max-innings-inline {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
            min-width: 0;
        }

        .quick-defaults,
        .adjust {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .quick-defaults button,
        .adjust button,
        .max-adjust button {
            padding: 8px 13px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            background: #464b60;
            color: white;
            cursor: pointer;
            transition: background .15s ease, transform .15s ease;
        }

        .quick-defaults button:hover,
        .adjust button:hover,
        .max-adjust button:hover {
            background: #3f4fa3;
            transform: translateY(-1px);
        }

        .max-adjust {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            margin-top: 0;
            width: 100%;
            padding: 18px;
            font-size: 24px;
            font-weight: 700;
            border: none;
            border-radius: 18px;
            color: white;
            cursor: pointer;
            transition: transform .15s ease, filter .15s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.06);
        }

        .btn-start {
            background: linear-gradient(180deg, #4c62d8, #3349be);
        }

        .btn-secondary {
            background: #3f4b93;
        }

        .btn-reset {
            background: #4758a8;
        }

        .btn-repeat {
            background: #5667ba;
        }

        .nav-btn {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 16px;
            background: #444;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }

        /* TOUCH SELECTS */

        .touch-player-select,
        .touch-select {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .touch-player-btn,
        .touch-select-btn {
            background: #444a5f;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #4e556f;
            transition: background .15s ease, border-color .15s ease;
        }

        .touch-player-btn.active,
        .touch-select-btn.active {
            background: #3f4fa3;
            border-color: #6c7ee2;
            font-weight: 700;
        }

        .button-row-bottom {
            display: flex;
            gap: 20px;
            margin-top: 18px;
            margin-bottom: 10px;
        }

        .form-message {
            min-height: 22px;
            font-size: 16px;
            text-align: center;
            opacity: .92;
            margin-bottom: 8px;
        }

        .form-message.error {
            color: #ffb3b3;
        }

        .form-message.ok {
            color: #b7f7c7;
        }

        .obs-box {
            display: none;
            margin-top: 14px;
            padding: 16px 18px;
            border-radius: 18px;
            background: linear-gradient(180deg, #263056, #202746);
            border: 1px solid #3b4a85;
            box-shadow: 0 14px 28px rgba(0, 0, 0, 0.24);
        }

        .obs-box.visible {
            display: block;
        }

        .obs-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .obs-sub {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 12px;
        }

        .obs-link {
            width: 100%;
            box-sizing: border-box;
            font-size: 14px;
            padding: 12px 14px;
            border-radius: 12px;
            border: 1px solid #495891;
            background: #11182f;
            color: #f3f5ff;
            margin-bottom: 12px;
        }

        .obs-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .obs-actions button {
            padding: 10px 16px;
            border-radius: 12px;
            border: none;
            background: #4657ab;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        .obs-actions button:hover {
            filter: brightness(1.08);
        }

        .control-mode-wrapper {
            display: flex;
            gap: 20px;
            margin: 14px 0 10px 0;
        }

        .mode-card {
            flex: 1;
            background: linear-gradient(180deg, #2e3142, #262a3a);
            padding: 16px 18px;
            border-radius: 16px;
            cursor: pointer;
            transition: .2s ease;
            border: 2px solid #3b4060;
        }

        .mode-card:hover {
            background: #32374e;
        }

        .mode-card.active {
            border: 2px solid #5c73ee;
            background: linear-gradient(180deg, #38406a, #2d3562);
        }

        .mode-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .mode-sub {
            font-size: 14px;
            opacity: .7;
        }

        .max-innings-inline input {
            width: 100%;
            box-sizing: border-box;
        }

        .max-innings-inline input[readonly] {
            opacity: 0.72;
            cursor: not-allowed;
        }

        @media (max-width: 1320px) {
            .setup-pair {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 1180px) {
            .header {
                font-size: 28px;
            }

            .players-row {
                flex-direction: column;
            }

            .button-row-bottom {
                flex-direction: column;
            }

            .control-mode-wrapper {
                flex-direction: column;
            }

            .max-innings-inline {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="header">Neues Match</div>

    <div class="container">

        <div class="players-row">

            <!-- ================= SPIELER 1 ================= -->
            <div class="section player-column">

                <h3>Spieler 1</h3>

                <!-- PLAYER -->
                <select id="player1" style="display:none;"></select>
                <div id="touchPlayer1" class="touch-player-select"></div>

                <!-- DISCIPLINE -->
                <select id="discipline1" style="display:none;">
                    <option value="Freie Partie">Freie Partie</option>
                    <option value="Freie Partie 2x">Freie Partie 2x</option>
                    <option value="Cadre 35/2">Cadre 35/2</option>
                    <option value="Cadre 52/2">Cadre 52/2</option>
                    <option value="Cadre 47/2">Cadre 47/2</option>
                    <option value="Cadre 47/1">Cadre 47/1</option>
                    <option value="Cadre 71/2">Cadre 71/2</option>
                    <option value="Einband">Einband</option>
                    <option value="Dreiband">Dreiband</option>
                </select>

                <div style="margin-top:14px;">
                    <div class="field-title">Disziplin</div>
                    <div id="touchDiscipline1" class="touch-select"></div>
                </div>

                <!-- POINTS -->
                <div class="setup-pair" style="margin-top:16px;">
                    <div class="points-box">

                        <div class="field-title">Zielpunkte</div>

                        <input type="number" id="target1" value="">

                        <div class="quick-defaults">
                            <button type="button" onclick="setTarget('target1',50)">50</button>
                            <button type="button" onclick="setTarget('target1',100)">100</button>
                            <button type="button" onclick="setTarget('target1',150)">150</button>
                            <button type="button" onclick="setTarget('target1',200)">200</button>
                            <button type="button" onclick="setTarget('target1',300)">300</button>
                        </div>

                        <div class="adjust">
                            <button type="button" onclick="adjustTarget('target1', -10)">-10</button>
                            <button type="button" onclick="adjustTarget('target1', -1)">-1</button>
                            <button type="button" onclick="adjustTarget('target1', 1)">+1</button>
                            <button type="button" onclick="adjustTarget('target1', 10)">+10</button>
                        </div>
                    </div>
                    <div class="max-innings-inline">
                        <div class="field-title">Maximale Aufnahmen</div>
                        <input type="number" id="maxInnings1" value="15" min="1" oninput="syncMaxInnings(this.value)">
                        <div class="max-adjust">
                            <button type="button" onclick="adjustMaxInnings(-5)">-5</button>
                            <button type="button" onclick="adjustMaxInnings(5)">+5</button>
                        </div>
                    </div>
                </div>

            </div>


            <!-- ================= SPIELER 2 ================= -->
            <div class="section player-column">

                <h3>Spieler 2</h3>

                <!-- PLAYER -->
                <select id="player2" style="display:none;"></select>
                <div id="touchPlayer2" class="touch-player-select"></div>

                <!-- DISCIPLINE -->
                <select id="discipline2" style="display:none;">
                    <option value="Freie Partie">Freie Partie</option>
                    <option value="Freie Partie 2x">Freie Partie 2x</option>
                    <option value="Cadre 35/2">Cadre 35/2</option>
                    <option value="Cadre 52/2">Cadre 52/2</option>
                    <option value="Cadre 47/2">Cadre 47/2</option>
                    <option value="Cadre 47/1">Cadre 47/1</option>
                    <option value="Cadre 71/2">Cadre 71/2</option>
                    <option value="Einband">Einband</option>
                    <option value="Dreiband">Dreiband</option>
                </select>

                <div style="margin-top:14px;">
                    <div class="field-title">Disziplin</div>
                    <div id="touchDiscipline2" class="touch-select"></div>
                </div>

                <!-- POINTS -->
                <div class="setup-pair" style="margin-top:16px;">
                    <div class="points-box">

                        <div class="field-title">Zielpunkte</div>

                        <input type="number" id="target2" value="">

                        <div class="quick-defaults">
                            <button type="button" onclick="setTarget('target2',50)">50</button>
                            <button type="button" onclick="setTarget('target2',100)">100</button>
                            <button type="button" onclick="setTarget('target2',150)">150</button>
                            <button type="button" onclick="setTarget('target2',200)">200</button>
                            <button type="button" onclick="setTarget('target2',300)">300</button>
                        </div>

                        <div class="adjust">
                            <button type="button" onclick="adjustTarget('target2', -10)">-10</button>
                            <button type="button" onclick="adjustTarget('target2', -1)">-1</button>
                            <button type="button" onclick="adjustTarget('target2', 1)">+1</button>
                            <button type="button" onclick="adjustTarget('target2', 10)">+10</button>
                        </div>
                    </div>
                    <div class="max-innings-inline">
                        <div class="field-title">Maximale Aufnahmen</div>
                        <input type="number" id="maxInnings2" value="15" min="1" readonly tabindex="-1" aria-readonly="true">
                    </div>
                </div>

            </div>

        </div>

        <div class="control-mode-wrapper">

            <div class="mode-card active" data-mode="local" onclick="selectMode('local')">
                <div class="mode-title">Bedienung am Bildschirm</div>
                <div class="mode-sub">Buttons sichtbar</div>
            </div>

            <div class="mode-card" data-mode="remote" onclick="selectMode('remote')">
                <div class="mode-title">Nur Remote</div>
                <div class="mode-sub">Main = Viewer</div>
            </div>

        </div>

        <input type="hidden" id="controlMode" value="local">

        <div class="button-row-bottom">
            <button class="btn btn-start" onclick="startMatch()">
                Match starten
            </button>

            <button class="btn btn-repeat" id="repeatLastBtn" onclick="repeatLastMatchSetup()">
                Letzte Partie übernehmen
            </button>

            <button class="btn btn-secondary" onclick="window.location.href='index.html'">
                Zurück
            </button>

            <button class="btn btn-reset" onclick="resetAll()">
                Reset
            </button>
        </div>
        <div id="formMessage" class="form-message"></div>
        <div id="obsBox" class="obs-box">
            <div class="obs-title">OBS Overlay</div>
            <div class="obs-sub">Diesen Link als Browser-Quelle in OBS nutzen.</div>
            <input id="obsOverlayLink" class="obs-link" type="text" readonly value="">
            <div class="obs-actions">
                <button type="button" onclick="copyObsLink()">OBS-Link kopieren</button>
                <button type="button" onclick="openObsOverlay()">Overlay öffnen</button>
                <button type="button" onclick="openScoreboardMatch()">Zum Scoreboard</button>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="js/supabase.js"></script>
        <script src="js/auth.js"></script>
    <script src="js/user_menu.js"></script>


        <script>

            let selectedMode = "local";
            let currentUserId = "";
            let ownedPlayerNames = [];
            let availablePlayers = [];
            let lastCreatedMatchId = "";
            let lastCreatedStreamToken = "";
            const LAST_MATCH_SETUP_KEY = "last_match_setup_v1";


            function selectMode(mode) {

                selectedMode = mode;

                document.querySelectorAll(".mode-card")
                    .forEach(card => card.classList.remove("active"));

                document.querySelector(`[data-mode='${mode}']`)
                    .classList.add("active");
            }

            function getLastMatchSetup() {
                try {
                    return JSON.parse(localStorage.getItem(LAST_MATCH_SETUP_KEY) || "null");
                } catch (_) {
                    return null;
                }
            }

            function saveLastMatchSetup(setup) {
                localStorage.setItem(LAST_MATCH_SETUP_KEY, JSON.stringify(setup));
                updateRepeatButtonState();
            }

            function updateRepeatButtonState() {
                const btn = document.getElementById("repeatLastBtn");
                if (!btn) return;
                const hasSavedSetup = !!getLastMatchSetup();
                btn.disabled = !hasSavedSetup;
                btn.style.opacity = hasSavedSetup ? "1" : "0.55";
                btn.style.cursor = hasSavedSetup ? "pointer" : "not-allowed";
            }

            function setActivePlayerButton(containerId, playerId) {
                const container = document.getElementById(containerId);
                if (!container) return;
                container.querySelectorAll(".touch-player-btn").forEach((btn) => {
                    btn.classList.toggle("active", btn.innerText === playerId);
                });
            }

            function setActiveDisciplineButton(containerId, discipline) {
                const container = document.getElementById(containerId);
                if (!container) return;
                container.querySelectorAll(".touch-select-btn").forEach((btn) => {
                    btn.classList.toggle("active", btn.innerText === discipline);
                });
            }

            function repeatLastMatchSetup() {
                const lastSetup = getLastMatchSetup();
                if (!lastSetup) {
                    setFormMessage("Keine letzte Partie gespeichert.", "error");
                    updateRepeatButtonState();
                    return;
                }

                const p1Row = availablePlayers.find((x) => String(x.name) === String(lastSetup.player1 || ""));
                const p2Row = availablePlayers.find((x) => String(x.name) === String(lastSetup.player2 || ""));
                if (!p1Row || !p2Row) {
                    setFormMessage("Letzte Partie konnte nicht vollständig geladen werden. Spieler fehlen.", "error");
                    return;
                }

                document.getElementById("player1").value = String(p1Row.id);
                document.getElementById("player2").value = String(p2Row.id);
                document.querySelectorAll('#touchPlayer1 .touch-player-btn').forEach((btn) => {
                    btn.classList.toggle("active", btn.innerText === p1Row.name);
                });
                document.querySelectorAll('#touchPlayer2 .touch-player-btn').forEach((btn) => {
                    btn.classList.toggle("active", btn.innerText === p2Row.name);
                });

                document.getElementById("discipline1").value = lastSetup.discipline1 || "";
                document.getElementById("discipline2").value = lastSetup.discipline2 || "";
                setActiveDisciplineButton("touchDiscipline1", lastSetup.discipline1 || "");
                setActiveDisciplineButton("touchDiscipline2", lastSetup.discipline2 || "");

                document.getElementById("target1").value = lastSetup.target1 || "";
                document.getElementById("target2").value = lastSetup.target2 || "";
                syncMaxInnings(lastSetup.maxInnings || 15);
                selectMode(lastSetup.controlMode || "local");
                setFormMessage("Letzte Partie übernommen.", "ok");
            }



            async function loadPlayers() {

                let { data: players, error } = await supabaseClient
                    .from("players")
                    .select("id,name,user_id")
                    .eq("user_id", currentUserId)
                    .order("name", { ascending: true });

                if (error && String(error.message || "").toLowerCase().includes("user_id")) {
                    const fallback = await supabaseClient
                        .from("players")
                        .select("id,name")
                        .order("name", { ascending: true });
                    players = fallback.data;
                    error = fallback.error;
                }

                if (error) {
                    console.error(error);
                    return;
                }

                const byName = new Map();
                (players || []).forEach((row) => {
                    const rawName = String((row && row.name) || "").trim();
                    if (!rawName || rawName === "?") return;
                    const key = rawName.toLowerCase();
                    if (!byName.has(key)) {
                        byName.set(key, {
                            id: row.id,
                            name: rawName,
                            user_id: row.user_id || null
                        });
                        return;
                    }
                    const existing = byName.get(key);
                    // Bevorzuge Datensätze mit user_id, falls Duplikate existieren.
                    if (!existing.user_id && row.user_id) {
                        byName.set(key, {
                            id: row.id,
                            name: rawName,
                            user_id: row.user_id
                        });
                    }
                });
                availablePlayers = Array.from(byName.values())
                    .sort((a, b) => a.name.localeCompare(b.name, "de"));

                const p1 = document.getElementById('player1');
                const p2 = document.getElementById('player2');
                const t1 = document.getElementById('touchPlayer1');
                const t2 = document.getElementById('touchPlayer2');

                p1.innerHTML = "";
                p2.innerHTML = "";
                t1.innerHTML = "";
                t2.innerHTML = "";

                availablePlayers.forEach(p => {
                    const playerId = String(p.id);
                    p1.add(new Option(p.name, playerId));
                    p2.add(new Option(p.name, playerId));

                    const b1 = document.createElement("div");
                    b1.className = "touch-player-btn";
                    b1.innerText = p.name;
                    b1.onclick = () => {
                        if (p2.value === playerId) return;
                        p1.value = playerId;
                        t1.querySelectorAll(".touch-player-btn").forEach(x => x.classList.remove("active"));
                        b1.classList.add("active");
                    };
                    t1.appendChild(b1);

                    const b2 = document.createElement("div");
                    b2.className = "touch-player-btn";
                    b2.innerText = p.name;
                    b2.onclick = () => {
                        if (p1.value === playerId) return;
                        p2.value = playerId;
                        t2.querySelectorAll(".touch-player-btn").forEach(x => x.classList.remove("active"));
                        b2.classList.add("active");
                    };
                    t2.appendChild(b2);
                });

                p1.value = "";
                p2.value = "";
                p1.selectedIndex = -1;
                p2.selectedIndex = -1;
            }

            /* DISCIPLINE TOUCH */
            function buildTouchDiscipline(selectId, containerId) {
                const select = document.getElementById(selectId);
                const container = document.getElementById(containerId);

                for (let i = 0; i < select.options.length; i++) {
                    const option = select.options[i];
                    const btn = document.createElement("div");
                    btn.className = "touch-select-btn";
                    btn.innerText = option.text;
                    btn.onclick = () => {
                        select.value = option.value;
                        container.querySelectorAll(".touch-select-btn").forEach(x => x.classList.remove("active"));
                        btn.classList.add("active");
                    };
                    container.appendChild(btn);
                }
            }

            function setTarget(id, value) {
                document.getElementById(id).value = value;
            }

            function adjustTarget(id, value) {
                const input = document.getElementById(id);
                let current = parseInt(input.value) || 0;
                current += value;
                if (current < 1) current = 1;
                input.value = current;
            }

            function syncMaxInnings(value) {
                const source = document.getElementById("maxInnings1");
                const mirror = document.getElementById("maxInnings2");
                if (!source || !mirror) return;
                const nextValue = value !== undefined ? value : source.value;
                source.value = nextValue;
                mirror.value = nextValue;
            }

            function generateStreamToken() {
                if (window.crypto && typeof window.crypto.randomUUID === "function") {
                    return window.crypto.randomUUID().replace(/-/g, "");
                }
                return Math.random().toString(36).slice(2) + Date.now().toString(36);
            }

            function adjustMaxInnings(delta) {
                const input = document.getElementById("maxInnings1");
                if (!input) return;
                let current = parseInt(input.value, 10) || 0;
                current += delta;
                if (current < 1) current = 1;
                syncMaxInnings(current);
            }

            function buildObsOverlayLink(matchId, streamToken) {
                const url = new URL(window.location.origin + "/stream_scoreboard.html");
                url.searchParams.set("match", matchId);
                if (streamToken) url.searchParams.set("token", streamToken);
                return url.toString();
            }

            function showObsBox(matchId, streamToken) {
                lastCreatedMatchId = String(matchId || "");
                lastCreatedStreamToken = String(streamToken || "");
                const obsBox = document.getElementById("obsBox");
                const obsLink = document.getElementById("obsOverlayLink");
                if (!obsBox || !obsLink) return;
                obsLink.value = buildObsOverlayLink(lastCreatedMatchId, lastCreatedStreamToken);
                obsBox.classList.add("visible");
            }

            async function copyObsLink() {
                const input = document.getElementById("obsOverlayLink");
                if (!input || !input.value) return;
                try {
                    await navigator.clipboard.writeText(input.value);
                    setFormMessage("OBS-Link kopiert.", "ok");
                } catch (_) {
                    input.focus();
                    input.select();
                    setFormMessage("OBS-Link markiert. Bitte kopieren.", "ok");
                }
            }

            function openObsOverlay() {
                const input = document.getElementById("obsOverlayLink");
                if (!input || !input.value) return;
                window.open(input.value, "_blank");
            }

            function openScoreboardMatch() {
                if (!lastCreatedMatchId) return;
                window.location.href = "/scoreboard.html?match=" + lastCreatedMatchId;
            }

            async function startMatch() {
                try {
                    setFormMessage("", "");
                    const uuidRegex = /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i;
                    const normalizeUserUuid = (value) => {
                        const raw = String(value || "").trim();
                        return uuidRegex.test(raw) ? raw : null;
                    };

                    const p1SelectValue = document.getElementById('player1').value;
                    const p2SelectValue = document.getElementById('player2').value;
                    const d1 = document.getElementById('discipline1').value;
                    const d2 = document.getElementById('discipline2').value;
                    const d1Selected = !!document.querySelector('#touchDiscipline1 .touch-select-btn.active');
                    const d2Selected = !!document.querySelector('#touchDiscipline2 .touch-select-btn.active');
                    const target1 = parseInt(document.getElementById('target1').value, 10);
                    const target2 = parseInt(document.getElementById('target2').value, 10);
                    const maxInnings = parseInt(document.getElementById('maxInnings1').value, 10);

                    if (!p1SelectValue || !p2SelectValue || p1SelectValue === p2SelectValue) {
                        setFormMessage("Bitte zwei unterschiedliche Spieler wählen.", "error");
                        return;
                    }

                    const p1Row = availablePlayers.find((x) => String(x.id) === String(p1SelectValue));
                    const p2Row = availablePlayers.find((x) => String(x.id) === String(p2SelectValue));
                    const p1 = (p1Row && p1Row.name) || "";
                    const p2 = (p2Row && p2Row.name) || "";
                    if (!p1 || !p2) {
                        setFormMessage("Spieler konnten nicht eindeutig geladen werden. Bitte Auswahl neu treffen.", "error");
                        return;
                    }

                    if (!ownedPlayerNames.includes(p1) && !ownedPlayerNames.includes(p2)) {
                        setFormMessage("Du kannst nur Matches starten, an denen dein eigener Spieler beteiligt ist.", "error");
                        return;
                    }

                    if (!d1 || !d2 || !d1Selected || !d2Selected) {
                        setFormMessage("Bitte für beide Spieler eine Disziplin wählen.", "error");
                        return;
                    }

                    if (!Number.isInteger(target1) || target1 < 1 ||
                        !Number.isInteger(target2) || target2 < 1) {
                        setFormMessage("Bitte für beide Spieler gültige Zielpunkte eingeben (mindestens 1).", "error");
                        return;
                    }

                    if (!Number.isInteger(maxInnings) || maxInnings < 1) {
                        setFormMessage("Bitte gültige maximale Aufnahmen eingeben (mindestens 1).", "error");
                        return;
                    }

                    const basePayload = {
                        player1: p1,
                        player2: p2,
                        discipline1: d1,
                        discipline2: d2,
                        target1,
                        target2,
                        maxInnings,
                        score1: 0,
                        score2: 0,
                        inn1: 0,
                        inn2: 0,
                        totalInnings: 1,
                        activePlayer: 1,
                        started_at: new Date().toISOString(),
                        status: 1,
                        finished: false,
                        controlMode: selectedMode,
                        stream_token: generateStreamToken()
                    };

                    let player1Id = null;
                    let player2Id = null;
                    // matches.player*_id sind UUIDs (auth.users.id), daher user_id nutzen.
                    player1Id = normalizeUserUuid(p1Row && p1Row.user_id);
                    player2Id = normalizeUserUuid(p2Row && p2Row.user_id);

                    const extendedPayload = {
                        ...basePayload,
                        created_by: currentUserId,
                        player1_id: player1Id,
                        player2_id: player2Id
                    };

                    let data = null;
                    let error = null;
                    let insertResult = await supabaseClient
                        .from("matches")
                        .insert([extendedPayload])
                        .select();
                    data = insertResult.data;
                    error = insertResult.error;

                    const errorMsg = String((error && error.message) || "").toLowerCase();
                    if (error && (errorMsg.includes("column") || errorMsg.includes("uuid"))) {
                        insertResult = await supabaseClient
                            .from("matches")
                            .insert([basePayload])
                            .select();
                        data = insertResult.data;
                        error = insertResult.error;
                    }

                    if (error) {
                        console.error(error);
                        setFormMessage("Fehler beim Starten des Matches.", "error");
                        return;
                    }

                    if (!Array.isArray(data) || data.length === 0 || !(data[0] && data[0].id)) {
                        console.error("Unerwartete Insert-Antwort:", data);
                        setFormMessage("Match konnte nicht gestartet werden. Bitte Seite neu laden.", "error");
                        return;
                    }

                    saveLastMatchSetup({
                        player1: p1,
                        player2: p2,
                        discipline1: d1,
                        discipline2: d2,
                        target1,
                        target2,
                        maxInnings,
                        controlMode: selectedMode
                    });

                    const matchId = data[0].id;
                    const streamToken = String((data[0] && data[0].stream_token) || basePayload.stream_token || "");
                    showObsBox(matchId, streamToken);
                    setFormMessage("Match erstellt. OBS-Link ist bereit.", "ok");
                } catch (e) {
                    console.error("startMatch Ausnahme:", e);
                    setFormMessage("Match-Start fehlgeschlagen: " + ((e && e.message) || "Unbekannter Fehler"), "error");
                }
            }

            function setFormMessage(text, type) {
                const el = document.getElementById("formMessage");
                if (!el) return;
                el.className = "form-message " + (type || "");
                el.innerText = text || "";
            }

            function resetAll() {

                // Spieler zurücksetzen
                document.getElementById('player1').value = "";
                document.getElementById('player2').value = "";

                document.querySelectorAll('#touchPlayer1 .touch-player-btn')
                    .forEach(b => b.classList.remove("active"));

                document.querySelectorAll('#touchPlayer2 .touch-player-btn')
                    .forEach(b => b.classList.remove("active"));

                // Disziplin zurücksetzen
                document.getElementById('discipline1').value = "";
                document.getElementById('discipline2').value = "";

                document.querySelectorAll('#touchDiscipline1 .touch-select-btn')
                    .forEach(b => b.classList.remove("active"));

                document.querySelectorAll('#touchDiscipline2 .touch-select-btn')
                    .forEach(b => b.classList.remove("active"));

                // Zielpunkte
                document.getElementById('target1').value = "";
                document.getElementById('target2').value = "";

                // Max Aufnahmen
                syncMaxInnings(15);
            }
            window.addEventListener("DOMContentLoaded", async () => {
                const user = await requireAuth();
                if (!user) return;
                currentUserId = user.id;
                ownedPlayerNames = await getOwnedPlayerNames(currentUserId);
                if (!ownedPlayerNames.length) {
                    alert("Dein Benutzer ist noch keinem Spieler zugeordnet. Bitte in der Spielerverwaltung anlegen.");
                }

                await loadPlayers();

                buildTouchDiscipline("discipline1", "touchDiscipline1");
                buildTouchDiscipline("discipline2", "touchDiscipline2");
                resetAll();
                syncMaxInnings(15);
                updateRepeatButtonState();

            });


        </script>

</body>
