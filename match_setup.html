<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Neues Match</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            min-height: 100vh;
            overflow-x: hidden;
            overflow-y: auto;
            background: linear-gradient(180deg, #1e1f29, #14151c);
            color: white;
        }

        .header {
            text-align: center;
            padding: 34px 0 18px 0;
            font-size: 52px;
            font-weight: 700;
            letter-spacing: 0.4px;
        }


        .container {
            width: min(1560px, 94%);
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            padding-bottom: 28px;
        }

        .players-row {
            display: flex;
            gap: 28px;
            flex: 1;
        }

        .player-column {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .section {
            background: linear-gradient(180deg, #2a2d3d, #232635);
            padding: 22px 20px 18px;
            border-radius: 20px;
            margin-bottom: 16px;
            border: 1px solid #34384f;
            box-shadow: 0 16px 34px rgba(0, 0, 0, 0.32);
        }

        .section h3 {
            margin-top: 0;
            margin-bottom: 14px;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.2px;
        }

        .player-column .field-title {
            margin: 16px 0 10px;
            font-weight: 700;
            opacity: 0.94;
            font-size: 20px;
        }

        .row {
            display: grid;
            grid-template-columns: 1.5fr 1fr 1.3fr;
            gap: 12px;
            align-items: start;
        }

        select,
        input {
            font-size: 18px;
            padding: 12px 14px;
            border-radius: 12px;
            border: none;
        }

        input {
            background: #f2f4fa;
        }

        .points-box {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .quick-defaults,
        .adjust {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .quick-defaults button,
        .adjust button {
            padding: 8px 13px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 8px;
            background: #464b60;
            color: white;
            cursor: pointer;
            transition: background .15s ease, transform .15s ease;
        }

        .quick-defaults button:hover,
        .adjust button:hover {
            background: #3f4fa3;
            transform: translateY(-1px);
        }

        .btn {
            margin-top: 0;
            width: 100%;
            padding: 18px;
            font-size: 24px;
            font-weight: 700;
            border: none;
            border-radius: 18px;
            color: white;
            cursor: pointer;
            transition: transform .15s ease, filter .15s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.06);
        }

        .btn-start {
            background: linear-gradient(180deg, #4c62d8, #3349be);
        }

        .btn-secondary {
            background: #3f4b93;
        }

        .btn-reset {
            background: #4758a8;
        }

        .nav-btn {
            margin-top: 20px;
            padding: 10px 30px;
            font-size: 16px;
            background: #444;
            border: none;
            border-radius: 10px;
            color: white;
            cursor: pointer;
        }

        /* TOUCH SELECTS */

        .touch-player-select,
        .touch-select {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .touch-player-btn,
        .touch-select-btn {
            background: #444a5f;
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid #4e556f;
            transition: background .15s ease, border-color .15s ease;
        }

        .touch-player-btn.active,
        .touch-select-btn.active {
            background: #3f4fa3;
            border-color: #6c7ee2;
            font-weight: 700;
        }

        .button-row-bottom {
            display: flex;
            gap: 20px;
            margin-top: 26px;
            margin-bottom: 16px;
        }

        .control-mode-wrapper {
            display: flex;
            gap: 20px;
            margin: 18px 0 12px 0;
        }

        .mode-card {
            flex: 1;
            background: linear-gradient(180deg, #2e3142, #262a3a);
            padding: 20px 22px;
            border-radius: 16px;
            cursor: pointer;
            transition: .2s ease;
            border: 2px solid #3b4060;
        }

        .mode-card:hover {
            background: #32374e;
        }

        .mode-card.active {
            border: 2px solid #5c73ee;
            background: linear-gradient(180deg, #38406a, #2d3562);
        }

        .mode-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .mode-sub {
            font-size: 14px;
            opacity: .7;
        }

        .max-innings-wrapper {
            margin-top: 6px;
            display: inline-flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px 14px;
            background: rgba(38, 42, 58, 0.8);
            border: 1px solid #363c59;
            border-radius: 14px;
            width: 340px;
        }

        .max-label {
            font-weight: 700;
            font-size: 18px;
            opacity: 0.9;
        }

        .max-innings-wrapper input {
            width: 100%;
            box-sizing: border-box;
        }

        @media (max-width: 1180px) {
            .header {
                font-size: 42px;
            }

            .players-row {
                flex-direction: column;
            }

            .button-row-bottom {
                flex-direction: column;
            }

            .control-mode-wrapper {
                flex-direction: column;
            }

            .max-innings-wrapper {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="header">Neues Match</div>

    <div class="container">

        <div class="players-row">

            <!-- ================= SPIELER 1 ================= -->
            <div class="section player-column">

                <h3>Spieler 1</h3>

                <!-- PLAYER -->
                <select id="player1" style="display:none;"></select>
                <div id="touchPlayer1" class="touch-player-select"></div>

                <!-- DISCIPLINE -->
                <select id="discipline1" style="display:none;">
                    <option value="Freie Partie">Freie Partie</option>
                    <option value="Cadre 35/2">Cadre 35/2</option>
                    <option value="Cadre 52/2">Cadre 52/2</option>
                    <option value="Cadre 47/2">Cadre 47/2</option>
                    <option value="Cadre 47/1">Cadre 47/1</option>
                    <option value="Cadre 71/2">Cadre 71/2</option>
                    <option value="Einband">Einband</option>
                    <option value="Dreiband">Dreiband</option>
                </select>

                <div style="margin-top:20px;">
                    <div class="field-title">Disziplin</div>
                    <div id="touchDiscipline1" class="touch-select"></div>
                </div>

                <!-- POINTS -->
                <div class="points-box" style="margin-top:25px;">

                    <div class="field-title">Zielpunkte</div>

                    <input type="number" id="target1" value="">

                    <div class="quick-defaults">
                        <button type="button" onclick="setTarget('target1',50)">50</button>
                        <button type="button" onclick="setTarget('target1',100)">100</button>
                        <button type="button" onclick="setTarget('target1',150)">150</button>
                        <button type="button" onclick="setTarget('target1',200)">200</button>
                        <button type="button" onclick="setTarget('target1',300)">300</button>
                    </div>

                    <div class="adjust">
                        <button type="button" onclick="adjustTarget('target1', -10)">-10</button>
                        <button type="button" onclick="adjustTarget('target1', -1)">-1</button>
                        <button type="button" onclick="adjustTarget('target1', 1)">+1</button>
                        <button type="button" onclick="adjustTarget('target1', 10)">+10</button>
                    </div>

                </div>

            </div>


            <!-- ================= SPIELER 2 ================= -->
            <div class="section player-column">

                <h3>Spieler 2</h3>

                <!-- PLAYER -->
                <select id="player2" style="display:none;"></select>
                <div id="touchPlayer2" class="touch-player-select"></div>

                <!-- DISCIPLINE -->
                <select id="discipline2" style="display:none;">
                    <option value="Freie Partie">Freie Partie</option>
                    <option value="Cadre 35/2">Cadre 35/2</option>
                    <option value="Cadre 52/2">Cadre 52/2</option>
                    <option value="Cadre 47/2">Cadre 47/2</option>
                    <option value="Cadre 47/1">Cadre 47/1</option>
                    <option value="Cadre 71/2">Cadre 71/2</option>
                    <option value="Einband">Einband</option>
                    <option value="Dreiband">Dreiband</option>
                </select>

                <div style="margin-top:20px;">
                    <div class="field-title">Disziplin</div>
                    <div id="touchDiscipline2" class="touch-select"></div>
                </div>

                <!-- POINTS -->
                <div class="points-box" style="margin-top:25px;">

                    <div class="field-title">Zielpunkte</div>

                    <input type="number" id="target2" value="">

                    <div class="quick-defaults">
                        <button type="button" onclick="setTarget('target2',50)">50</button>
                        <button type="button" onclick="setTarget('target2',100)">100</button>
                        <button type="button" onclick="setTarget('target2',150)">150</button>
                        <button type="button" onclick="setTarget('target2',200)">200</button>
                        <button type="button" onclick="setTarget('target2',300)">300</button>
                    </div>

                    <div class="adjust">
                        <button type="button" onclick="adjustTarget('target2', -10)">-10</button>
                        <button type="button" onclick="adjustTarget('target2', -1)">-1</button>
                        <button type="button" onclick="adjustTarget('target2', 1)">+1</button>
                        <button type="button" onclick="adjustTarget('target2', 10)">+10</button>
                    </div>

                </div>

            </div>

        </div>

        <div class="max-innings-wrapper">
            <div class="max-label">Maximale Aufnahmen</div>
            <input type="number" id="maxInnings" value="15">
        </div>

        <div class="control-mode-wrapper">

            <div class="mode-card active" data-mode="local" onclick="selectMode('local')">
                <div class="mode-title">Bedienung am Bildschirm</div>
                <div class="mode-sub">Buttons sichtbar</div>
            </div>

            <div class="mode-card" data-mode="remote" onclick="selectMode('remote')">
                <div class="mode-title">Nur Remote</div>
                <div class="mode-sub">Main = Viewer</div>
            </div>

        </div>

        <input type="hidden" id="controlMode" value="local">

        <div class="button-row-bottom">
            <button class="btn btn-start" onclick="startMatch()">
                Match starten
            </button>

            <button class="btn btn-secondary" onclick="window.location.href='index.html'">
                Zurück
            </button>

            <button class="btn btn-reset" onclick="resetAll()">
                Reset
            </button>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
        <script src="js/supabase.js"></script>


        <script>

            let selectedMode = "local";


            function selectMode(mode) {

                selectedMode = mode;

                document.querySelectorAll(".mode-card")
                    .forEach(card => card.classList.remove("active"));

                document.querySelector(`[data-mode='${mode}']`)
                    .classList.add("active");
            }



            async function loadPlayers() {

                const { data: players, error } = await supabaseClient
                    .from("players")
                    .select("*")
                    .order("name", { ascending: true });

                if (error) {
                    console.error(error);
                    return;
                }

                const p1 = document.getElementById('player1');
                const p2 = document.getElementById('player2');
                const t1 = document.getElementById('touchPlayer1');
                const t2 = document.getElementById('touchPlayer2');

                p1.innerHTML = "";
                p2.innerHTML = "";
                t1.innerHTML = "";
                t2.innerHTML = "";

                players.forEach(p => {
                    p1.add(new Option(p.name, p.name));
                    p2.add(new Option(p.name, p.name));

                    const b1 = document.createElement("div");
                    b1.className = "touch-player-btn";
                    b1.innerText = p.name;
                    b1.onclick = () => {
                        if (p2.value === p.name) return;
                        p1.value = p.name;
                        t1.querySelectorAll(".touch-player-btn").forEach(x => x.classList.remove("active"));
                        b1.classList.add("active");
                    };
                    t1.appendChild(b1);

                    const b2 = document.createElement("div");
                    b2.className = "touch-player-btn";
                    b2.innerText = p.name;
                    b2.onclick = () => {
                        if (p1.value === p.name) return;
                        p2.value = p.name;
                        t2.querySelectorAll(".touch-player-btn").forEach(x => x.classList.remove("active"));
                        b2.classList.add("active");
                    };
                    t2.appendChild(b2);
                });

                p1.value = "";
                p2.value = "";
                p1.selectedIndex = -1;
                p2.selectedIndex = -1;
            }

            /* DISCIPLINE TOUCH */
            function buildTouchDiscipline(selectId, containerId) {
                const select = document.getElementById(selectId);
                const container = document.getElementById(containerId);

                for (let i = 0; i < select.options.length; i++) {
                    const option = select.options[i];
                    const btn = document.createElement("div");
                    btn.className = "touch-select-btn";
                    btn.innerText = option.text;
                    btn.onclick = () => {
                        select.value = option.value;
                        container.querySelectorAll(".touch-select-btn").forEach(x => x.classList.remove("active"));
                        btn.classList.add("active");
                    };
                    container.appendChild(btn);
                }
            }

            function setTarget(id, value) {
                document.getElementById(id).value = value;
            }

            function adjustTarget(id, value) {
                const input = document.getElementById(id);
                let current = parseInt(input.value) || 0;
                current += value;
                if (current < 1) current = 1;
                input.value = current;
            }

            async function startMatch() {

                const p1 = document.getElementById('player1').value;
                const p2 = document.getElementById('player2').value;

                if (!p1 || !p2 || p1 === p2) {
                    alert("Bitte zwei unterschiedliche Spieler wählen");
                    return;
                }

                const { data, error } = await supabaseClient
                    .from("matches")
                    .insert([{
                        player1: p1,
                        player2: p2,
                        discipline1: document.getElementById('discipline1').value,
                        discipline2: document.getElementById('discipline2').value,
                        target1: parseInt(document.getElementById('target1').value),
                        target2: parseInt(document.getElementById('target2').value),
                        maxInnings: parseInt(document.getElementById('maxInnings').value),
                        score1: 0,
                        score2: 0,
                        inn1: 0,
                        inn2: 0,
                        totalInnings: 1,
                        activePlayer: 1,
                        started_at: new Date().toISOString(),
                        status: 1,
                        finished: false,
                        controlMode: selectedMode   // 🔥 hier wird es gespeichert
                    }])
                    .select();

                if (error) {
                    console.error(error);
                    alert("Fehler beim Starten des Matches");
                    return;
                }

                const matchId = data[0].id;

                window.location.href = "/scoreboard.html?match=" + matchId;
            }

            function resetAll() {

                // Spieler zurücksetzen
                document.getElementById('player1').value = "";
                document.getElementById('player2').value = "";

                document.querySelectorAll('#touchPlayer1 .touch-player-btn')
                    .forEach(b => b.classList.remove("active"));

                document.querySelectorAll('#touchPlayer2 .touch-player-btn')
                    .forEach(b => b.classList.remove("active"));

                // Disziplin zurücksetzen
                document.getElementById('discipline1').value = "";
                document.getElementById('discipline2').value = "";

                document.querySelectorAll('#touchDiscipline1 .touch-select-btn')
                    .forEach(b => b.classList.remove("active"));

                document.querySelectorAll('#touchDiscipline2 .touch-select-btn')
                    .forEach(b => b.classList.remove("active"));

                // Zielpunkte
                document.getElementById('target1').value = "";
                document.getElementById('target2').value = "";

                // Max Aufnahmen
                document.getElementById('maxInnings').value = 15;
            }
            window.addEventListener("DOMContentLoaded", () => {

                loadPlayers();

                buildTouchDiscipline("discipline1", "touchDiscipline1");
                buildTouchDiscipline("discipline2", "touchDiscipline2");

            });


        </script>

</body>

</html>
