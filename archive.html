<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Archiv</title>

<style>
body {
    font-family: Arial;
    background:#1e1b1b;
    color:white;
    text-align:center;
}

table {
    margin:40px auto;
    border-collapse:collapse;
    width:90%;
}

th, td {
    border:1px solid #444;
    padding:10px;
}

tr:hover {
    background:#2c2c2c;
    cursor:pointer;
}

button {
    font-size:18px;
    padding:8px 20px;
    margin-top:20px;
}
</style>
</head>
<body>

<h1>Archiv</h1>

<table id="archiveTable">
    <tr>
        <th>Datum</th>
        <th>Spieler</th>
        <th>Ergebnis</th>
        <th>AVG</th>
        <th>HR</th>
    </tr>
</table>

<button onclick="window.location.href='/'">Zurück</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<script>

async function loadArchive() {

    const { data, error } = await supabaseClient
        .from("archive")
        .select("*")
        .order("created_at", { ascending: false });

    if (error) {
        console.error(error);
        return;
    }

    const table = document.getElementById('archiveTable');

    // Tabelle zurücksetzen (Header behalten)
    table.innerHTML = `
        <tr>
            <th>Datum</th>
            <th>Spieler</th>
            <th>Ergebnis</th>
            <th>AVG</th>
            <th>HR</th>
        </tr>
    `;

    data.forEach(match => {

        const row = document.createElement('tr');

        const date = new Date(match.created_at).toLocaleString();

        row.innerHTML = `
            <td>${date}</td>
            <td>${match.player1} vs ${match.player2}</td>
            <td>${match.score1} : ${match.score2}</td>
            <td>${match.avg1} / ${match.avg2}</td>
            <td>${match.hs1} / ${match.hs2}</td>
        `;

        row.onclick = () => {
            window.location.href =
                "archive_detail.html?id=" + match.id;
        };

        table.appendChild(row);
    });
}

</body>
</html>
