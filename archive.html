<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Archiv</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #1e1f29, #14151c);
    color: white;
}

.page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 20px 40px;
}

h1 {
    margin: 0 0 24px;
    font-size: 42px;
    text-align: center;
}

.table-wrap {
    background: #222431;
    border: 1px solid #33384b;
    border-radius: 14px;
    overflow: hidden;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    text-align: left;
    background: #181922;
    color: #c7cede;
    font-size: 14px;
    letter-spacing: 0.3px;
    padding: 14px 16px;
}

td {
    padding: 14px 16px;
    border-top: 1px solid #34384a;
}

tr.data-row:hover {
    background: #2a2e40;
    cursor: pointer;
}

.status {
    display: inline-block;
    min-width: 90px;
    text-align: center;
    font-size: 13px;
    border-radius: 999px;
    padding: 4px 10px;
}

.status.running {
    background: #563315;
    color: #ffcc97;
}

.status.finished {
    background: #174a2f;
    color: #a3e5bf;
}

.empty {
    text-align: center;
    color: #a7afc3;
}

.actions {
    margin-top: 22px;
    text-align: center;
}

.nav-btn {
    font-size: 18px;
    padding: 10px 28px;
    border: none;
    border-radius: 8px;
    background: #444;
    color: white;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="page">
    <h1>Archiv</h1>

    <div class="table-wrap">
        <table id="archiveTable">
            <tr>
                <th>Datum</th>
                <th>Spieler</th>
                <th>Disziplin</th>
                <th>Ergebnis</th>
                <th>Aufnahmen</th>
                <th>Status</th>
            </tr>
        </table>
    </div>

    <div class="actions">
        <button class="nav-btn" onclick="window.location.href='/'">Zur&uuml;ck</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

<script>
async function loadArchive() {
    const { data, error } = await supabaseClient
        .from("matches")
        .select("*")
        .eq("finished", 1)
        .order("created_at", { ascending: false });

    if (error) {
        console.error("Archiv laden fehlgeschlagen:", error);
        return;
    }

    const table = document.getElementById("archiveTable");
    table.innerHTML = `
        <tr>
            <th>Datum</th>
            <th>Spieler</th>
            <th>Disziplin</th>
            <th>Ergebnis</th>
            <th>Aufnahmen</th>
            <th>Status</th>
        </tr>
    `;

    if (!data || data.length === 0) {
        const row = document.createElement("tr");
        row.innerHTML = `<td class="empty" colspan="6">Keine Partien gefunden</td>`;
        table.appendChild(row);
        return;
    }

    data.forEach((match) => {
        const row = document.createElement("tr");
        row.className = "data-row";

        const createdAt = match.created_at || match.started_at;
        const date = createdAt ? new Date(createdAt).toLocaleString() : "-";
        const statusClass = Number(match.finished) === 1 ? "finished" : "running";
        const statusText = Number(match.finished) === 1 ? "Beendet" : "Laufend";

        row.innerHTML = `
            <td>${date}</td>
            <td>${match.player1} vs ${match.player2}</td>
            <td>${match.discipline1 || "-"}</td>
            <td>${match.score1 ?? 0} : ${match.score2 ?? 0}</td>
            <td>${match.totalInnings ?? "-"}</td>
            <td><span class="status ${statusClass}">${statusText}</span></td>
        `;

        row.onclick = () => {
            window.location.href = "archive_detail.html?id=" + match.id;
        };

        table.appendChild(row);
    });
}

loadArchive();
</script>

</body>
</html>
