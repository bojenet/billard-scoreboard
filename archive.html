<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Archiv</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #1e1f29, #14151c);
    color: white;
}

.page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 20px 40px;
}

h1 {
    margin: 0 0 24px;
    font-size: 42px;
    text-align: center;
}

.table-wrap {
    background: #222431;
    border: 1px solid #33384b;
    border-radius: 14px;
    overflow: hidden;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th {
    text-align: left;
    background: #181922;
    color: #c7cede;
    font-size: 14px;
    letter-spacing: 0.3px;
    padding: 14px 16px;
}

td {
    padding: 14px 16px;
    border-top: 1px solid #34384a;
}

tr.data-row:hover {
    background: #2a2e40;
    cursor: pointer;
}

.actions-col {
    width: 110px;
}

.delete-btn {
    border: none;
    border-radius: 8px;
    padding: 7px 12px;
    font-size: 13px;
    font-weight: 700;
    background: #b43d3d;
    color: white;
    cursor: pointer;
}

.delete-btn:hover {
    background: #d34a4a;
}

.status {
    display: inline-block;
    min-width: 90px;
    text-align: center;
    font-size: 13px;
    border-radius: 999px;
    padding: 4px 10px;
}

.status.running {
    background: #563315;
    color: #ffcc97;
}

.status.finished {
    background: #174a2f;
    color: #a3e5bf;
}

.empty {
    text-align: center;
    color: #a7afc3;
}

.actions {
    margin-top: 22px;
    text-align: center;
}

.nav-btn {
    font-size: 18px;
    padding: 10px 28px;
    border: none;
    border-radius: 8px;
    background: #444;
    color: white;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="page">
    <h1>Archiv</h1>

    <div class="table-wrap">
        <table id="archiveTable">
            <tr>
                <th>Datum</th>
                <th>Spieler</th>
                <th>Disziplinen</th>
                <th>Ergebnis</th>
                <th>Aufnahmen</th>
                <th class="actions-col">Aktion</th>
            </tr>
        </table>
    </div>

    <div class="actions">
        <button class="nav-btn" onclick="window.location.href='/'">Zur&uuml;ck</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
    <script src="js/user_menu.js"></script>

<script>
async function loadArchive() {
    const user = await requireAuth();
    if (!user) return;
    const isAdmin = await hasAdminAccess(user);
    const ownedNames = await getOwnedPlayerNames(user.id);

    const { data, error } = await supabaseClient
        .from("matches")
        .select("*")
        .eq("finished", 1)
        .eq("status", 0)
        .order("created_at", { ascending: false });

    if (error) {
        console.error("Archiv laden fehlgeschlagen:", error);
        return;
    }

    const table = document.getElementById("archiveTable");
    table.innerHTML = `
        <tr>
            <th>Datum</th>
            <th>Spieler</th>
            <th>Disziplinen</th>
            <th>Ergebnis</th>
            <th>Aufnahmen</th>
            <th class="actions-col">Aktion</th>
        </tr>
    `;

    const filtered = isAdmin
        ? (data || [])
        : (data || []).filter((match) =>
            isOwnedMatch(match, user.id, ownedNames)
        );

    if (!filtered || filtered.length === 0) {
        const row = document.createElement("tr");
        row.innerHTML = `<td class="empty" colspan="6">Keine Partien gefunden</td>`;
        table.appendChild(row);
        return;
    }

    filtered.forEach((match) => {
        const row = document.createElement("tr");
        row.className = "data-row";

        const createdAt = match.created_at || match.started_at;
        const date = createdAt ? new Date(createdAt).toLocaleString() : "-";
        const discipline1 = match.discipline1 || "-";
        const discipline2 = match.discipline2 || "-";
        const disciplineText = discipline1 === discipline2
            ? discipline1
            : `${discipline1} / ${discipline2}`;

        row.innerHTML = `
            <td>${date}</td>
            <td>${match.player1} vs ${match.player2}</td>
            <td>${disciplineText}</td>
            <td>${match.score1 ?? 0} : ${match.score2 ?? 0}</td>
            <td>${match.totalInnings ?? "-"}</td>
            <td>${isAdmin ? `<button class="delete-btn" onclick="deleteArchivedMatch(event, '${match.id}')">Löschen</button>` : ""}</td>
        `;

        row.onclick = () => {
            window.location.href = "archive_detail.html?id=" + match.id;
        };

        table.appendChild(row);
    });
}

async function deleteArchivedMatch(event, matchId) {
    const user = await requireAdmin();
    if (!user) return;

    event.stopPropagation();

    if (!confirm("Partie wirklich löschen?")) {
        return;
    }

    const { error: matchDeleteError } = await supabaseClient
        .from("matches")
        .delete()
        .eq("id", matchId);

    if (matchDeleteError) {
        console.error("Partie löschen fehlgeschlagen:", matchDeleteError);
        alert("Löschen fehlgeschlagen. Bitte erneut versuchen.");
        return;
    }

    // Optional: verknüpfte Archivzeile aufräumen, falls vorhanden.
    const { error: archiveDeleteError } = await supabaseClient
        .from("archive")
        .delete()
        .eq("matchId", matchId);

    if (archiveDeleteError) {
        console.warn("Archiv-Aufräumen fehlgeschlagen:", archiveDeleteError);
    }

    await loadArchive();
}

loadArchive();
</script>

</body>
</html>
