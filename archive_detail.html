<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Partiezettel</title>

    <style>
        html {
            min-height: 100%;
            background: linear-gradient(180deg, #1e1f29, #14151c);
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #1e1f29, #14151c);
            color: #e9edf7;
        }

        .page {
            max-width: 760px;
            margin: 0 auto;
            padding: 26px 16px 34px;
        }

        .actions {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }

        .btn {
            font-size: 18px;
            padding: 12px 22px;
            border: none;
            border-radius: 8px;
            color: white;
            background: #4b536f;
            cursor: pointer;
        }

        .btn.primary {
            background: #355fd4;
        }

        .btn:disabled {
            opacity: 0.55;
            cursor: wait;
        }

        .notice {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid #3a4058;
            background: #202333;
            color: #d8e0f2;
            font-size: 15px;
            display: none;
        }

        .notice.success {
            border-color: #2f8f5b;
            color: #d7f8e5;
        }

        .notice.error {
            border-color: #9b4747;
            color: #ffd9d9;
        }

        .sheet {
            background: #202333;
            border: 1px solid #3a4058;
            border-radius: 12px;
            overflow: hidden;
        }

        .sheet-title {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            gap: 20px;
            align-items: center;
            padding: 18px 20px 14px;
        }

        .sheet-title .title-cell {
            font-size: 44px;
            font-weight: 800;
            line-height: 1;
        }

        .sheet-date {
            display: grid;
            grid-template-columns: auto auto;
            gap: 12px 18px;
            align-items: center;
            font-size: 20px;
        }

        .sheet-date-label {
            color: #aeb8cf;
        }

        .meta {
            width: 100%;
            border-collapse: collapse;
        }

        .meta td {
            border: 1px solid #3a4058;
            padding: 8px 10px;
            font-size: 16px;
            background: #202333;
        }

        .meta .label {
            width: 112px;
            color: #aeb8cf;
        }

        .meta .player-value {
            font-weight: 800;
        }

        .score-grid {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .score-grid th,
        .score-grid td {
            border: 1px solid #3a4058;
            text-align: center;
            padding: 7px 6px;
            font-size: 16px;
        }

        .score-grid th {
            background: #191c2a;
            color: #c7d0e5;
        }

        .score-grid td.name-cell {
            text-align: left;
            padding-left: 14px;
            font-weight: 700;
        }

        .inn-col {
            width: 54px;
            color: #aeb8cf;
        }

        .mark-row td {
            border-top-color: #8a3d3d;
        }

        .summary {
            width: 100%;
            border-collapse: collapse;
        }

        .summary th,
        .summary td {
            border: 1px solid #3a4058;
            text-align: left;
            vertical-align: top;
            padding: 14px 16px;
            font-size: 17px;
        }

        .summary th {
            background: #191c2a;
            color: #c7d0e5;
            font-size: 15px;
            letter-spacing: 0.2px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            border-top: 1px solid #333a51;
            padding: 10px 0;
        }

        .stat-item:first-child {
            border-top: none;
            padding-top: 0;
        }

        .stat-label {
            color: #aeb8cf;
            font-size: 15px;
        }

        .stat-value {
            font-weight: 700;
        }

        @media (max-width: 820px) {
            .page {
                max-width: 100%;
                padding: 20px 10px 28px;
            }

            .btn {
                font-size: 16px;
                padding: 10px 18px;
            }

            .sheet-header h1 {
                font-size: 24px;
            }

            .meta td,
            .score-grid th,
            .score-grid td {
                font-size: 13px;
                padding: 6px 6px;
            }

            .summary td {
                font-size: 14px;
                padding: 10px 12px;
            }
        }

        @media print {
            body {
                background: white;
                color: black;
            }

            .page {
                max-width: none;
                padding: 0;
            }

            .actions {
                display: none;
            }

            .sheet {
                border: 1px solid #666;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="actions">
            <button class="btn" onclick="window.location.href='archive.html'">Zur&uuml;ck</button>
            <div style="display:flex;gap:12px;flex-wrap:wrap">
                <button id="sendEmailBtn" class="btn primary" type="button" onclick="sendResultPdfByEmail()" style="display:none">Ergebnis per E-Mail senden</button>
                <button class="btn primary" onclick="window.print()">Drucken</button>
            </div>
        </div>

        <div id="noticeBox" class="notice"></div>

        <div class="sheet">
            <div class="sheet-title">
                <div class="title-cell">Partiezettel</div>
                <div class="sheet-date">
                    <div class="sheet-date-label">Datum</div>
                    <div id="date">-</div>
                </div>
            </div>

            <table class="meta">
                <tr>
                    <td class="label">Spieler 1</td>
                    <td id="player1" class="player-value">-</td>
                    <td class="label">Spieler 2</td>
                    <td id="player2" class="player-value">-</td>
                </tr>
                <tr>
                    <td class="label">Disziplin 1</td>
                    <td id="discipline1">-</td>
                    <td class="label">Disziplin 2</td>
                    <td id="discipline2">-</td>
                </tr>
                <tr>
                    <td class="label">Ergebnis</td>
                    <td id="result">-</td>
                    <td class="label">Aufnahmen</td>
                    <td id="totalInnings">-</td>
                </tr>
            </table>

            <table class="score-grid" id="scoreGrid">
                <tr>
                    <th>Serie</th>
                    <th>Gesamt</th>
                    <th class="inn-col">Aufn.</th>
                    <th>Serie</th>
                    <th>Gesamt</th>
                </tr>
            </table>

            <table class="summary">
                <tr>
                    <td>
                        <div class="stat-item">
                            <span class="stat-label">Anzahl der B&auml;lle</span>
                            <span class="stat-value" id="balls1">-</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Anzahl der Aufnahmen</span>
                            <span class="stat-value" id="innings1">-</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Durchschnitt</span>
                            <span class="stat-value" id="avg1">-</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">H&ouml;chstserie</span>
                            <span class="stat-value" id="high1">-</span>
                        </div>
                    </td>
                    <td>
                        <div class="stat-item">
                            <span class="stat-label">Anzahl der B&auml;lle</span>
                            <span class="stat-value" id="balls2">-</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Anzahl der Aufnahmen</span>
                            <span class="stat-value" id="innings2">-</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">Durchschnitt</span>
                            <span class="stat-value" id="avg2">-</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-label">H&ouml;chstserie</span>
                            <span class="stat-value" id="high2">-</span>
                        </div>
                    </td>
                </tr>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/user_menu.js"></script>

    <script>
        const id = new URLSearchParams(window.location.search).get("id");
        let currentUser = null;
        let currentMatch = null;
        let emailSendInProgress = false;

        function setNotice(message, type = "") {
            const box = document.getElementById("noticeBox");
            if (!box) return;
            box.style.display = message ? "block" : "none";
            box.className = "notice" + (type ? " " + type : "");
            box.innerText = message || "";
        }

        function setSendButtonState(isBusy) {
            const btn = document.getElementById("sendEmailBtn");
            if (!btn) return;
            btn.disabled = Boolean(isBusy);
            btn.innerText = isBusy ? "E-Mail wird gesendet..." : "Ergebnis per E-Mail senden";
        }

        function toSeries(value) {
            if (Array.isArray(value)) return value;
            if (typeof value === "number") return value > 0 ? [value] : [];
            if (typeof value === "string") {
                const trimmed = value.trim();
                if (!trimmed) return [];

                // Postgres array literal, e.g. "{1,2,3}"
                if (trimmed.startsWith("{") && trimmed.endsWith("}")) {
                    return trimmed
                        .slice(1, -1)
                        .split(",")
                        .map((v) => Number(v.trim()))
                        .filter((v) => Number.isFinite(v));
                }

                // CSV fallback, e.g. "1,2,3"
                if (trimmed.includes(",") && !trimmed.startsWith("[")) {
                    return trimmed
                        .split(",")
                        .map((v) => Number(v.trim()))
                        .filter((v) => Number.isFinite(v));
                }

                try {
                    const parsed = JSON.parse(trimmed);
                    return Array.isArray(parsed) ? parsed : [];
                } catch (e) {
                    return [];
                }
            }
            return [];
        }

        function normalizeEmail(value) {
            return String(value || "").trim().toLowerCase();
        }

        function formatDuration(totalSeconds) {
            const safe = Number.isFinite(totalSeconds) ? Math.max(0, Math.round(totalSeconds)) : 0;
            const h = Math.floor(safe / 3600);
            const m = Math.floor((safe % 3600) / 60);
            const s = safe % 60;
            return [h, m, s].map((part) => String(part).padStart(2, "0")).join(":");
        }

        async function loadMatchResultRecipients(playerNames) {
            const cleanNames = Array.from(new Set((playerNames || []).map((name) => String(name || "").trim()).filter(Boolean)));
            if (!cleanNames.length || !currentUser?.id) return [];

            const result = await supabaseClient
                .from("players")
                .select("id,name,email,send_match_result_email,user_id")
                .eq("user_id", currentUser.id)
                .in("name", cleanNames);

            const data = result.data || [];
            const error = result.error;
            const message = String(error?.message || "").toLowerCase();

            if (error && (message.includes("user_id") || message.includes("email") || message.includes("send_match_result_email"))) {
                setNotice("Die Felder f\u00fcr den E-Mail-Versand sind in Supabase noch nicht aktiv. Bitte zuerst sql/player_result_email.sql ausf\u00fchren.", "error");
                return [];
            }

            if (error) {
                console.warn("Spieler-Maildaten konnten nicht geladen werden:", error);
                setNotice("Die Empf\u00e4nger konnten nicht geladen werden.", "error");
                return [];
            }

            return data
                .filter((row) => Boolean(row.send_match_result_email) && normalizeEmail(row.email))
                .map((row) => ({
                    name: String(row.name || "").trim(),
                    email: normalizeEmail(row.email)
                }))
                .filter((row, index, list) => list.findIndex((item) => item.email === row.email) === index);
        }

        function getSeriesSource(match) {
            const archiveSeries1 = toSeries(match?.series1);
            const archiveSeries2 = toSeries(match?.series2);
            if (archiveSeries1.length || archiveSeries2.length) {
                return { series1: archiveSeries1, series2: archiveSeries2 };
            }

            try {
                const raw = localStorage.getItem("series_" + id);
                const parsed = raw ? JSON.parse(raw) : null;
                return {
                    series1: toSeries(parsed?.series1),
                    series2: toSeries(parsed?.series2)
                };
            } catch (error) {
                console.warn("Lokale Serien konnten nicht gelesen werden:", error);
            }

            return { series1: [], series2: [] };
        }

        async function sendResultPdfByEmail() {
            if (emailSendInProgress || !currentMatch) return;

            emailSendInProgress = true;
            setSendButtonState(true);
            setNotice("");

            try {
                const recipients = await loadMatchResultRecipients([currentMatch.player1, currentMatch.player2]);
                if (!recipients.length) {
                    setNotice("Es sind keine Empf\u00e4nger aktiviert. In der Spielerverwaltung muss f\u00fcr mindestens einen Spieler eine E-Mail mit Versandfreigabe hinterlegt sein.", "error");
                    return;
                }

                const series = getSeriesSource(currentMatch);
                const innings1 = Number(currentMatch.inn1 || 0);
                const innings2 = Number(currentMatch.inn2 || 0);
                const playedInnings = Math.max(innings1, innings2, series.series1.length, series.series2.length);
                const avg1 = innings1 > 0 ? (Number(currentMatch.score1 || 0) / innings1).toFixed(3) : "0.000";
                const avg2 = innings2 > 0 ? (Number(currentMatch.score2 || 0) / innings2).toFixed(3) : "0.000";
                const durationSeconds = Number(currentMatch.duration_seconds || currentMatch.duration || 0);

                const body = {
                    matchId: currentMatch.id,
                    recipients,
                    match: {
                        matchId: currentMatch.id,
                        player1: currentMatch.player1 || "-",
                        player2: currentMatch.player2 || "-",
                        score1: Number(currentMatch.score1 || 0),
                        score2: Number(currentMatch.score2 || 0),
                        innings: playedInnings,
                        avg1,
                        avg2,
                        hs1: Number(currentMatch.high1 || 0),
                        hs2: Number(currentMatch.high2 || 0),
                        series1: series.series1,
                        series2: series.series2,
                        duration: durationSeconds,
                        discipline1: currentMatch.discipline1 || "",
                        discipline2: currentMatch.discipline2 || "",
                        target1: Number(currentMatch.target1 || 0),
                        target2: Number(currentMatch.target2 || 0),
                        maxInnings: Number(currentMatch.max_innings || 0),
                        startedAt: currentMatch.started_at || currentMatch.created_at || "",
                        finishedAt: currentMatch.finished_at || currentMatch.updated_at || currentMatch.created_at || ""
                    }
                };

                const result = await supabaseClient.functions.invoke("send-match-result", { body });
                if (result.error) throw result.error;

                const recipientLabels = recipients.map((item) => item.email).join(", ");
                const durationText = durationSeconds > 0 ? " Dauer " + formatDuration(durationSeconds) + "." : "";
                setNotice("PDF erfolgreich versendet an: " + recipientLabels + "." + durationText, "success");
            } catch (error) {
                console.error("Ergebnis-Mail konnte nicht gesendet werden:", error);
                setNotice("Der Versand ist fehlgeschlagen: " + String(error?.message || error), "error");
            } finally {
                emailSendInProgress = false;
                setSendButtonState(false);
            }
        }

        function buildRows(match) {
            const seriesLeft = toSeries(match.series1);
            const seriesRight = toSeries(match.series2);
            const inn1 = Number(match.inn1 || 0);
            const inn2 = Number(match.inn2 || 0);
            const inningsByDB = Math.max(inn1, inn2);
            const inningsBySeries = Math.max(seriesLeft.length, seriesRight.length);
            const playedInnings = inningsByDB > 0 ? inningsByDB : inningsBySeries;

            const grid = document.getElementById("scoreGrid");
            let sumLeft = 0;
            let sumRight = 0;
            const rowCount = playedInnings;

            for (let i = 1; i <= rowCount; i++) {
                const leftRaw = seriesLeft[i - 1];
                const rightRaw = seriesRight[i - 1];
                const hasLeft = leftRaw !== undefined && leftRaw !== null && leftRaw !== "";
                const hasRight = rightRaw !== undefined && rightRaw !== null && rightRaw !== "";
                const left = hasLeft ? Number(leftRaw) : 0;
                const right = hasRight ? Number(rightRaw) : 0;

                if (hasLeft && Number.isFinite(left)) sumLeft += left;
                if (hasRight && Number.isFinite(right)) sumRight += right;

                const tr = document.createElement("tr");
                if (i === 6 || i === 12 || i === 18 || i === 24) {
                    tr.className = "mark-row";
                }

                const leftSeriesText = hasLeft ? (left === 0 ? "-" : left) : "-";
                const rightSeriesText = hasRight ? (right === 0 ? "-" : right) : "-";
                const leftTotalText = sumLeft === 0 ? "-" : sumLeft;
                const rightTotalText = sumRight === 0 ? "-" : sumRight;

                tr.innerHTML = `
                    <td>${leftSeriesText}</td>
                    <td>${leftTotalText}</td>
                    <td class="inn-col">${i}</td>
                    <td>${rightSeriesText}</td>
                    <td>${rightTotalText}</td>
                `;

                grid.appendChild(tr);
            }
        }

        async function loadDetail() {
            const user = await requireAuth();
            if (!user) return;
            currentUser = user;
            const isAdmin = await hasAdminAccess(user);
            const ownedNames = await getOwnedPlayerNames(user.id);

            const { data: match, error } = await supabaseClient
                .from("matches")
                .select("*")
                .eq("id", id)
                .eq("finished", 1)
                .single();

            if (error || !match) {
                document.body.innerHTML = "<div style='padding:40px;font-family:Arial'>Partie nicht gefunden.</div>";
                console.error("Partie laden fehlgeschlagen:", error);
                return;
            }

            if (!isAdmin && !isOwnedMatch(match, user.id, ownedNames)) {
                document.body.innerHTML = "<div style='padding:40px;font-family:Arial'>Kein Zugriff auf diese Partie.</div>";
                return;
            }
            currentMatch = match;
            document.getElementById("sendEmailBtn").style.display = "inline-block";

            const { data: archiveRows, error: archiveError } = await supabaseClient
                .from("archive")
                .select("*")
                .eq("matchId", id)
                .order("created_at", { ascending: false })
                .limit(10);

            if (archiveError) {
                console.error("Archivdaten laden fehlgeschlagen:", archiveError);
            }

            const createdAt = match.created_at || match.started_at;
            const innings1 = Number(match.inn1 || 0);
            const innings2 = Number(match.inn2 || 0);
            const playedInnings = Math.max(innings1, innings2);
            const avg1 = innings1 > 0 ? (Number(match.score1 || 0) / innings1).toFixed(3) : "0.000";
            const avg2 = innings2 > 0 ? (Number(match.score2 || 0) / innings2).toFixed(3) : "0.000";

            document.getElementById("discipline1").innerText = match.discipline1 || "-";
            document.getElementById("discipline2").innerText = match.discipline2 || "-";
            document.getElementById("date").innerText = createdAt ? new Date(createdAt).toLocaleString() : "-";
            document.getElementById("player1").innerText = match.player1 || "-";
            document.getElementById("player2").innerText = match.player2 || "-";
            document.getElementById("result").innerText = `${match.score1 ?? 0} : ${match.score2 ?? 0}`;
            document.getElementById("totalInnings").innerText = playedInnings;

            document.getElementById("balls1").innerText = match.score1 ?? 0;
            document.getElementById("balls2").innerText = match.score2 ?? 0;
            document.getElementById("innings1").innerText = innings1;
            document.getElementById("innings2").innerText = innings2;
            document.getElementById("avg1").innerText = avg1;
            document.getElementById("avg2").innerText = avg2;
            document.getElementById("high1").innerText = match.high1 ?? 0;
            document.getElementById("high2").innerText = match.high2 ?? 0;

            let archiveMatch = null;
            if (Array.isArray(archiveRows) && archiveRows.length > 0) {
                archiveMatch = archiveRows.find((row) => {
                    const s1 = toSeries(row.series1);
                    const s2 = toSeries(row.series2);
                    return s1.length > 0 || s2.length > 0;
                }) || null;
            }

            let localSeries = null;
            try {
                const raw = localStorage.getItem("series_" + id);
                localSeries = raw ? JSON.parse(raw) : null;
            } catch (e) {
                localSeries = null;
            }

            const matchForSeries = archiveMatch
                ? { ...match, series1: archiveMatch.series1, series2: archiveMatch.series2 }
                : localSeries
                    ? { ...match, series1: localSeries.series1, series2: localSeries.series2 }
                    : match;

            buildRows(matchForSeries);
        }

        loadDetail();
    </script>
</body>
</html>
