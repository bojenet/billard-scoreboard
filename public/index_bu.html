<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Neue Partie</title>

<style>
body {
    font-family: Arial;
    background: #1e1b1b;
    color: white;
    text-align: center;
}

h3 {
    margin-top: 30px;
}

select, input {
    font-size: 20px;
    margin: 10px;
    padding: 8px;
}

button {
    font-size: 25px;
    padding: 10px 40px;
    margin-top: 20px;
    background: #4c4a85;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>
<body>

<h1>Neue Partie</h1>

<!-- ================= SPIELER AUSWAHL ================= -->

<select id="player1"></select>
<select id="player2"></select>


<!-- ================= SPIELER 1 EINSTELLUNGEN ================= -->

<h3>Spieler 1</h3>

<select id="discipline1">
    <option value="Freie Partie">Freie Partie</option>
    <option value="Cadre 35/2">Cadre 35/2</option>
</select>

<input type="number" id="target1" value="200" placeholder="Distanz Spieler 1">

<!-- ================= SPIELER 2 EINSTELLUNGEN ================= -->

<h3>Spieler 2</h3>

<select id="discipline2">
    <option value="Freie Partie">Freie Partie</option>
    <option value="Cadre 35/2">Cadre 35/2</option>
</select>

<input type="number" id="target2" value="100" placeholder="Distanz Spieler 2">

<br><br>

<input type="number" id="maxInnings" value="20" placeholder="Max Aufnahmen">

<br>

<button onclick="startMatch()">Start</button>
<br><br>
<button onclick="window.location.href='archive.html'">
Archiv ansehen
</button>

<br><br>
<button onclick="window.location.href='players.html'">
Spieler verwalten
</button>

<script>

console.log("SCRIPT GELADEN");

/* ================= SPIELER LADEN ================= */

async function loadPlayers() {

    const res = await fetch('/api/players');
    const players = await res.json();

    const p1 = document.getElementById('player1');
    const p2 = document.getElementById('player2');

    p1.innerHTML = "";
    p2.innerHTML = "";

    players.forEach(p => {
        p1.add(new Option(p.name, p.name));
        p2.add(new Option(p.name, p.name));
    });
}

/* ================= SPIELER HINZUFÜGEN ================= */

async function addPlayer() {

    const name = document.getElementById('newPlayer').value.trim();
    if (!name) return;

    await fetch('/api/players', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({name})
    });

    document.getElementById('newPlayer').value = "";
    loadPlayers();
}

/* ================= MATCH STARTEN ================= */

async function startMatch() {

    console.log("START MATCH ausgelöst");

    const p1 = document.getElementById('player1').value;
    const p2 = document.getElementById('player2').value;

    const discipline1 = document.getElementById('discipline1').value;
    const discipline2 = document.getElementById('discipline2').value;

    const target1 = parseInt(document.getElementById('target1').value);
    const target2 = parseInt(document.getElementById('target2').value);
    const maxInnings = parseInt(document.getElementById('maxInnings').value);

    if (!p1 || !p2 || p1 === p2) {
        alert("Bitte zwei unterschiedliche Spieler wählen");
        return;
    }

    try {

        const res = await fetch('/api/match', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({
                player1: p1,
                player2: p2,
                discipline1,
                discipline2,
                target1,
                target2,
                maxInnings
            })
        });

        if (!res.ok) {
            const errorText = await res.text();
            console.error("Server Fehler:", errorText);
            alert("Server Fehler – siehe Console");
            return;
        }

        const data = await res.json();
        console.log("Server Antwort:", data);

        if (!data.matchId) {
            alert("Keine matchId vom Server!");
            return;
        }

        window.location.href = "/scoreboard.html?match=" + data.matchId;

    } catch (err) {
        console.error("Fetch Fehler:", err);
    }
}

loadPlayers();

</script>
</body>
</html>
