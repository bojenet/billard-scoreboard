<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>OCR Worker</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(180deg, #0f1c3f, #0a122b);
            color: white;
        }
        .page {
            width: min(1450px, 95%);
            margin: 20px auto 28px;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 14px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        h1 {
            margin: 0;
            font-size: 42px;
        }
        .sub {
            margin-top: 8px;
            font-size: 16px;
            opacity: 0.78;
        }
        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            border: none;
            border-radius: 12px;
            padding: 12px 16px;
            background: #1c3380;
            border: 1px solid #3659bb;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }
        .btn.primary { background: #2f4fe0; }
        .btn.good { background: #198754; border-color: #30a96e; }
        .btn.bad { background: #a53b3b; border-color: #c86262; }
        .btn.warn { background: #6d5613; border-color: #a98b35; }
        .btn:disabled { opacity: 0.45; cursor: default; }
        .layout {
            display: grid;
            grid-template-columns: 380px minmax(0, 1fr);
            gap: 18px;
        }
        .card {
            background: linear-gradient(180deg, #162b66, #0f1c3f);
            border: 1px solid #2d488f;
            border-radius: 20px;
            box-shadow: 0 24px 56px rgba(0, 0, 0, 0.45);
            overflow: hidden;
        }
        .queue-head, .detail-head {
            padding: 14px 16px;
            border-bottom: 1px solid #27417f;
            font-size: 18px;
            font-weight: 800;
        }
        .queue-list {
            max-height: calc(100vh - 180px);
            overflow: auto;
            padding: 10px;
            display: grid;
            gap: 10px;
        }
        .queue-item {
            border: 1px solid #3659bb;
            border-radius: 14px;
            padding: 12px;
            background: rgba(17, 38, 89, 0.9);
            cursor: pointer;
        }
        .queue-item.active { border-color: #ffe27a; }
        .queue-item-title { font-size: 16px; font-weight: 800; }
        .queue-item-sub { font-size: 13px; opacity: 0.8; margin-top: 6px; }
        .detail-body { padding: 16px; display: grid; gap: 12px; }
        .meta-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
        }
        .meta {
            border: 1px solid #2f4ea0;
            border-radius: 12px;
            padding: 10px 12px;
            background: rgba(8, 20, 54, 0.44);
        }
        .meta-label { font-size: 12px; opacity: 0.72; margin-bottom: 6px; }
        .meta-value { font-size: 18px; font-weight: 800; }
        .viewer-grid {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 320px;
            gap: 12px;
            align-items: start;
        }
        .viewer {
            height: 48vh;
            min-height: 420px;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid #2f4ea0;
            background: #08122f;
        }
        .viewer iframe { width: 100%; height: 100%; border: none; background: white; }
        .ocr-preview {
            border: 1px solid #2f4ea0;
            border-radius: 14px;
            padding: 10px;
            background: rgba(8, 20, 54, 0.44);
            display: grid;
            gap: 10px;
        }
        .ocr-status {
            font-size: 13px;
            opacity: 0.84;
            line-height: 1.5;
            min-height: 40px;
        }
        .ocr-canvas-wrap {
            border-radius: 10px;
            overflow: auto;
            background: #0b1537;
            border: 1px solid #3659bb;
            max-height: 340px;
        }
        #ocrCanvas {
            display: block;
            width: 100%;
            height: auto;
            background: white;
        }
        .field label { display:block; font-size:13px; opacity:0.82; margin-bottom:6px; }
        .field textarea {
            width: 100%;
            box-sizing: border-box;
            min-height: 180px;
            resize: vertical;
            border-radius: 12px;
            border: 1px solid #3959ab;
            padding: 11px 12px;
            color: white;
            background: #112659;
            font-size: 15px;
            line-height: 1.5;
        }
        .toolbar { display:flex; gap:10px; flex-wrap:wrap; }
        .notice {
            padding: 12px 14px;
            border-radius: 14px;
            border: 1px solid #556db2;
            background: rgba(20, 38, 89, 0.78);
            font-size: 14px;
            line-height: 1.5;
        }
        @media (max-width: 1100px) {
            .layout { grid-template-columns: 1fr; }
            .queue-list { max-height: none; }
            .meta-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
            .viewer-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <div>
                <h1>OCR Worker</h1>
                <div class="sub">Admin-Queue für OCR-/Übersetzungsanfragen aus dem Positionstraining</div>
            </div>
            <div class="actions">
                <button class="btn" onclick="window.location.href='training_positions.html'">Zurück zur Übersicht</button>
                <button class="btn primary" onclick="loadQueue()">Neu laden</button>
            </div>
        </div>

        <div class="layout">
            <div class="card">
                <div class="queue-head">Anfragen</div>
                <div class="queue-list" id="queueList"></div>
            </div>

            <div class="card">
                <div class="detail-head">Bearbeitung</div>
                <div class="detail-body">
                    <div class="notice" id="noticeBox">Queue wird geladen.</div>

                    <div class="meta-grid">
                        <div class="meta"><div class="meta-label">POSITION</div><div class="meta-value" id="metaPosition">-</div></div>
                        <div class="meta"><div class="meta-label">SAMMLUNG</div><div class="meta-value" id="metaSet">-</div></div>
                        <div class="meta"><div class="meta-label">STATUS</div><div class="meta-value" id="metaStatus">-</div></div>
                        <div class="meta"><div class="meta-label">ANGEFRAGT AM</div><div class="meta-value" id="metaCreated">-</div></div>
                    </div>

                    <div class="viewer-grid">
                        <div class="viewer"><iframe id="pdfFrame"></iframe></div>
                        <div class="ocr-preview">
                            <div class="toolbar">
                                <button class="btn warn" id="autoOcrBtn" onclick="runAutoOcr()">AI OCR + Übersetzung</button>
                            </div>
                            <div class="ocr-status" id="ocrStatusBox">Noch kein OCR-Lauf gestartet.</div>
                            <div class="ocr-canvas-wrap">
                                <canvas id="ocrCanvas"></canvas>
                            </div>
                        </div>
                    </div>

                    <div class="field">
                        <label for="sourceText">OCR / Quelltext</label>
                        <textarea id="sourceText" placeholder="Hier OCR-Rohtext oder französischen Ursprungstext eintragen."></textarea>
                    </div>

                    <div class="field">
                        <label for="translatedText">Deutsche Übersetzung / Ergebnis</label>
                        <textarea id="translatedText" placeholder="Hier die bereinigte deutsche Fassung eintragen."></textarea>
                    </div>

                    <div class="toolbar">
                        <button class="btn warn" id="claimBtn" onclick="markRunning()">Als laufend markieren</button>
                        <button class="btn good" id="doneBtn" onclick="markDone()">Als fertig speichern</button>
                        <button class="btn bad" id="failBtn" onclick="markFailed()">Als fehlgeschlagen markieren</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@4.3.136/build/pdf.min.mjs" type="module"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/user_menu.js"></script>
    <script type="module">
        import * as pdfjsLib from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.3.136/build/pdf.min.mjs';
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.3.136/build/pdf.worker.min.mjs';
        window.__pdfjsLib = pdfjsLib;
    </script>
    <script>
        const PDFS = {
            "roger-conti": "https://kstqhcaazuuxchqtnyfc.supabase.co/storage/v1/object/sign/pdf/Conti_1_62.pdf?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV83MDBhNTU0Ny1jODNmLTQ5NzUtOWViMi01ODA4ZGQyOWZjZWUiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJwZGYvQ29udGlfMV82Mi5wZGYiLCJpYXQiOjE3NzIzNDg3NTUsImV4cCI6MTgwMzg4NDc1NX0.cmqqXoE50h-86B5iIqEF4LSuB4B0E7Uqc6hNzRXBukg",
            "roger-conti-63-151": "https://kstqhcaazuuxchqtnyfc.supabase.co/storage/v1/object/sign/pdf/Conti_63_151.pdf?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV83MDBhNTU0Ny1jODNmLTQ5NzUtOWViMi01ODA4ZGQyOWZjZWUiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJwZGYvQ29udGlfNjNfMTUxLnBkZiIsImlhdCI6MTc3MjQzOTI1MiwiZXhwIjoxODAzOTc1MjUyfQ.MHNv3hvXKuM5q5Ic087HFVA3jKS79JoXuo6clhQxARE"
        };

        let currentUser = null;
        let queue = [];
        let currentItem = null;
        let ocrRunning = false;

        function setNotice(text) {
            document.getElementById('noticeBox').innerText = text;
        }

        function setOcrStatus(text) {
            document.getElementById('ocrStatusBox').innerText = text;
        }

        function splitComments(text) {
            return String(text || '')
                .split(/\n\s*\n/)
                .map((part) => part.trim())
                .filter(Boolean);
        }

        function getPdfUrl(item) {
            const base = PDFS[item.set_key] || '';
            return base ? (base + '#page=' + item.pdf_page + '&zoom=page-width') : '';
        }

        async function renderPdfPageToCanvas(item) {
            const pdfjsLib = window.__pdfjsLib;
            if (!pdfjsLib) {
                throw new Error('pdf.js noch nicht geladen');
            }
            const baseUrl = PDFS[item.set_key];
            if (!baseUrl) {
                throw new Error('Keine PDF-URL für diese Sammlung hinterlegt');
            }
            const loadingTask = pdfjsLib.getDocument({ url: baseUrl });
            const pdf = await loadingTask.promise;
            const page = await pdf.getPage(item.pdf_page);
            const viewport = page.getViewport({ scale: 2.2 });
            const canvas = document.getElementById('ocrCanvas');
            const context = canvas.getContext('2d', { alpha: false });
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            await page.render({ canvasContext: context, viewport }).promise;
            return canvas;
        }

        async function runAutoOcr() {
            if (!currentItem || ocrRunning) return;
            ocrRunning = true;
            document.getElementById('autoOcrBtn').disabled = true;
            try {
                setOcrStatus('PDF-Seite wird gerendert ...');
                await markRunning(true);
                const canvas = await renderPdfPageToCanvas(currentItem);
                setOcrStatus('AI OCR + Übersetzung läuft ...');
                const imageDataUrl = canvas.toDataURL('image/jpeg', 0.92);
                const response = await fetch('/api/ocr-translate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        imageDataUrl,
                        positionNumber: currentItem.number,
                        setKey: currentItem.set_key,
                        pdfPage: currentItem.pdf_page
                    })
                });
                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || 'AI OCR request failed');
                }
                document.getElementById('sourceText').value = data.source_text || '';
                document.getElementById('translatedText').value = data.translated_text || '';
                setOcrStatus((data.source_text || data.translated_text) ? 'AI OCR fertig. Quelltext und Übersetzung wurden eingefüllt.' : 'AI OCR fertig, aber ohne nutzbares Ergebnis.');
                setNotice('AI hat OCR und eine erste deutsche Fassung erzeugt. Jetzt kurz prüfen und dann fertig speichern.');
                await updateRequestOnly({ status: 'running', source_text: data.source_text || '', translated_text: data.translated_text || '' });
                await loadQueue();
            } catch (error) {
                console.error(error);
                setOcrStatus('AI OCR fehlgeschlagen: ' + error.message);
                setNotice('AI OCR ist fehlgeschlagen. Prüfe OPENAI_API_KEY, Vercel-Deployment und ob das PDF serverseitig erreichbar ist.');
            } finally {
                ocrRunning = false;
                document.getElementById('autoOcrBtn').disabled = false;
            }
        }

        function renderQueue() {
            const root = document.getElementById('queueList');
            root.innerHTML = '';
            if (!queue.length) {
                root.innerHTML = '<div class="notice">Keine offenen oder bearbeitbaren OCR-Anfragen.</div>';
                currentItem = null;
                renderCurrent();
                return;
            }
            queue.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'queue-item' + (currentItem && currentItem.request_id === item.request_id ? ' active' : '');
                div.innerHTML = `
                    <div class="queue-item-title">Pos. ${item.number} · ${item.title}</div>
                    <div class="queue-item-sub">${item.set_key} · ${item.request_status} · ${String(item.requested_by).slice(0, 8)}</div>
                    <div class="queue-item-sub">${new Date(item.request_created_at).toLocaleString()}</div>
                `;
                div.onclick = () => {
                    currentItem = item;
                    renderQueue();
                    renderCurrent();
                };
                root.appendChild(div);
            });
        }

        function renderCurrent() {
            document.getElementById('metaPosition').innerText = currentItem ? currentItem.number : '-';
            document.getElementById('metaSet').innerText = currentItem ? currentItem.set_key : '-';
            document.getElementById('metaStatus').innerText = currentItem ? currentItem.request_status : '-';
            document.getElementById('metaCreated').innerText = currentItem ? new Date(currentItem.request_created_at).toLocaleString() : '-';
            document.getElementById('sourceText').value = currentItem ? (currentItem.source_text || '') : '';
            document.getElementById('translatedText').value = currentItem ? (currentItem.translated_text || currentItem.catalog_comments_text || '') : '';

            const disabled = !currentItem;
            document.getElementById('claimBtn').disabled = disabled;
            document.getElementById('doneBtn').disabled = disabled;
            document.getElementById('failBtn').disabled = disabled;
            document.getElementById('autoOcrBtn').disabled = disabled || ocrRunning;

            const frame = document.getElementById('pdfFrame');
            if (!currentItem) {
                frame.removeAttribute('src');
                document.getElementById('ocrCanvas').getContext('2d').clearRect(0, 0, document.getElementById('ocrCanvas').width || 0, document.getElementById('ocrCanvas').height || 0);
                setOcrStatus('Noch kein OCR-Lauf gestartet.');
                return;
            }
            frame.src = getPdfUrl(currentItem);
            setNotice('Anfrage geladen. Optional AI OCR + Übersetzung, dann Text prüfen und Ergebnis speichern.');
            setOcrStatus('Bereit für automatisches OCR.');
        }

        async function loadQueue() {
            const { data, error } = await supabaseClient
                .from('training_position_ocr_requests')
                .select('id, position_id, requested_by, status, source_text, translated_text, created_at, updated_at, training_positions_catalog!inner(id,set_key,number,title,pdf_page,comments)')
                .in('status', ['pending', 'running', 'failed', 'done'])
                .order('created_at', { ascending: true });
            if (error) {
                console.error(error);
                setNotice('Queue konnte nicht geladen werden. Prüfe SQL und RLS.');
                return;
            }
            queue = (data || []).map((row) => ({
                request_id: row.id,
                position_id: row.position_id,
                requested_by: row.requested_by,
                request_status: row.status,
                source_text: row.source_text || '',
                translated_text: row.translated_text || '',
                request_created_at: row.created_at,
                request_updated_at: row.updated_at,
                set_key: row.training_positions_catalog.set_key,
                number: row.training_positions_catalog.number,
                title: row.training_positions_catalog.title,
                pdf_page: row.training_positions_catalog.pdf_page,
                catalog_comments_text: Array.isArray(row.training_positions_catalog.comments) ? row.training_positions_catalog.comments.join('\n\n') : ''
            }));
            if (!currentItem && queue.length) currentItem = queue[0];
            if (currentItem) {
                currentItem = queue.find((item) => item.request_id === currentItem.request_id) || queue[0] || null;
            }
            renderQueue();
            renderCurrent();
        }

        async function updateRequestOnly(payload) {
            const { error } = await supabaseClient
                .from('training_position_ocr_requests')
                .update({
                    ...payload,
                    updated_at: new Date().toISOString(),
                    error_message: payload.status === 'failed' ? ((payload.translated_text || '').trim() || 'Manuell als fehlgeschlagen markiert.') : ''
                })
                .eq('id', currentItem.request_id);
            if (error) throw error;
        }

        async function updateRequest(status) {
            if (!currentItem) return;
            await updateRequestOnly({
                status,
                source_text: document.getElementById('sourceText').value || '',
                translated_text: document.getElementById('translatedText').value || ''
            });
        }

        async function updateCatalog(status) {
            if (!currentItem) return;
            const translatedText = document.getElementById('translatedText').value || '';
            const payload = { ocr_status: status };
            if (status === 'done' && translatedText.trim()) {
                payload.comments = splitComments(translatedText);
            }
            const { error } = await supabaseClient
                .from('training_positions_catalog')
                .update(payload)
                .eq('id', currentItem.position_id);
            if (error) throw error;
        }

        async function markRunning(silent = false) {
            try {
                await updateRequest('running');
                await updateCatalog('running');
                await loadQueue();
                if (!silent) setNotice('Anfrage auf laufend gesetzt.');
            } catch (error) {
                console.error(error);
                if (!silent) setNotice('Status konnte nicht auf running gesetzt werden.');
                throw error;
            }
        }

        async function markDone() {
            try {
                await updateRequest('done');
                await updateCatalog('done');
                await loadQueue();
                setNotice('OCR-Ergebnis gespeichert und in den Katalog übernommen.');
            } catch (error) {
                console.error(error);
                setNotice('Ergebnis konnte nicht gespeichert werden.');
            }
        }

        async function markFailed() {
            try {
                await updateRequest('failed');
                await updateCatalog('failed');
                await loadQueue();
                setNotice('Anfrage als fehlgeschlagen markiert.');
            } catch (error) {
                console.error(error);
                setNotice('Status konnte nicht auf failed gesetzt werden.');
            }
        }

        async function init() {
            currentUser = await requireAdmin();
            if (!currentUser) return;
            await loadQueue();
        }

        init();
    </script>
</body>
</html>
