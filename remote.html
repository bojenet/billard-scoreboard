<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Remote</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f1c3f;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        h1 {
            margin-bottom: 30px;
        }

        .button-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 500px;
        }

        button {
            padding: 30px;
            font-size: 28px;
            font-weight: bold;
            border: none;
            border-radius: 20px;
            background: #1c3380;
            color: white;
        }

        button:active {
            transform: scale(0.95);
        }

        .switch {
            background: #ffd84a;
            color: black;
        }

        .danger {
            background: #aa2222;
        }
    </style>
</head>

<body>

    <h1>Match Remote</h1>
    <div id="miniScore" style="
    width:100%;
    max-width:500px;
    margin-bottom:30px;
    padding:20px;
    background:#162b66;
    border-radius:20px;">

        <div id="miniP1" style="font-size:22px; margin-bottom:8px;"></div>
        <div id="miniP2" style="font-size:22px;"></div>

        <div style="margin-top:15px; font-size:18px; opacity:.8;">
            <span id="miniActiveInfo"></span> |
            <span id="miniSeriesInfo"></span>
        </div>

    </div>
    <div class="button-grid">
        <button onclick="add(1)">+1</button>
        <button onclick="add(5)">+5</button>
        <button onclick="add(10)">+10</button>
        <button onclick="add(-1)">-1</button>

        <button class="switch" onclick="switchPlayer()">Wechsel</button>
        <button onclick="undo()">Undo</button>

        <button class="danger" onclick="finish()">Beenden</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/user_menu.js"></script>

    <script>

const matchId = new URLSearchParams(window.location.search).get("match");

let matchData = null;
let currentUserId = "";
let ownedPlayerNames = [];
let remoteChannel = null;
let pollId = null;

// ===============================
// LOAD MATCH
// ===============================

async function loadMatch() {
    if (!matchId) {
        document.body.innerHTML = "Kein Match ausgewählt.";
        return;
    }

    const user = await requireAuth();
    if (!user) return;
    currentUserId = user.id;
    const isAdmin = await hasAdminAccess(user);
    ownedPlayerNames = await getOwnedPlayerNames(currentUserId);

    const { data, error } = await supabaseClient
        .from("matches")
        .select("*")
        .eq("id", matchId)
        .single();

    if (error) {
        console.error(error);
        return;
    }

    if (!isAdmin && !isOwnedMatch(data, currentUserId, ownedPlayerNames)) {
        document.body.innerHTML = "Kein Zugriff auf diese Partie.";
        return;
    }

    matchData = data;
    updateDisplay();
}

// ===============================
// REALTIME SUBSCRIPTION
// ===============================

function subscribeToMatch() {

    if (!matchId) return;

    remoteChannel = supabaseClient
        .channel('remote-match-' + matchId)
        .on(
            'postgres_changes',
            {
                event: 'UPDATE',
                schema: 'public',
                table: 'matches',
                filter: 'id=eq.' + matchId
            },
            (payload) => {
                matchData = payload.new;
                updateDisplay();
            }
        )
        .subscribe();
}

// ===============================
// UI UPDATE
// ===============================

function updateDisplay() {

    if (!matchData) return;

    document.getElementById("miniP1").innerText =
        matchData.player1 + "   " + matchData.score1;

    document.getElementById("miniP2").innerText =
        matchData.player2 + "   " + matchData.score2;

    const activeText =
        matchData.activePlayer === 1
            ? matchData.player1 + " ist dran"
            : matchData.player2 + " ist dran";

    document.getElementById("miniActiveInfo").innerText = activeText;

    const currentSeries =
        matchData.activePlayer === 1
            ? matchData.series1
            : matchData.series2;

    document.getElementById("miniSeriesInfo").innerText =
        "Serie: " + (currentSeries > 0 ? "+" + currentSeries : "0");
}

// ===============================
// UPDATE DB
// ===============================

async function updateMatch(updateObj) {

    const { error } = await supabaseClient
        .from("matches")
        .update(updateObj)
        .eq("id", matchId);

    if (error) console.error(error);
    if (!error && matchData) {
        matchData = { ...matchData, ...updateObj };
        updateDisplay();
    }
}

async function pollMatch() {
    if (!matchId) return;
    const { data, error } = await supabaseClient
        .from("matches")
        .select("*")
        .eq("id", matchId)
        .single();
    if (error || !data) return;
    matchData = data;
    updateDisplay();
}

// ===============================
// ADD POINTS (SERIES)
// ===============================

async function add(value) {

    if (!matchData) return;

    let {
        activePlayer,
        series1,
        series2,
        score1,
        score2,
        target1,
        target2
    } = matchData;

    if (activePlayer === 1) {

        series1 += value;
        if (series1 < 0) series1 = 0;

        if (target1 > 0 && score1 + series1 > target1)
            series1 = target1 - score1;

    } else {

        series2 += value;
        if (series2 < 0) series2 = 0;

        if (target2 > 0 && score2 + series2 > target2)
            series2 = target2 - score2;
    }

    await updateMatch({ series1, series2 });
}

// ===============================
// SWITCH PLAYER
// ===============================

async function switchPlayer() {

    if (!matchData) return;

    let {
        activePlayer,
        series1,
        series2,
        score1,
        score2,
        high1,
        high2,
        inn1,
        inn2,
        totalInnings
    } = matchData;

    if (activePlayer === 1) {

        score1 += series1;
        if (series1 > high1) high1 = series1;

        series1 = 0;
        inn1++;
        activePlayer = 2;

    } else {

        score2 += series2;
        if (series2 > high2) high2 = series2;

        series2 = 0;
        inn2++;
        totalInnings++;
        activePlayer = 1;
    }

    await updateMatch({
        score1,
        score2,
        series1,
        series2,
        high1,
        high2,
        activePlayer,
        inn1,
        inn2,
        totalInnings
    });
}

// ===============================
// FINISH
// ===============================

async function finish() {
    await updateMatch({ finished: 1 });
}

// INIT
loadMatch();
subscribeToMatch();
pollId = setInterval(pollMatch, 1200);

window.addEventListener("beforeunload", () => {
    if (pollId) clearInterval(pollId);
    if (remoteChannel) supabaseClient.removeChannel(remoteChannel);
});

document.addEventListener("visibilitychange", () => {
    if (!document.hidden) pollMatch();
});

</script>

</body>

</html>
