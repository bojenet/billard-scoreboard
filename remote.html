<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Remote</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0f1c3f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="/manifest-remote.json">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0f1c3f;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 14px;
        }

        h1 {
            margin: 4px 0 14px;
            font-size: 30px;
        }

        .controls-stack {
            width: 100%;
            max-width: 720px;
            display: grid;
            gap: 12px;
        }

        .match-picker {
            width: 100%;
            max-width: 720px;
            display: none;
            gap: 12px;
        }

        .match-picker.visible {
            display: grid;
        }

        .match-card {
            background: #162b66;
            border: 1px solid #2d488f;
            border-radius: 18px;
            padding: 16px 18px;
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.28);
            cursor: pointer;
        }

        .match-card-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .match-card-sub {
            font-size: 15px;
            opacity: 0.82;
        }

        .point-main {
            width: 100%;
            min-height: 200px;
            font-size: 60px;
            border-radius: 18px;
        }

        .points-row {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            width: 100%;
        }

        .action-row {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            width: 100%;
        }

        .utility-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
            gap: 12px;
            width: 100%;
        }

        button {
            padding: 20px;
            font-size: 18px;
            line-height: 1.1;
            white-space: nowrap;
            font-weight: bold;
            border: none;
            border-radius: 14px;
            background: #1c3380;
            color: white;
        }

        button:active {
            transform: scale(0.95);
        }

        .switch {
            background: #ffd84a;
            color: black;
        }

        .danger {
            background: #aa2222;
        }

        button[disabled] {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none !important;
        }

        .mini-board {
            width: 100%;
            max-width: 720px;
            background: #162b66;
            border: 1px solid #2d488f;
            border-radius: 18px;
            padding: 12px;
            box-sizing: border-box;
            margin-bottom: 12px;
        }

        .mini-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .mini-player {
            background: #132657;
            border: 1px solid #2b4588;
            border-radius: 12px;
            padding: 10px;
            color: #ffffff;
        }

        .mini-player.active-white {
            background: #ffffff;
            color: #111111;
            border-color: #ffffff;
            box-shadow: 0 10px 28px rgba(255, 255, 255, 0.2);
        }

        .mini-player.active-yellow {
            background: #ffd84a;
            color: #111111;
            border-color: #ffd84a;
            box-shadow: 0 10px 28px rgba(255, 216, 74, 0.25);
        }

        .mini-name {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .mini-disc {
            font-size: 12px;
            opacity: 0.72;
            min-height: 14px;
        }

        .mini-score {
            font-size: 54px;
            font-weight: 800;
            line-height: 1;
            margin: 6px 0 6px;
        }

        .mini-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            font-size: 13px;
            opacity: 0.92;
        }

        .mini-status {
            margin-top: 10px;
            font-size: 16px;
            opacity: 0.9;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .mini-series {
            font-size: 34px;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 0.4px;
        }

        .status-pill {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 16px;
            border-radius: 14px;
            background: #17295e;
            border: 1px solid #2b4588;
            color: #eef3ff;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .status-pill.ok {
            background: #1f3f2f;
            border-color: #3f8d60;
            color: #d9ffe8;
        }

        .status-pill.warn {
            background: #4a3a14;
            border-color: #8f7130;
            color: #ffe9a7;
        }

        .mic-active {
            background: #8c2323 !important;
        }

    </style>
</head>

<body>

    <h1>Match Remote</h1>
    <div id="matchPicker" class="match-picker"></div>
    <div class="mini-board">
        <div class="mini-grid">
            <div id="miniCard1" class="mini-player">
                <div id="miniName1" class="mini-name">Spieler 1</div>
                <div id="miniDisc1" class="mini-disc">-</div>
                <div id="miniScore1" class="mini-score">0</div>
                <div class="mini-stats">
                    <div>A: <span id="miniInn1">0</span></div>
                    <div>DS: <span id="miniAvg1">0.000</span></div>
                    <div>HR: <span id="miniHs1">0</span></div>
                </div>
            </div>
            <div id="miniCard2" class="mini-player">
                <div id="miniName2" class="mini-name">Spieler 2</div>
                <div id="miniDisc2" class="mini-disc">-</div>
                <div id="miniScore2" class="mini-score">0</div>
                <div class="mini-stats">
                    <div>A: <span id="miniInn2">0</span></div>
                    <div>DS: <span id="miniAvg2">0.000</span></div>
                    <div>HR: <span id="miniHs2">0</span></div>
                </div>
            </div>
        </div>

        <div class="mini-status">
            <span id="miniSeriesInfo" class="mini-series"></span>
        </div>
    </div>
    <div class="controls-stack">
        <button class="point-main" onclick="add(1)">+1</button>

        <div class="points-row">
            <button onclick="add(5)">+5</button>
            <button onclick="add(10)">+10</button>
            <button onclick="add(-1)">-1</button>
        </div>

        <div class="action-row">
            <button class="switch" onclick="switchPlayer()">Wechsel</button>
            <button onclick="undo()">Undo</button>
            <button class="danger" onclick="finish()">Beenden</button>
        </div>
        <div class="utility-row">
            <button id="voiceBtn" onclick="toggleVoice()">Sprache aus</button>
            <div id="wakeStatus" class="status-pill">Wake Lock aus</div>
        </div>
        <div id="voiceStatus" class="sr-only" aria-live="polite">Sprache bereit</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/user_menu.js"></script>

    <script>

const matchId = new URLSearchParams(window.location.search).get("match");

let matchData = null;
let currentUserId = "";
let ownedPlayerNames = [];
let remoteChannel = null;
let pollId = null;
let remoteHistory = [];
let matchSeriesStorageAvailable = false;
let wakeLockSentinel = null;
let voiceRecognition = null;
let voiceActive = false;
let voiceSupported = false;
let pwaReady = false;
let wakeLockRequestedOnce = false;

function setWakeStatus(text, type = "") {
    const el = document.getElementById("wakeStatus");
    if (!el) return;
    el.className = "status-pill" + (type ? " " + type : "");
    el.innerText = text;
}

function setVoiceStatus(text, type = "") {
    const el = document.getElementById("voiceStatus");
    if (!el) return;
    el.className = "sr-only";
    el.innerText = text;
}

function updateVoiceButton() {
    const btn = document.getElementById("voiceBtn");
    if (!btn) return;
    btn.innerText = voiceActive ? "Sprache an" : "Sprache aus";
    btn.classList.toggle("mic-active", voiceActive);
    btn.disabled = !voiceSupported;
}

async function enableWakeLock() {
    if (!("wakeLock" in navigator) || !navigator.wakeLock?.request) {
        setWakeStatus("Wake Lock nicht verfuegbar", "warn");
        return;
    }
    try {
        wakeLockSentinel = await navigator.wakeLock.request("screen");
        setWakeStatus("Wake Lock aktiv", "ok");
        wakeLockSentinel.addEventListener("release", () => {
            setWakeStatus("Wake Lock pausiert", "warn");
        });
    } catch (error) {
        console.warn("Wake Lock fehlgeschlagen:", error);
        setWakeStatus("Wake Lock tippen", "warn");
    }
}

async function ensureWakeLockFromGesture() {
    if (wakeLockSentinel || wakeLockRequestedOnce) return;
    wakeLockRequestedOnce = true;
    await enableWakeLock();
}

function parseVoiceCommand(raw) {
    const text = String(raw || "").trim().toLowerCase();
    if (!text) return null;
    if (text === "plus" || text === "+") return { action: "add", value: 1 };
    if (text.includes("plus 5") || text.includes("plus fünf")) return { action: "add", value: 5 };
    if (text.includes("plus 10") || text.includes("plus zehn")) return { action: "add", value: 10 };
    if (text === "minus" || text === "minus eins" || text === "-1") return { action: "add", value: -1 };
    if (text.includes("wechsel") || text.includes("spielerwechsel") || text.includes("naechste aufnahme") || text.includes("nächste aufnahme")) return { action: "switch" };
    if (text.includes("undo") || text.includes("rückgängig") || text.includes("rueckgaengig")) return { action: "undo" };
    if (text.includes("beenden") || text.includes("ende")) return { action: "finish" };
    return null;
}

async function executeVoiceCommand(command) {
    if (!command) {
        setVoiceStatus("Sprachbefehl nicht erkannt", "warn");
        return;
    }
    if (command.action === "add") {
        await add(command.value);
        setVoiceStatus("Sprachbefehl: " + (command.value > 0 ? "+" + command.value : String(command.value)), "ok");
        return;
    }
    if (command.action === "switch") {
        await switchPlayer();
        setVoiceStatus("Sprachbefehl: Wechsel", "ok");
        return;
    }
    if (command.action === "undo") {
        await undo();
        setVoiceStatus("Sprachbefehl: Undo", "ok");
        return;
    }
    if (command.action === "finish") {
        await finish();
        setVoiceStatus("Sprachbefehl: Beenden", "ok");
    }
}

function setupVoiceRecognition() {
    const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!Recognition) {
        voiceSupported = false;
        updateVoiceButton();
        setVoiceStatus("Sprache auf diesem Geraet nicht verfuegbar", "warn");
        return;
    }

    voiceRecognition = new Recognition();
    voiceRecognition.lang = "de-DE";
    voiceRecognition.continuous = false;
    voiceRecognition.interimResults = false;
    voiceSupported = true;
    updateVoiceButton();

    voiceRecognition.onstart = () => {
        voiceActive = true;
        updateVoiceButton();
        setVoiceStatus("Sprache aktiv: plus, minus, wechsel, undo, beenden", "ok");
    };

    voiceRecognition.onresult = async (event) => {
        const transcript = event?.results?.[0]?.[0]?.transcript || "";
        await executeVoiceCommand(parseVoiceCommand(transcript));
    };

    voiceRecognition.onerror = (event) => {
        const code = String(event?.error || "");
        if (code === "not-allowed" || code === "service-not-allowed") {
            setVoiceStatus("Mikrofon nicht erlaubt", "warn");
            voiceActive = false;
            updateVoiceButton();
            return;
        }
        setVoiceStatus("Sprachfehler: " + code, "warn");
    };

    voiceRecognition.onend = () => {
        const shouldRestart = voiceActive;
        voiceActive = false;
        updateVoiceButton();
        if (shouldRestart && !document.hidden) {
            try {
                voiceRecognition.start();
            } catch (_) {
                setVoiceStatus("Sprache erneut tippen", "warn");
            }
        }
    };
}

function toggleVoice() {
    if (!voiceSupported || !voiceRecognition) return;
    if (voiceActive) {
        voiceActive = false;
        try { voiceRecognition.stop(); } catch (_) {}
        updateVoiceButton();
        setVoiceStatus("Sprache pausiert");
        return;
    }
    try {
        voiceActive = true;
        voiceRecognition.start();
    } catch (error) {
        voiceActive = false;
        updateVoiceButton();
        setVoiceStatus("Sprache konnte nicht starten", "warn");
    }
}

async function registerRemotePwa() {
    if (!("serviceWorker" in navigator)) return;
    try {
        await navigator.serviceWorker.register("/sw-remote.js");
        pwaReady = true;
    } catch (error) {
        console.warn("Service Worker Registrierung fehlgeschlagen:", error);
    }
}

function toSeriesArray(value) {
    if (Array.isArray(value)) {
        return value.map((entry) => Math.max(0, Number(entry || 0)));
    }

    if (typeof value === "string") {
        try {
            const parsed = JSON.parse(value);
            return Array.isArray(parsed)
                ? parsed.map((entry) => Math.max(0, Number(entry || 0)))
                : [];
        } catch (error) {
            return [];
        }
    }

    return [];
}

// ===============================
// LOAD MATCH
// ===============================

async function loadMatch() {
    if (!matchId) {
        await loadMatchPicker();
        return;
    }

    const user = await requireAuth();
    if (!user) return;
    currentUserId = user.id;
    const isAdmin = await hasAdminAccess(user);
    ownedPlayerNames = await getOwnedPlayerNames(currentUserId);

    const { data, error } = await supabaseClient
        .from("matches")
        .select("*")
        .eq("id", matchId)
        .single();

    if (error) {
        console.error(error);
        return;
    }

    if (!isAdmin && !isOwnedMatch(data, currentUserId, ownedPlayerNames)) {
        document.body.innerHTML = "Kein Zugriff auf diese Partie.";
        return;
    }

    matchData = data;
    matchSeriesStorageAvailable =
        Object.prototype.hasOwnProperty.call(data, "series_log1") &&
        Object.prototype.hasOwnProperty.call(data, "series_log2");
    updateDisplay();
}

async function loadMatchPicker() {
    const picker = document.getElementById("matchPicker");
    const board = document.querySelector(".mini-board");
    const controls = document.querySelector(".controls-stack");
    if (!picker) return;

    const user = await requireAuth();
    if (!user) return;
    currentUserId = user.id;
    const isAdmin = await hasAdminAccess(user);
    ownedPlayerNames = await getOwnedPlayerNames(currentUserId);

    const { data, error } = await supabaseClient
        .from("matches")
        .select("*")
        .eq("status", 1)
        .eq("finished", 0)
        .order("started_at", { ascending: false });

    if (error) {
        console.error(error);
        picker.classList.add("visible");
        picker.innerHTML = `<div class="status-pill warn">Laufende Matches konnten nicht geladen werden.</div>`;
        if (board) board.style.display = "none";
        if (controls) controls.style.display = "none";
        return;
    }

    const matches = (isAdmin ? (data || []) : (data || []).filter((match) =>
        isOwnedMatch(match, currentUserId, ownedPlayerNames)
    ));

    picker.classList.add("visible");
    if (board) board.style.display = "none";
    if (controls) controls.style.display = "none";

    if (!matches.length) {
        picker.innerHTML = `<div class="status-pill warn">Kein laufendes Match gefunden.</div>`;
        return;
    }

    picker.innerHTML = matches.map((match) => `
        <button type="button" class="match-card" onclick="openMatchFromPicker('${String(match.id).replace(/'/g, "\\'")}')">
            <div class="match-card-title">${match.player1 || "Spieler 1"} vs ${match.player2 || "Spieler 2"}</div>
            <div class="match-card-sub">${match.discipline1 || "-"} · ${match.score1 || 0} : ${match.score2 || 0} · Aufn. ${match.totalInnings || 1}</div>
        </button>
    `).join("");
}

function openMatchFromPicker(id) {
    if (!id) return;
    const next = new URL(window.location.href);
    next.searchParams.set("match", id);
    window.location.href = next.toString();
}

// ===============================
// REALTIME SUBSCRIPTION
// ===============================

function subscribeToMatch() {

    if (!matchId) return;

    remoteChannel = supabaseClient
        .channel('remote-match-' + matchId)
        .on(
            'postgres_changes',
            {
                event: 'UPDATE',
                schema: 'public',
                table: 'matches',
                filter: 'id=eq.' + matchId
            },
            (payload) => {
                matchData = payload.new;
                matchSeriesStorageAvailable =
                    Object.prototype.hasOwnProperty.call(matchData, "series_log1") &&
                    Object.prototype.hasOwnProperty.call(matchData, "series_log2");
                updateDisplay();
            }
        )
        .subscribe();
}

// ===============================
// UI UPDATE
// ===============================

function updateDisplay() {

    if (!matchData) return;

    const avg1 = Number(matchData.inn1 || 0) > 0
        ? (Number(matchData.score1 || 0) / Number(matchData.inn1 || 0)).toFixed(3)
        : "0.000";
    const avg2 = Number(matchData.inn2 || 0) > 0
        ? (Number(matchData.score2 || 0) / Number(matchData.inn2 || 0)).toFixed(3)
        : "0.000";

    document.getElementById("miniName1").innerText = matchData.player1 || "Spieler 1";
    document.getElementById("miniName2").innerText = matchData.player2 || "Spieler 2";
    document.getElementById("miniDisc1").innerText = (matchData.discipline1 || "-") + " · " + (matchData.target1 || "-");
    document.getElementById("miniDisc2").innerText = (matchData.discipline2 || "-") + " · " + (matchData.target2 || "-");
    document.getElementById("miniScore1").innerText = matchData.score1 || 0;
    document.getElementById("miniScore2").innerText = matchData.score2 || 0;
    document.getElementById("miniInn1").innerText = matchData.inn1 || 0;
    document.getElementById("miniInn2").innerText = matchData.inn2 || 0;
    document.getElementById("miniAvg1").innerText = avg1;
    document.getElementById("miniAvg2").innerText = avg2;
    document.getElementById("miniHs1").innerText = matchData.high1 || 0;
    document.getElementById("miniHs2").innerText = matchData.high2 || 0;
    const card1 = document.getElementById("miniCard1");
    const card2 = document.getElementById("miniCard2");
    const seriesInfo = document.getElementById("miniSeriesInfo");
    card1.classList.remove("active-white", "active-yellow");
    card2.classList.remove("active-white", "active-yellow");
    if (Number(matchData.activePlayer) === 1) {
        card1.classList.add("active-white");
        seriesInfo.style.color = "#ffffff";
    } else {
        card2.classList.add("active-yellow");
        seriesInfo.style.color = "#ffd84a";
    }

    const activePlayer = Number(matchData.activePlayer || 1);
    const currentSeries =
        activePlayer === 1
            ? Number(matchData.series1 || 0)
            : Number(matchData.series2 || 0);

    if (Number(matchData.finished || 0) === 1) {
        seriesInfo.innerText = "Partie beendet - am Hauptscreen speichern oder verwerfen";
        seriesInfo.style.color = "#ffd84a";
        setControlsEnabled(false);
    } else {
        seriesInfo.innerText =
            "Serie: " + (currentSeries > 0 ? "+" + currentSeries : "0");
        setControlsEnabled(true);
    }
}

// ===============================
// UPDATE DB
// ===============================

async function updateMatch(updateObj) {

    const { error } = await supabaseClient
        .from("matches")
        .update(updateObj)
        .eq("id", matchId);

    if (error) console.error(error);
    if (!error && matchData) {
        matchData = { ...matchData, ...updateObj };
        updateDisplay();
    }
}

async function pollMatch() {
    if (!matchId) return;
    const { data, error } = await supabaseClient
        .from("matches")
        .select("*")
        .eq("id", matchId)
        .single();
    if (error || !data) return;
    matchData = data;
    matchSeriesStorageAvailable =
        Object.prototype.hasOwnProperty.call(data, "series_log1") &&
        Object.prototype.hasOwnProperty.call(data, "series_log2");
    updateDisplay();
}

function setControlsEnabled(enabled) {
    document.querySelectorAll(".controls-stack button").forEach((btn) => {
        btn.disabled = !enabled;
    });
}

function isFinished() {
    return !!matchData && Number(matchData.finished || 0) === 1;
}

function detectWinner(state) {
    const score1 = Number(state.score1 || 0);
    const score2 = Number(state.score2 || 0);
    const inn1 = Number(state.inn1 || 0);
    const inn2 = Number(state.inn2 || 0);
    const target1 = Number(state.target1 || 0);
    const target2 = Number(state.target2 || 0);
    const maxInnings = Number(state.maxInnings || 0);

    // Zielprüfung erst bei gleicher Aufnahmezahl (wie scoreboard.html)
    if (inn1 === inn2) {
        if (target1 > 0 && score1 >= target1 && score2 < target2) return 1;
        if (target2 > 0 && score2 >= target2 && score1 < target1) return 2;
        if (target1 > 0 && target2 > 0 && score1 >= target1 && score2 >= target2) {
            if (score1 > score2) return 1;
            if (score2 > score1) return 2;
            return 0;
        }
    }

    // Max-Aufnahmen-Regel zusätzlich anwenden (nicht stattdessen)
    if (maxInnings > 0 && inn1 === inn2 && inn1 >= maxInnings && inn2 >= maxInnings) {
        const percent1 = target1 > 0 ? score1 / target1 : 0;
        const percent2 = target2 > 0 ? score2 / target2 : 0;
        if (percent1 > percent2) return 1;
        if (percent2 > percent1) return 2;
        return 0;
    }

    return null;
}

function saveHistory() {
    if (!matchData) return;
    remoteHistory.push({
        score1: matchData.score1,
        score2: matchData.score2,
        series1: matchData.series1,
        series2: matchData.series2,
        high1: matchData.high1,
        high2: matchData.high2,
        activePlayer: matchData.activePlayer,
        inn1: matchData.inn1,
        inn2: matchData.inn2,
        totalInnings: matchData.totalInnings,
        finished: matchData.finished,
        series_log1: toSeriesArray(matchData.series_log1),
        series_log2: toSeriesArray(matchData.series_log2)
    });
}

// ===============================
// ADD POINTS (SERIES)
// ===============================

async function add(value) {

    if (!matchData) return;
    if (isFinished()) return;
    saveHistory();

    let activePlayer = Number(matchData.activePlayer || 1);
    let series1 = Number(matchData.series1 || 0);
    let series2 = Number(matchData.series2 || 0);
    let score1 = Number(matchData.score1 || 0);
    let score2 = Number(matchData.score2 || 0);
    let target1 = Number(matchData.target1 || 0);
    let target2 = Number(matchData.target2 || 0);
    const delta = Number(value || 0);

    if (activePlayer === 1) {

        series1 += delta;
        if (series1 < 0) series1 = 0;

        if (target1 > 0 && score1 + series1 > target1)
            series1 = target1 - score1;

    } else {

        series2 += delta;
        if (series2 < 0) series2 = 0;

        if (target2 > 0 && score2 + series2 > target2)
            series2 = target2 - score2;
    }

    await updateMatch({ series1, series2 });
}

// ===============================
// SWITCH PLAYER
// ===============================

async function switchPlayer() {

    if (!matchData) return;
    if (isFinished()) return;
    saveHistory();

    let activePlayer = Number(matchData.activePlayer || 1);
    let series1 = Number(matchData.series1 || 0);
    let series2 = Number(matchData.series2 || 0);
    let score1 = Number(matchData.score1 || 0);
    let score2 = Number(matchData.score2 || 0);
    let high1 = Number(matchData.high1 || 0);
    let high2 = Number(matchData.high2 || 0);
    let inn1 = Number(matchData.inn1 || 0);
    let inn2 = Number(matchData.inn2 || 0);
    let totalInnings = Number(matchData.totalInnings || 1);
    let seriesLog1 = toSeriesArray(matchData.series_log1);
    let seriesLog2 = toSeriesArray(matchData.series_log2);

    if (activePlayer === 1) {

        score1 += series1;
        if (series1 > high1) high1 = series1;
        if (matchSeriesStorageAvailable) seriesLog1.push(series1);

        series1 = 0;
        inn1++;
        activePlayer = 2;

    } else {

        score2 += series2;
        if (series2 > high2) high2 = series2;
        if (matchSeriesStorageAvailable) seriesLog2.push(series2);

        series2 = 0;
        inn2++;
        totalInnings++;
        activePlayer = 1;
    }

    const nextState = {
        score1,
        score2,
        series1,
        series2,
        high1,
        high2,
        activePlayer,
        inn1,
        inn2,
        totalInnings,
        finished: Number(matchData.finished || 0)
    };

    if (matchSeriesStorageAvailable) {
        nextState.series_log1 = seriesLog1;
        nextState.series_log2 = seriesLog2;
    }

    const winner = detectWinner({ ...matchData, ...nextState });
    if (winner !== null) {
        nextState.finished = 1;
    }

    await updateMatch(nextState);
}

async function undo() {
    if (!matchData) return;
    if (isFinished()) return;
    if (!remoteHistory.length) return;
    const prev = remoteHistory.pop();
    await updateMatch(prev);
}

// ===============================
// FINISH
// ===============================

async function finish() {
    if (!matchData) return;
    if (isFinished()) return;
    await updateMatch({ finished: 1 });
}

// INIT
registerRemotePwa();
setupVoiceRecognition();
loadMatch();
subscribeToMatch();
pollId = setInterval(pollMatch, 1200);

window.addEventListener("beforeunload", () => {
    if (pollId) clearInterval(pollId);
    if (remoteChannel) supabaseClient.removeChannel(remoteChannel);
});

document.addEventListener("visibilitychange", () => {
    if (!document.hidden) {
        pollMatch();
        wakeLockRequestedOnce = false;
        ensureWakeLockFromGesture();
    }
});

["pointerdown", "touchstart", "click"].forEach((eventName) => {
    window.addEventListener(eventName, () => {
        ensureWakeLockFromGesture();
    }, { passive: true, once: false });
});

</script>
