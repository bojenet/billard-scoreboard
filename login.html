<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(180deg, #0f1c3f, #0a122b);
            color: white;
            min-height: 100vh;
            display: grid;
            place-items: center;
        }

        .card {
            width: min(520px, 92%);
            background: linear-gradient(180deg, #162b66, #0f1c3f);
            border: 1px solid #2d488f;
            border-radius: 22px;
            padding: 28px 24px;
            box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 40px;
        }

        .sub {
            margin: 0 0 18px;
            opacity: 0.78;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            border: none;
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 10px;
            font-size: 18px;
        }

        button {
            width: 100%;
            border: none;
            border-radius: 12px;
            padding: 13px 14px;
            font-size: 20px;
            font-weight: 700;
            color: white;
            background: linear-gradient(180deg, #2f4fe0, #1c3380);
            cursor: pointer;
        }

        .btn-secondary {
            margin-top: 10px;
            background: #243b90;
        }

        .btn-link {
            margin-top: 10px;
            background: transparent;
            border: 1px solid #3f5fc0;
            color: #dbe4ff;
        }

        .error {
            min-height: 20px;
            margin: 10px 0 0;
            color: #ffb6b6;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Login</h1>
        <p class="sub">Mit deinem Konto anmelden</p>
        <input id="email" type="email" placeholder="E-Mail" autocomplete="username" />
        <input id="password" type="password" placeholder="Passwort" autocomplete="current-password" />
        <button onclick="login()">Anmelden</button>
        <button class="btn-secondary" onclick="signUp()">Konto erstellen</button>
        <button class="btn-link" onclick="resetPassword()">Passwort zurücksetzen</button>
        <div id="errorText" class="error"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script>
        function resolveNextPath() {
            const next = new URLSearchParams(window.location.search).get("next");
            return next || "/index.html";
        }

        async function redirectIfSessionExists() {
            const explicitLogout = new URLSearchParams(window.location.search).get("logged_out") === "1";
            if (explicitLogout) return;
            const { data, error } = await supabaseClient.auth.getSession();
            if (error) {
                console.error("Session-Check fehlgeschlagen:", error);
                return;
            }
            if (data?.session) {
                const pendingNext = localStorage.getItem("login_next");
                localStorage.removeItem("login_next");
                window.location.href = pendingNext || resolveNextPath();
            }
        }

        async function login() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const errorText = document.getElementById("errorText");
            errorText.innerText = "";
            errorText.style.color = "#ffb6b6";

            if (!email || !password) {
                errorText.innerText = "Bitte E-Mail und Passwort eingeben.";
                return;
            }

            const { error } = await supabaseClient.auth.signInWithPassword({
                email,
                password
            });

            if (error) {
                errorText.innerText = "Login fehlgeschlagen: " + error.message;
                return;
            }

            window.location.href = resolveNextPath();
        }

        async function signUp() {
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;
            const errorText = document.getElementById("errorText");
            errorText.innerText = "";
            errorText.style.color = "#ffb6b6";

            if (!email || !password || password.length < 6) {
                errorText.innerText = "Bitte E-Mail und Passwort (mind. 6 Zeichen) eingeben.";
                return;
            }

            const { error } = await supabaseClient.auth.signUp({
                email,
                password
            });

            if (error) {
                errorText.innerText = "Registrierung fehlgeschlagen: " + error.message;
                return;
            }

            errorText.style.color = "#b7f7c5";
            errorText.innerText = "Konto erstellt. Falls E-Mail-Bestätigung aktiv ist, bitte Postfach prüfen.";
        }

        async function resetPassword() {
            const email = document.getElementById("email").value.trim();
            const errorText = document.getElementById("errorText");
            errorText.innerText = "";
            errorText.style.color = "#ffb6b6";

            if (!email) {
                errorText.innerText = "Bitte zuerst E-Mail eingeben.";
                return;
            }

            const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
                redirectTo: window.location.origin + "/login.html"
            });

            if (error) {
                errorText.innerText = "Reset fehlgeschlagen: " + error.message;
                return;
            }

            errorText.style.color = "#b7f7c5";
            errorText.innerText = "Reset-Mail wurde gesendet.";
        }

        redirectIfSessionExists();
    </script>
</body>
</html>
