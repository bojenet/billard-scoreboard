<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Challenge Training</title>
    <style>
        html {
            min-height: 100%;
            background: linear-gradient(180deg, #0f1c3f, #0a122b);
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(180deg, #0f1c3f, #0a122b);
            color: white;
        }

        .page {
            width: min(1160px, 94%);
            margin: 28px auto 32px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            background: linear-gradient(180deg, #162b66, #0f1c3f);
            border: 1px solid #2c4688;
            border-radius: 20px;
            padding: 12px 14px;
            box-shadow: 0 16px 34px rgba(0, 0, 0, 0.38);
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 11px 17px;
            font-size: 16px;
            font-weight: 700;
            color: white;
            background: #1c3380;
            cursor: pointer;
            border: 1px solid #3458b8;
            transition: transform .15s ease, filter .15s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.06);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            filter: none;
        }

        .btn.danger {
            background: #9f3434;
            border-color: #be5757;
        }

        .fullscreen-btn {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 1300;
            width: 34px;
            height: 34px;
            border: 1px solid #3458b8;
            border-radius: 10px;
            background: rgba(28, 51, 128, 0.92);
            color: white;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .board {
            background: linear-gradient(180deg, #162b66, #0f1c3f);
            border: 1px solid #2d488f;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5);
        }

        .meta {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            border-bottom: 1px solid #27417f;
        }

        .meta-item {
            padding: 14px 16px;
            border-right: 1px solid #27417f;
        }

        .meta-item:last-child {
            border-right: none;
        }

        .meta-label {
            font-size: 13px;
            opacity: 0.72;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .meta-value {
            font-size: 20px;
            font-weight: 700;
        }

        .timer-wrap {
            text-align: center;
            padding: 26px 14px 16px;
            border-bottom: 1px solid #27417f;
            background: radial-gradient(circle at 50% 0%, rgba(255, 216, 74, 0.1), transparent 58%);
        }

        .timer-label {
            opacity: 0.78;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .timer {
            font-size: 118px;
            font-weight: 800;
            letter-spacing: 1px;
            line-height: 1;
            color: #ffd84a;
            text-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
        }

        .timer.warning {
            color: #ff5b5b;
            text-shadow: 0 8px 24px rgba(180, 20, 20, 0.42);
        }

        .duel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid #27417f;
        }

        body.solo-mode .duel {
            grid-template-columns: 1fr;
        }

        body.solo-mode #p2Col {
            display: none;
        }

        .player-col {
            border-right: 1px solid #27417f;
        }

        .player-col:last-child {
            border-right: none;
        }

        .player-head {
            padding: 12px 14px;
            border-bottom: 1px solid #27417f;
            background: rgba(8, 16, 44, 0.42);
        }

        .player-name {
            font-size: 24px;
            font-weight: 800;
        }

        .player-disc {
            font-size: 14px;
            opacity: 0.76;
            margin-top: 2px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border-bottom: 1px solid #27417f;
        }

        .stat {
            padding: 14px 10px;
            text-align: center;
            border-right: 1px solid #27417f;
        }

        .stat:last-child {
            border-right: none;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.72;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 34px;
            font-weight: 800;
        }

        .history {
            padding: 12px 14px 14px;
            min-height: 58px;
        }

        .history-title {
            font-size: 13px;
            opacity: 0.74;
            margin-bottom: 6px;
        }

        .history-value {
            font-size: 17px;
            line-height: 1.4;
            word-break: break-word;
        }

        .input-section {
            padding: 18px;
            display: grid;
            grid-template-columns: 260px 1fr;
            gap: 16px;
            align-items: center;
        }

        .series-input {
            width: 100%;
            box-sizing: border-box;
            font-size: 42px;
            font-weight: 700;
            border: none;
            border-radius: 16px;
            padding: 18px 18px;
            background: #f4f7ff;
            color: #1a1d2c;
            box-shadow: inset 0 0 0 2px #dce6ff;
        }

        .controls {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .action-btn {
            border: none;
            border-radius: 16px;
            padding: 16px 22px;
            font-size: 22px;
            font-weight: 700;
            color: white;
            background: #1c3380;
            cursor: pointer;
            border: 1px solid #3458b8;
            transition: transform .15s ease, filter .15s ease;
        }

        .action-btn.primary {
            background: #2f4fe0;
            border-color: #5572f0;
            min-width: 300px;
        }

        .action-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.06);
        }

        .readonly {
            opacity: 0.72;
            margin-top: 8px;
            font-size: 15px;
        }

        .chat {
            border-top: 1px solid #27417f;
            padding: 12px 14px 14px;
        }

        .chat-head {
            font-size: 14px;
            font-weight: 700;
            opacity: 0.9;
            margin-bottom: 8px;
        }

        .chat-list {
            min-height: 80px;
            max-height: 210px;
            overflow-y: auto;
            border: 1px solid #2e4a92;
            border-radius: 12px;
            padding: 8px;
            background: rgba(9, 18, 45, 0.55);
        }

        .chat-empty {
            font-size: 13px;
            opacity: 0.68;
            padding: 6px 4px;
        }

        .chat-row {
            margin: 5px 0;
            display: flex;
        }

        .chat-row.mine {
            justify-content: flex-end;
        }

        .chat-bubble {
            max-width: 82%;
            padding: 7px 10px;
            border-radius: 10px;
            border: 1px solid #3659bb;
            background: #163071;
            font-size: 14px;
            line-height: 1.35;
            word-break: break-word;
        }

        .chat-row.mine .chat-bubble {
            background: #2a4ce0;
            border-color: #5d79f3;
        }

        .chat-meta {
            font-size: 11px;
            opacity: 0.72;
            margin-bottom: 2px;
        }

        .chat-input {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
            margin-top: 8px;
        }

        .chat-input input {
            border: 1px solid #3959ab;
            border-radius: 10px;
            padding: 10px 12px;
            font-size: 14px;
            color: #fff;
            background: #112659;
        }

        .chat-send {
            border: none;
            border-radius: 10px;
            background: #2f4fe0;
            border: 1px solid #5572f0;
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            padding: 0 14px;
            cursor: pointer;
        }

        .position-modal {
            position: fixed;
            inset: 0;
            z-index: 1450;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 18px;
            background: rgba(3, 8, 22, 0.78);
            backdrop-filter: blur(6px);
        }

        .position-modal.open {
            display: flex;
        }

        .position-dialog {
            width: min(980px, 96vw);
            max-height: 94vh;
            border-radius: 24px;
            border: 1px solid #3557b7;
            background: linear-gradient(180deg, #162b66, #0f1c3f);
            box-shadow: 0 32px 70px rgba(0, 0, 0, 0.55);
            overflow: hidden;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .position-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-bottom: 1px solid #27417f;
        }

        .position-title {
            font-size: 20px;
            font-weight: 800;
        }

        .position-sub {
            margin-top: 4px;
            font-size: 13px;
            opacity: 0.76;
        }

        .position-close {
            border: none;
            border-radius: 10px;
            background: #6c2d4f;
            color: white;
            font-size: 14px;
            font-weight: 700;
            padding: 10px 12px;
            cursor: pointer;
        }

        .position-body {
            padding: 16px;
            overflow: auto;
            display: flex;
            justify-content: center;
        }

        .position-table-wrap {
            position: relative;
            width: min(674px, 88vw);
            border-radius: 18px;
            overflow: hidden;
            background: #f7f7f4;
            aspect-ratio: 674 / 1200;
            box-shadow: 0 18px 38px rgba(0, 0, 0, 0.28);
        }

        .position-table-bg {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        .position-table-overlay {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            display: block;
        }

        @media (max-width: 980px) {
            .meta {
                grid-template-columns: 1fr 1fr;
            }

            .duel {
                grid-template-columns: 1fr;
            }

            .player-col {
                border-right: none;
                border-bottom: 1px solid #27417f;
            }

            .player-col:last-child {
                border-bottom: none;
            }

            .timer {
                font-size: 84px;
            }

            .input-section {
                grid-template-columns: 1fr;
            }

            .series-input {
                font-size: 34px;
                padding: 16px 16px;
            }

            .action-btn {
                font-size: 18px;
                padding: 14px 18px;
            }

            .action-btn.primary {
                min-width: 0;
            }
        }
    </style>
</head>
<body>
    <button id="fullscreenBtn" class="fullscreen-btn" type="button" onclick="toggleFullscreen()" title="Vollbild starten" aria-label="Vollbild starten">⛶</button>
    <div class="page">
        <div class="topbar">
            <button class="btn" id="backToSetupBtn" onclick="goBackToSetup()">Zurück zum Setup</button>
            <button class="btn" id="startCountdownBtn" style="display:none;" onclick="startCountdownNow()">Countdown starten</button>
            <button class="btn" id="finishNowBtn" onclick="finishChallengeNow()">Beenden & speichern</button>
            <button class="btn" onclick="resetMyStats()">Meine Werte reset</button>
            <button class="btn danger" id="endSessionBtn" style="display:none;" onclick="endSession()">Session beenden</button>
        </div>

        <div class="board">
            <div class="meta">
                <div class="meta-item">
                    <div class="meta-label">Modus</div>
                    <div class="meta-value" id="modeValue">Challenge</div>
                </div>
                <div class="meta-item">
                    <div class="meta-label">Session</div>
                    <div class="meta-value" id="sessionValue">Solo</div>
                </div>
                <div class="meta-item">
                    <div class="meta-label">Status</div>
                    <div class="meta-value" id="statusValue">Aktiv</div>
                </div>
                <div class="meta-item">
                    <div class="meta-label" id="durationLabel">Dauer</div>
                    <div class="meta-value" id="durationValue">-</div>
                </div>
            </div>

            <div class="timer-wrap" id="timerWrap">
                <div class="timer-label">Restzeit</div>
                <div class="timer" id="timerValue">00:00</div>
            </div>

            <div class="duel">
                <div class="player-col">
                    <div class="player-head">
                        <div class="player-name" id="p1Name">Spieler 1</div>
                        <div class="player-disc" id="p1Disc">-</div>
                    </div>
                    <div class="stats">
                        <div class="stat"><div class="stat-label">Punkte</div><div class="stat-value" id="p1Score">0</div></div>
                        <div class="stat"><div class="stat-label">Aufnahmen</div><div class="stat-value" id="p1Innings">0</div></div>
                        <div class="stat"><div class="stat-label">HS</div><div class="stat-value" id="p1High">0</div></div>
                        <div class="stat"><div class="stat-label">DS</div><div class="stat-value" id="p1Avg">0.000</div></div>
                    </div>
                    <div class="history">
                        <div class="history-title">Serien</div>
                        <div class="history-value" id="p1History">-</div>
                    </div>
                </div>

                <div class="player-col" id="p2Col">
                    <div class="player-head">
                        <div class="player-name" id="p2Name">Spieler 2</div>
                        <div class="player-disc" id="p2Disc">-</div>
                    </div>
                    <div class="stats">
                        <div class="stat"><div class="stat-label">Punkte</div><div class="stat-value" id="p2Score">0</div></div>
                        <div class="stat"><div class="stat-label">Aufnahmen</div><div class="stat-value" id="p2Innings">0</div></div>
                        <div class="stat"><div class="stat-label">HS</div><div class="stat-value" id="p2High">0</div></div>
                        <div class="stat"><div class="stat-label">DS</div><div class="stat-value" id="p2Avg">0.000</div></div>
                    </div>
                    <div class="history">
                        <div class="history-title">Serien</div>
                        <div class="history-value" id="p2History">-</div>
                    </div>
                </div>
            </div>

            <div class="input-section">
                <input id="seriesInput" class="series-input" type="number" min="0" value="0" />
                <div>
                    <div class="controls">
                        <button class="action-btn primary" onclick="commitInning()">Meine Aufnahme zählen</button>
                        <button class="action-btn" onclick="adjustSeries(1)">+1</button>
                        <button class="action-btn" onclick="adjustSeries(5)">+5</button>
                        <button class="action-btn" onclick="adjustSeries(10)">+10</button>
                        <button class="action-btn" onclick="adjustSeries(-1)">-1</button>
                    </div>
                    <div class="readonly" id="readonlyInfo"></div>
                </div>
            </div>

            <div class="chat" id="chatSection" style="display:none;">
                <div class="chat-head">Session-Chat</div>
                <div class="chat-list" id="chatList"></div>
                <div class="chat-input">
                    <input id="chatInput" type="text" maxlength="500" placeholder="Nachricht eingeben..." />
                    <button class="chat-send" onclick="sendChatMessage()">Senden</button>
                </div>
            </div>
        </div>
    </div>

    <div class="position-modal" id="challengePositionModal">
        <div class="position-dialog">
            <div class="position-head">
                <div>
                    <div class="position-title" id="challengePositionTitle">Position 1</div>
                    <div class="position-sub" id="challengePositionSub">Nächste Ausgangsstellung für deine Aufnahme.</div>
                </div>
                <button class="position-close" type="button" onclick="closeChallengePositionModal()">Schließen</button>
            </div>
            <div class="position-body">
                <div class="position-table-wrap" id="challengePositionContent"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/user_menu.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const sessionId = params.get("session") || "";
        const soloMode = params.get("mode") || "challenge";
        const isGoOnSolo = !sessionId && soloMode === "go_on";
        const soloDiscipline = params.get("discipline") || "";
        const soloMinutes = Number(params.get("minutes") || 0);
        const soloTarget = Number(params.get("target") || 0);
        const soloRunId = params.get("runId") || "";

        let currentUser = null;
        let timerId = null;
        let countdownEndMs = 0;
        let countdownStarted = false;
        let isDuelMode = false;
        let isHost = false;
        let sessionData = null;
        let realtimeChannel = null;
        let sessionPollId = null;
        let chatPollId = null;
        let chatMessages = [];
        let resultSaved = false;
        let resultSaveInProgress = false;
        let seriesDbUnsupportedNotified = false;
        let soloStartedAtIso = null;
        let localChallengeEnded = false;
        let finishRedirectScheduled = false;
        let timerExpired = false;
        let lastInningWindowOpen = false;
        let lastInningUsed = false;
        let oneMinuteWarned = false;
        let audioCtx = null;
        let audioPrimed = false;
        let lastShownSessionPositionIndex = null;
        const TABLE_VIEWBOX = { width: 674, height: 1200 };
        const DISCIPLINE_TEMPLATES = {
            "Cadre 47/2": "assets/grosser-tisch-47-2.png",
            "Cadre 71/2": "assets/mb-71-2.png"
        };
        const DEFAULT_CHALLENGE_POSITIONS = [
            { id: 1, red: { x: 236, y: 166 }, yellow: { x: 259, y: 214 }, white: { x: 232, y: 201 } },
            { id: 2, red: { x: 288, y: 262 }, yellow: { x: 316, y: 305 }, white: { x: 272, y: 323 } },
            { id: 3, red: { x: 411, y: 438 }, yellow: { x: 378, y: 485 }, white: { x: 441, y: 478 } },
            { id: 4, red: { x: 492, y: 696 }, yellow: { x: 455, y: 738 }, white: { x: 524, y: 756 } },
            { id: 5, red: { x: 332, y: 882 }, yellow: { x: 360, y: 928 }, white: { x: 306, y: 939 } },
            { id: 6, red: { x: 237, y: 1038 }, yellow: { x: 275, y: 1078 }, white: { x: 221, y: 1091 } }
        ];

        let soloState = {
            p1Name: "Du",
            p1Disc: "",
            p1Series: [],
            p1Score: 0,
            p1Innings: 0,
            p1High: 0,
            p1Target: 0
        };

        function parseSeries(value) {
            if (!Array.isArray(value)) return [];
            return value
                .map((x) => Number(x))
                .filter((x) => Number.isFinite(x) && x >= 0);
        }

        function formatTime(totalSeconds) {
            const safe = Math.max(0, totalSeconds);
            const min = Math.floor(safe / 60);
            const sec = safe % 60;
            return String(min).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
        }

        function avg(score, innings) {
            return innings > 0 ? (score / innings).toFixed(3) : "0.000";
        }

        function getBackTarget() {
            return isGoOnSolo ? "training_go_on.html" : "training_countdown_hs.html";
        }

        function goBackToSetup() {
            window.location.href = getBackTarget();
        }

        function scheduleFinishRedirect() {
            if (finishRedirectScheduled) return;
            finishRedirectScheduled = true;
            window.setTimeout(() => {
                window.location.href = getBackTarget();
            }, 900);
        }

        function updateFullscreenButton() {
            const btn = document.getElementById("fullscreenBtn");
            if (!btn) return;
            const active = !!document.fullscreenElement;
            btn.innerText = active ? "×" : "⛶";
            btn.title = active ? "Vollbild beenden" : "Vollbild starten";
            btn.setAttribute("aria-label", active ? "Vollbild beenden" : "Vollbild starten");
        }

        async function toggleFullscreen() {
            try {
                if (document.fullscreenElement) {
                    await document.exitFullscreen();
                } else {
                    await document.documentElement.requestFullscreen();
                }
            } catch (error) {
                console.warn("Fullscreen Toggle fehlgeschlagen:", error);
            } finally {
                updateFullscreenButton();
            }
        }

        function getSoloSourceKey() {
            const soloKeyPart = soloRunId || String(soloStartedAtIso || "");
            if (isGoOnSolo) {
                return "go_on:solo:" + currentUser.id + ":" + soloKeyPart;
            }
            return "challenge:solo:" + currentUser.id + ":" + soloKeyPart;
        }

        function buildGoOnLegacyDiscipline() {
            return String(soloState.p1Disc || "") + " (Go-On " + String(soloState.p1Target || 0) + ")";
        }

        function setText(id, value) {
            const el = document.getElementById(id);
            if (el) el.innerText = value;
        }

        function getCurrentPlayerDiscipline() {
            if (!isDuelMode) return soloState.p1Disc || soloDiscipline || "Cadre 47/2";
            return isHost ? (sessionData?.host_discipline || "Cadre 47/2") : (sessionData?.guest_discipline || sessionData?.host_discipline || "Cadre 47/2");
        }

        function getChallengeTemplateForDiscipline(discipline) {
            return DISCIPLINE_TEMPLATES[discipline] || "assets/grosser-tisch-47-2.png";
        }

        function getSessionChallengePositions() {
            const raw = sessionData?.challenge_positions;
            if (!Array.isArray(raw) || !raw.length) return DEFAULT_CHALLENGE_POSITIONS;
            return raw;
        }

        function getCurrentSessionPositionIndex() {
            const raw = Number(sessionData?.position_index || 1);
            if (!Number.isFinite(raw) || raw < 1) return 1;
            return ((raw - 1) % 6) + 1;
        }

        function renderChallengePositionSvg(layout) {
            return `
                <svg class="position-table-overlay" viewBox="0 0 ${TABLE_VIEWBOX.width} ${TABLE_VIEWBOX.height}" aria-label="Challenge Position ${layout.id}">
                    <g transform="translate(${layout.red.x} ${layout.red.y})">
                        <circle r="12" fill="#e02f2f" stroke="#2a2a2a" stroke-opacity="0.55" stroke-width="1.5"></circle>
                        <circle r="4.5" cx="-4" cy="-4" fill="#ffffff" fill-opacity="0.42"></circle>
                    </g>
                    <g transform="translate(${layout.yellow.x} ${layout.yellow.y})">
                        <circle r="12" fill="#ffe500" stroke="#2a2a2a" stroke-opacity="0.55" stroke-width="1.5"></circle>
                        <circle r="4.5" cx="-4" cy="-4" fill="#ffffff" fill-opacity="0.42"></circle>
                    </g>
                    <g transform="translate(${layout.white.x} ${layout.white.y})">
                        <circle r="12" fill="#fbfbfb" stroke="#6e6e6e" stroke-opacity="0.7" stroke-width="1.5"></circle>
                        <circle r="4.5" cx="-4" cy="-4" fill="#ffffff" fill-opacity="0.72"></circle>
                    </g>
                </svg>
            `;
        }

        function renderChallengePositionModal(positionId) {
            const positions = getSessionChallengePositions();
            const layout = positions.find((item) => Number(item.id) === Number(positionId)) || positions[0];
            const content = document.getElementById("challengePositionContent");
            if (!content || !layout) return;
            const discipline = getCurrentPlayerDiscipline();
            content.innerHTML = `

        function ensureAudioContext() {
            if (!audioCtx) {
                const Ctx = window.AudioContext || window.webkitAudioContext;
                if (!Ctx) return null;
                audioCtx = new Ctx();
            }
            return audioCtx;
        }

        async function primeAudio() {
            const ctx = ensureAudioContext();
            if (!ctx || audioPrimed) return;
            try {
                await ctx.resume();
                audioPrimed = true;
            } catch (_) {
                // Ignorieren: Browser kann Audio bis zur nächsten User-Interaktion blockieren.
            }
        }

        async function playOneMinuteAlert() {
            const ctx = ensureAudioContext();
            if (!ctx) return;
            try {
                await ctx.resume();
                const now = ctx.currentTime;
                const freqs = [880, 1175];
                freqs.forEach((freq, i) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = "sine";
                    osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.0001, now + i * 0.22);
                    gain.gain.exponentialRampToValueAtTime(0.12, now + i * 0.22 + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.22 + 0.18);
                    osc.connect(gain).connect(ctx.destination);
                    osc.start(now + i * 0.22);
                    osc.stop(now + i * 0.22 + 0.2);
                });
            } catch (_) {
                // Audio evtl. blockiert - kein harter Fehler.
            }
        }

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#39;");
        }

        function formatTimeShort(iso) {
            const d = new Date(iso);
            if (Number.isNaN(d.getTime())) return "";
            return d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
        }

        async function persistCurrentChallengeResult(reason) {
            if (resultSaved || resultSaveInProgress || !currentUser) return;
            resultSaveInProgress = true;

            try {
                if (!isDuelMode) {
                    if (!soloState.p1Disc) return;
                    if (isGoOnSolo && (!Number.isInteger(soloState.p1Target) || soloState.p1Target < 1)) return;
                    if (!isGoOnSolo && ![30, 45, 60].includes(soloMinutes)) return;
                    const sourceKey = getSoloSourceKey();
                    const score = Number(soloState.p1Score || 0);
                    const innings = Number(soloState.p1Innings || 0);
                    const high = Number(soloState.p1High || 0);
                    const ownSeries = parseSeries(soloState.p1Series);
                    const avgValue = innings > 0 ? (score / innings) : 0;
                    const baseSoloPayload = {
                        source_key: sourceKey,
                        mode: isGoOnSolo ? "go_on" : "solo",
                        session_id: null,
                        owner_user_id: currentUser.id,
                        owner_name: getDisplayName(currentUser),
                        opponent_name: null,
                        discipline: soloState.p1Disc,
                        duration_minutes: isGoOnSolo ? null : soloMinutes,
                        target_points: isGoOnSolo ? soloState.p1Target : null,
                        score,
                        innings,
                        high_series: high,
                        avg: Number(avgValue.toFixed(3))
                    };

                    let { error } = await supabaseClient
                        .from("training_challenge_results")
                        .upsert([{
                            ...baseSoloPayload,
                            series: ownSeries,
                        }], { onConflict: "source_key" });

                    const soloErrorText = String((error && error.message) || "").toLowerCase();
                    if (error && soloErrorText.includes("series")) {
                        const retry = await supabaseClient
                            .from("training_challenge_results")
                            .upsert([{
                                ...baseSoloPayload
                            }], { onConflict: "source_key" });
                        error = retry.error;
                        if (!seriesDbUnsupportedNotified) {
                            seriesDbUnsupportedNotified = true;
                            alert("Ergebnis gespeichert, aber Aufnahmen-Verlauf nicht. Bitte DB-Migration für 'series' ausführen.");
                        }
                    }

                    const legacyGoOnErrorText = String((error && error.message) || "").toLowerCase();
                    if (error && isGoOnSolo && (
                        legacyGoOnErrorText.includes("target_points")
                        || legacyGoOnErrorText.includes("mode")
                        || legacyGoOnErrorText.includes("duration_minutes")
                        || legacyGoOnErrorText.includes("check constraint")
                    )) {
                        const legacyPayload = {
                            source_key: sourceKey,
                            mode: "solo",
                            session_id: null,
                            owner_user_id: currentUser.id,
                            owner_name: getDisplayName(currentUser),
                            opponent_name: null,
                            discipline: buildGoOnLegacyDiscipline(),
                            duration_minutes: 30,
                            score,
                            innings,
                            high_series: high,
                            avg: Number(avgValue.toFixed(3))
                        };
                        const retryLegacy = await supabaseClient
                            .from("training_challenge_results")
                            .upsert([{
                                ...legacyPayload,
                                series: ownSeries
                            }], { onConflict: "source_key" });
                        error = retryLegacy.error;

                        const retryLegacyText = String((error && error.message) || "").toLowerCase();
                        if (error && retryLegacyText.includes("series")) {
                            const retryLegacyNoSeries = await supabaseClient
                                .from("training_challenge_results")
                                .upsert([legacyPayload], { onConflict: "source_key" });
                            error = retryLegacyNoSeries.error;
                            if (!seriesDbUnsupportedNotified && !error) {
                                seriesDbUnsupportedNotified = true;
                                alert("Ergebnis gespeichert, aber Aufnahmen-Verlauf nicht. Bitte DB-Migration für 'series' ausführen.");
                            }
                        }
                    }

                if (!error) {
                    resultSaved = true;
                    if (localChallengeEnded) {
                        scheduleFinishRedirect();
                    }
                } else {
                    console.warn("Challenge-Ergebnis (Solo) konnte nicht gespeichert werden:", reason, error);
                }
                return;
                }

                if (!sessionData?.id) return;
                const isMineHost = String(sessionData.host_user_id || "") === String(currentUser.id);
                const isMineGuest = String(sessionData.guest_user_id || "") === String(currentUser.id);
                if (!isMineHost && !isMineGuest) return;

                const score = Number(isMineHost ? sessionData.host_score : sessionData.guest_score) || 0;
                const innings = Number(isMineHost ? sessionData.host_innings : sessionData.guest_innings) || 0;
                const high = Number(isMineHost ? sessionData.host_high : sessionData.guest_high) || 0;
                const ownSeries = isMineHost
                    ? parseSeries(sessionData.host_series)
                    : parseSeries(sessionData.guest_series);
                const avgValue = innings > 0 ? (score / innings) : 0;
                const myName = isMineHost ? (sessionData.host_name || getDisplayName(currentUser)) : (sessionData.guest_name || getDisplayName(currentUser));
                const oppName = isMineHost ? (sessionData.guest_name || "Spieler 2") : (sessionData.host_name || "Spieler 1");
                const disc = isMineHost ? sessionData.host_discipline : sessionData.guest_discipline;
                const sourceKey = "challenge:duel:" + sessionData.id + ":" + currentUser.id;

                let { error } = await supabaseClient
                    .from("training_challenge_results")
                    .upsert([{
                        source_key: sourceKey,
                        mode: "duel",
                        session_id: sessionData.id,
                        owner_user_id: currentUser.id,
                        owner_name: myName,
                        opponent_name: oppName,
                        discipline: disc || null,
                        duration_minutes: Number(sessionData.duration_minutes || 30),
                        score,
                        innings,
                        series: ownSeries,
                        high_series: high,
                        avg: Number(avgValue.toFixed(3))
                    }], { onConflict: "source_key" });

                const duelErrorText = String((error && error.message) || "").toLowerCase();
                if (error && duelErrorText.includes("series")) {
                    const retry = await supabaseClient
                        .from("training_challenge_results")
                        .upsert([{
                            source_key: sourceKey,
                            mode: "duel",
                            session_id: sessionData.id,
                            owner_user_id: currentUser.id,
                            owner_name: myName,
                            opponent_name: oppName,
                            discipline: disc || null,
                            duration_minutes: Number(sessionData.duration_minutes || 30),
                            score,
                            innings,
                            high_series: high,
                            avg: Number(avgValue.toFixed(3))
                        }], { onConflict: "source_key" });
                    error = retry.error;
                    if (!seriesDbUnsupportedNotified) {
                        seriesDbUnsupportedNotified = true;
                        alert("Ergebnis gespeichert, aber Aufnahmen-Verlauf nicht. Bitte DB-Migration für 'series' ausführen.");
                    }
                }

                if (!error) {
                    resultSaved = true;
                    const finishBtn = document.getElementById("finishNowBtn");
                    if (finishBtn) {
                        finishBtn.disabled = true;
                        finishBtn.innerText = "Gespeichert";
                    }
                    if (localChallengeEnded || sessionData?.status === "finished") {
                        scheduleFinishRedirect();
                    }
                } else {
                    console.warn("Challenge-Ergebnis (2P) konnte nicht gespeichert werden:", reason, error);
                }
            } finally {
                resultSaveInProgress = false;
            }
        }

        function startVisualTimer() {
            const applyTimerVisual = async (remaining) => {
                setText("timerValue", formatTime(remaining));
                const timerEl = document.getElementById("timerValue");
                if (timerEl) timerEl.classList.toggle("warning", remaining <= 60);
                if (remaining <= 60 && !oneMinuteWarned) {
                    oneMinuteWarned = true;
                    await playOneMinuteAlert();
                }
            };

            if (timerId) clearInterval(timerId);
            timerId = setInterval(async () => {
                const remaining = Math.max(0, Math.floor((countdownEndMs - Date.now()) / 1000));
                await applyTimerVisual(remaining);
                if (remaining <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    timerExpired = true;
                    if (!localChallengeEnded) {
                        lastInningWindowOpen = true;
                    }
                    if (!isDuelMode) {
                        renderSolo();
                    } else {
                        renderDualFromSession(sessionData || {});
                    }
                }
            }, 350);

            // Expose debug helpers for quick browser-console checks.
            window.debugTimerWarning = async function () {
                oneMinuteWarned = false;
                await applyTimerVisual(59);
            };
            window.debugTimerResetColor = function () {
                const timerEl = document.getElementById("timerValue");
                if (timerEl) timerEl.classList.remove("warning");
            };
        }

        async function commitInning() {
            if (localChallengeEnded) {
                alert(isGoOnSolo ? "Die Go-on Trainingspartie ist bereits beendet." : "Challenge ist bereits beendet.");
                return;
            }
            if (isDuelMode && sessionData?.status === "finished") return;
            if (isDuelMode && !countdownStarted) {
                alert("Countdown wurde noch nicht gestartet.");
                return;
            }
            let expiredNow = false;
            if (!isGoOnSolo) {
                const remaining = Math.max(0, Math.floor((countdownEndMs - Date.now()) / 1000));
                expiredNow = timerExpired || remaining <= 0;
                if (expiredNow) {
                    timerExpired = true;
                    if (!lastInningWindowOpen && !lastInningUsed) {
                        lastInningWindowOpen = true;
                    }
                    if (!lastInningWindowOpen || lastInningUsed) {
                        alert("Zeit ist abgelaufen. Die letzte Aufnahme wurde bereits erfasst.");
                        return;
                    }
                }
            }

            const input = document.getElementById("seriesInput");
            const series = Number(input.value || 0);
            if (!Number.isFinite(series) || series < 0) {
                alert("Bitte eine gültige Serie eingeben (mindestens 0).");
                return;
            }

            if (!isDuelMode) {
                let appliedSeries = series;
                if (isGoOnSolo) {
                    const remainingTarget = Math.max(0, Number(soloState.p1Target || 0) - Number(soloState.p1Score || 0));
                    if (remainingTarget <= 0) {
                        alert("Die Distanz ist bereits erreicht.");
                        return;
                    }
                    if (appliedSeries > remainingTarget) {
                        appliedSeries = remainingTarget;
                    }
                }
                soloState.p1Series.push(appliedSeries);
                soloState.p1Innings += 1;
                soloState.p1Score += appliedSeries;
                if (appliedSeries > soloState.p1High) soloState.p1High = appliedSeries;
                if (expiredNow) {
                    lastInningUsed = true;
                    lastInningWindowOpen = false;
                }
                input.value = 0;
                if (isGoOnSolo && soloState.p1Target > 0 && soloState.p1Score >= soloState.p1Target) {
                    localChallengeEnded = true;
                    await persistCurrentChallengeResult("target_reached");
                }
                renderSolo();
                return;
            }

            if (!sessionData?.id) return;

            if (isHost) {
                const nextSeries = parseSeries(sessionData.host_series);
                nextSeries.push(series);
                const nextScore = Number(sessionData.host_score || 0) + series;
                const nextInnings = Number(sessionData.host_innings || 0) + 1;
                const nextHigh = Math.max(Number(sessionData.host_high || 0), series);
                const nextPositionIndex = (getCurrentSessionPositionIndex() % 6) + 1;

                const { error } = await supabaseClient
                    .from("training_countdown_hs_sessions")
                    .update({
                        host_series: nextSeries,
                        host_score: nextScore,
                        host_innings: nextInnings,
                        host_high: nextHigh,
                        position_index: nextPositionIndex
                    })
                    .eq("id", sessionData.id);

                if (error) {
                    alert("Deine Serie konnte nicht gespeichert werden: " + error.message);
                    return;
                }

                sessionData.host_series = nextSeries;
                sessionData.host_score = nextScore;
                sessionData.host_innings = nextInnings;
                sessionData.host_high = nextHigh;
                sessionData.position_index = nextPositionIndex;
            } else {
                const nextSeries = parseSeries(sessionData.guest_series);
                nextSeries.push(series);
                const nextScore = Number(sessionData.guest_score || 0) + series;
                const nextInnings = Number(sessionData.guest_innings || 0) + 1;
                const nextHigh = Math.max(Number(sessionData.guest_high || 0), series);
                const nextPositionIndex = (getCurrentSessionPositionIndex() % 6) + 1;

                const { error } = await supabaseClient
                    .from("training_countdown_hs_sessions")
                    .update({
                        guest_series: nextSeries,
                        guest_score: nextScore,
                        guest_innings: nextInnings,
                        guest_high: nextHigh,
                        position_index: nextPositionIndex
                    })
                    .eq("id", sessionData.id);

                if (error) {
                    alert("Deine Serie konnte nicht gespeichert werden: " + error.message);
                    return;
                }

                sessionData.guest_series = nextSeries;
                sessionData.guest_score = nextScore;
                sessionData.guest_innings = nextInnings;
                sessionData.guest_high = nextHigh;
                sessionData.position_index = nextPositionIndex;
            }

            if (expiredNow) {
                lastInningUsed = true;
                lastInningWindowOpen = false;
            }

            input.value = 0;
            renderDualFromSession(sessionData);
            maybeShowCurrentSessionPosition(true);
        }

        async function resetMyStats() {
            if (localChallengeEnded) {
                alert("Nach dem Beenden kann nicht mehr zurückgesetzt werden.");

            if (!confirm("Eigene Werte wirklich zurücksetzen?")) return;

                soloState.p1High = 0;
                renderSolo();
                document.getElementById("seriesInput").value = 0;

            if (!sessionData?.id) return;
            let update = {};
            if (isHost) {
                update = {
                    host_series: [],
                    host_score: 0,
                    host_innings: 0,
                    host_high: 0
                };
            } else {
                update = {
                    guest_series: [],
                    guest_score: 0,
                    guest_innings: 0,
                    guest_high: 0
                };
            }

            const { error } = await supabaseClient
                .from("training_countdown_hs_sessions")
                .update(update)
                .eq("id", sessionData.id);

            if (error) {
                alert("Reset fehlgeschlagen: " + error.message);
                return;
            }
            document.getElementById("seriesInput").value = 0;
        }

        async function endSession() {
            if (!isDuelMode || !isHost || !sessionData?.id) return;
            if (!confirm("Session für beide beenden?")) return;
            await endSessionInternal("host_end_session");
        }

        async function endSessionInternal(reason) {
            if (!isDuelMode || !isHost || !sessionData?.id) return;
            const { error } = await supabaseClient
                .from("training_countdown_hs_sessions")
                .update({ status: "finished" })
                .eq("id", sessionData.id);

            if (error) {
                alert("Session konnte nicht beendet werden: " + error.message);
                return;
            }
            sessionData.status = "finished";
            localChallengeEnded = true;
            await persistCurrentChallengeResult(reason || "host_end_session");
            renderDualFromSession(sessionData);
        }

        async function finishChallengeNow() {
            if (localChallengeEnded || resultSaved) return;
            const finishBtn = document.getElementById("finishNowBtn");
            if (finishBtn) finishBtn.disabled = true;

            if (!isDuelMode) {
                if (!confirm(isGoOnSolo ? "Go-on Trainingspartie jetzt beenden und speichern?" : "Challenge jetzt beenden und speichern?")) {
                    if (finishBtn && !resultSaved) finishBtn.disabled = false;
                    return;
                }
                localChallengeEnded = true;
                if (timerId) {
                    clearInterval(timerId);
                    timerId = null;
                }
                await persistCurrentChallengeResult(isGoOnSolo ? "manual_finish_go_on" : "manual_finish_solo");
                renderSolo();
                if (finishBtn && !resultSaved) finishBtn.disabled = false;
                return;
            }

            if (isHost) {
                if (!confirm("Challenge für beide jetzt beenden und speichern?")) {
                    if (finishBtn && !resultSaved) finishBtn.disabled = false;
                    return;
                }
                await endSessionInternal("manual_finish_host");
                if (finishBtn && !resultSaved) finishBtn.disabled = false;
                return;
            }

            if (!confirm("Dein Ergebnis jetzt beenden und speichern?")) {
                if (finishBtn && !resultSaved) finishBtn.disabled = false;
                return;
            }
            if (sessionData?.id) {
                const { error } = await supabaseClient
                    .from("training_countdown_hs_sessions")
                    .update({ status: "finished" })
                    .eq("id", sessionData.id);
                if (error) {
                    alert("Challenge konnte nicht beendet werden: " + error.message);
                    if (finishBtn && !resultSaved) finishBtn.disabled = false;
                    return;
                }
                sessionData.status = "finished";
            }
            localChallengeEnded = true;
            await persistCurrentChallengeResult("manual_finish_guest");
            renderDualFromSession(sessionData || {});
            if (finishBtn && !resultSaved) finishBtn.disabled = false;
        }

        async function startCountdownNow() {
            if (!isDuelMode || !isHost || !sessionData?.id) return;
            if (sessionData.countdown_started_at) return;
            if (!sessionData.guest_user_id) {
                alert("Countdown kann erst gestartet werden, wenn Spieler 2 beigetreten ist.");
                return;
            }

            const now = new Date();
            const endsAt = new Date(now.getTime() + Number(sessionData.duration_minutes || 0) * 60000);

            const { data, error } = await supabaseClient
                .from("training_countdown_hs_sessions")
                .update({
                    countdown_started_at: now.toISOString(),
                    started_at: now.toISOString(),
                    ends_at: endsAt.toISOString(),
                    position_index: 1
                })
                .eq("id", sessionData.id)
                .is("countdown_started_at", null)
                .select("*")
                .single();

            if (error || !data) {
                alert("Countdown konnte nicht gestartet werden: " + (error?.message || "Unbekannter Fehler"));
                return;
            }

            sessionData = data;
            countdownEndMs = new Date(sessionData.ends_at).getTime();
            countdownStarted = true;
            timerExpired = false;
            lastInningWindowOpen = false;
            lastInningUsed = false;
            oneMinuteWarned = false;
            renderDualFromSession(sessionData);
            lastShownSessionPositionIndex = null;
            maybeShowCurrentSessionPosition(true);
            startVisualTimer();
        }

        async function claimGuestSeatIfNeeded(data) {
            const myEmail = String(currentUser?.email || "").trim().toLowerCase();
            const guestEmail = String(data?.guest_email || "").trim().toLowerCase();
            if (!myEmail || myEmail !== guestEmail) return data;
            if (data.guest_user_id) return data;

            const name = data.guest_name || getDisplayName(currentUser);
            const { data: updated, error } = await supabaseClient
                .from("training_countdown_hs_sessions")
                .update({
                    guest_user_id: currentUser.id,
                    guest_name: name
                })
                .eq("id", data.id)
                .is("guest_user_id", null)
                .select("*")
                .single();

            if (error || !updated) return data;
            return updated;
        }

        async function loadDualSession() {
            const { data, error } = await supabaseClient
                .from("training_countdown_hs_sessions")
                .select("*")
                .eq("id", sessionId)
                .single();

            if (error || !data) {
                alert("Session konnte nicht geladen werden.");
                window.location.href = "training_countdown_hs.html";
                return false;
            }

            sessionData = await claimGuestSeatIfNeeded(data);

            const myEmail = String(currentUser?.email || "").trim().toLowerCase();
            const allowed =
                String(sessionData.host_user_id || "") === String(currentUser.id) ||
                String(sessionData.guest_user_id || "") === String(currentUser.id) ||
                (myEmail && myEmail === String(sessionData.guest_email || "").trim().toLowerCase());

            if (!allowed) {
                alert("Kein Zugriff auf diese Session.");
                window.location.href = "training_countdown_hs.html";
                return false;
            }

            isHost = String(sessionData.host_user_id || "") === String(currentUser.id);
            setText("modeValue", "Challenge (2P)");
            if (sessionData.countdown_started_at) {
                countdownEndMs = new Date(sessionData.ends_at).getTime();
            } else {
                countdownEndMs = Date.now() + Number(sessionData.duration_minutes || 0) * 60000;
            }
            renderDualFromSession(sessionData);
            if (sessionData.countdown_started_at) {
                lastShownSessionPositionIndex = null;
                maybeShowCurrentSessionPosition(true);
            }
            document.getElementById("endSessionBtn").style.display = isHost ? "inline-block" : "none";
            if (sessionData.status === "finished") {
                await persistCurrentChallengeResult("load_finished_session");
            }
            return true;
        }

        function bindRealtime() {
            if (!sessionData?.id) return;
            realtimeChannel = supabaseClient
                .channel("countdown_hs_" + sessionData.id)
                .on(
                    "postgres_changes",
                    {
                        event: "UPDATE",
                        schema: "public",
                        table: "training_countdown_hs_sessions",
                        filter: "id=eq." + sessionData.id
                    },
                    (payload) => {
                        if (!payload?.new) return;
                        applyIncomingSession(payload.new);
                    }
                )
                .on(
                    "postgres_changes",
                    {
                        event: "INSERT",
                        schema: "public",
                        table: "training_countdown_hs_messages",
                        filter: "session_id=eq." + sessionData.id
                    },
                    (payload) => {
                        if (!payload?.new) return;
                        const exists = chatMessages.some((x) => Number(x.id) === Number(payload.new.id));
                        if (exists) return;
                        chatMessages.push(payload.new);
                        renderChat();
                    }
                )
                .subscribe();
        }

        async function pollSession() {
            if (!sessionId) return;
            const { data, error } = await supabaseClient
                .from("training_countdown_hs_sessions")
                .select("*")
                .eq("id", sessionId)
                .single();
            if (error || !data) return;
            applyIncomingSession(data);
        }

        function startSessionPolling() {
            if (!sessionId) return;
            if (sessionPollId) clearInterval(sessionPollId);
            sessionPollId = setInterval(() => {
                pollSession();
            }, 2000);
        }

        function startChatPolling() {
            if (!sessionId) return;
            if (chatPollId) clearInterval(chatPollId);
            chatPollId = setInterval(() => {
                loadChatMessages();
            }, 2500);
        }

        async function initSolo() {
            const validChallengeSolo = !!soloDiscipline && [30, 45, 60].includes(soloMinutes);
            const validGoOnSolo = !!soloDiscipline && Number.isInteger(soloTarget) && soloTarget > 0;
            if ((isGoOnSolo && !validGoOnSolo) || (!isGoOnSolo && !validChallengeSolo)) {
                window.location.href = getBackTarget();
                return;
            }
            isDuelMode = false;
            applyModeLayout();
            setText("modeValue", isGoOnSolo ? "Go-on Partie" : "Challenge (Solo)");
            soloState.p1Disc = soloDiscipline;
            soloState.p1Target = isGoOnSolo ? soloTarget : 0;
            soloStartedAtIso = new Date().toISOString();
            countdownEndMs = isGoOnSolo ? 0 : (Date.now() + soloMinutes * 60000);
            timerExpired = false;
            lastInningWindowOpen = false;
            lastInningUsed = false;
            oneMinuteWarned = false;
            renderSolo();
            if (!isGoOnSolo) {
                startVisualTimer();
            }
        }

        async function initDual() {
            isDuelMode = true;
            applyModeLayout();
            const ok = await loadDualSession();
            if (!ok) return;
            const chatSection = document.getElementById("chatSection");
            if (chatSection) chatSection.style.display = "block";
            if (sessionData?.countdown_started_at) {
                startVisualTimer();
            } else {
                setText("timerValue", formatTime(Number(sessionData.duration_minutes || 0) * 60));
            }
            bindRealtime();
            startSessionPolling();
            await loadChatMessages();
            startChatPolling();
        }

        async function init() {
            currentUser = await requireAuth();
            if (!currentUser) return;
            updateFullscreenButton();
            document.addEventListener("pointerdown", primeAudio, { once: true });

            if (sessionId) {
                await initDual();
            } else {
                await initSolo();
            }

            document.getElementById("seriesInput").addEventListener("keydown", (e) => {
                if (e.key === "Enter") commitInning();
            });
            const chatInput = document.getElementById("chatInput");
            if (chatInput) {
                chatInput.addEventListener("keydown", (e) => {
                    if (e.key === "Enter") sendChatMessage();
                });
            }
        }

        window.addEventListener("beforeunload", () => {
            if (timerId) clearInterval(timerId);
            if (sessionPollId) clearInterval(sessionPollId);
            if (chatPollId) clearInterval(chatPollId);
            if (realtimeChannel) {
                supabaseClient.removeChannel(realtimeChannel);
            }
        });

        document.addEventListener("visibilitychange", () => {
            if (!document.hidden && isDuelMode) {
                pollSession();
                loadChatMessages();
            }
        });

        document.addEventListener("fullscreenchange", updateFullscreenButton);
        init();
    </script>
</body>
</html>
