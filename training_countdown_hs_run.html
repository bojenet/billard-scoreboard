<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Countdown HS Training</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(180deg, #0f1c3f, #0a122b);
            color: white;
        }

        .page {
            width: min(1160px, 94%);
            margin: 28px auto 32px;
        }

        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            background: linear-gradient(180deg, #162b66, #0f1c3f);
            border: 1px solid #2c4688;
            border-radius: 20px;
            padding: 12px 14px;
            box-shadow: 0 16px 34px rgba(0, 0, 0, 0.38);
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            border: none;
            border-radius: 12px;
            padding: 11px 17px;
            font-size: 16px;
            font-weight: 700;
            color: white;
            background: #1c3380;
            cursor: pointer;
            border: 1px solid #3458b8;
            transition: transform .15s ease, filter .15s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.06);
        }

        .btn.danger {
            background: #9f3434;
            border-color: #be5757;
        }

        .board {
            background: linear-gradient(180deg, #162b66, #0f1c3f);
            border: 1px solid #2d488f;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.5);
        }

        .meta {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            border-bottom: 1px solid #27417f;
        }

        .meta-item {
            padding: 14px 16px;
            border-right: 1px solid #27417f;
        }

        .meta-item:last-child {
            border-right: none;
        }

        .meta-label {
            font-size: 13px;
            opacity: 0.72;
            margin-bottom: 4px;
            letter-spacing: 1px;
        }

        .meta-value {
            font-size: 20px;
            font-weight: 700;
        }

        .timer-wrap {
            text-align: center;
            padding: 26px 14px 16px;
            border-bottom: 1px solid #27417f;
            background: radial-gradient(circle at 50% 0%, rgba(255, 216, 74, 0.1), transparent 58%);
        }

        .timer-label {
            opacity: 0.78;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .timer {
            font-size: 118px;
            font-weight: 800;
            letter-spacing: 1px;
            line-height: 1;
            color: #ffd84a;
            text-shadow: 0 8px 24px rgba(0, 0, 0, 0.45);
        }

        .duel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid #27417f;
        }

        .player-col {
            border-right: 1px solid #27417f;
        }

        .player-col:last-child {
            border-right: none;
        }

        .player-head {
            padding: 12px 14px;
            border-bottom: 1px solid #27417f;
            background: rgba(8, 16, 44, 0.42);
        }

        .player-name {
            font-size: 24px;
            font-weight: 800;
        }

        .player-disc {
            font-size: 14px;
            opacity: 0.76;
            margin-top: 2px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            border-bottom: 1px solid #27417f;
        }

        .stat {
            padding: 14px 10px;
            text-align: center;
            border-right: 1px solid #27417f;
        }

        .stat:last-child {
            border-right: none;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.72;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 34px;
            font-weight: 800;
        }

        .history {
            padding: 12px 14px 14px;
            min-height: 58px;
        }

        .history-title {
            font-size: 13px;
            opacity: 0.74;
            margin-bottom: 6px;
        }

        .history-value {
            font-size: 17px;
            line-height: 1.4;
            word-break: break-word;
        }

        .input-section {
            padding: 18px;
            display: grid;
            grid-template-columns: 220px 1fr;
            gap: 12px;
            align-items: center;
        }

        .series-input {
            width: 100%;
            box-sizing: border-box;
            font-size: 30px;
            font-weight: 700;
            border: none;
            border-radius: 12px;
            padding: 12px 14px;
            background: #f4f7ff;
            color: #1a1d2c;
            box-shadow: inset 0 0 0 2px #dce6ff;
        }

        .controls {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .action-btn {
            border: none;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 15px;
            font-weight: 700;
            color: white;
            background: #1c3380;
            cursor: pointer;
            border: 1px solid #3458b8;
            transition: transform .15s ease, filter .15s ease;
        }

        .action-btn.primary {
            background: #2f4fe0;
            border-color: #5572f0;
        }

        .action-btn:hover {
            transform: translateY(-1px);
            filter: brightness(1.06);
        }

        .readonly {
            opacity: 0.72;
            margin-top: 8px;
            font-size: 13px;
        }

        @media (max-width: 980px) {
            .meta {
                grid-template-columns: 1fr 1fr;
            }

            .duel {
                grid-template-columns: 1fr;
            }

            .player-col {
                border-right: none;
                border-bottom: 1px solid #27417f;
            }

            .player-col:last-child {
                border-bottom: none;
            }

            .timer {
                font-size: 84px;
            }

            .input-section {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <div class="topbar">
            <button class="btn" onclick="window.location.href='training_countdown_hs.html'">Zurück zum Setup</button>
            <button class="btn" id="startCountdownBtn" style="display:none;" onclick="startCountdownNow()">Countdown starten</button>
            <button class="btn" onclick="resetMyStats()">Meine Werte reset</button>
            <button class="btn danger" id="endSessionBtn" style="display:none;" onclick="endSession()">Session beenden</button>
        </div>

        <div class="board">
            <div class="meta">
                <div class="meta-item">
                    <div class="meta-label">Modus</div>
                    <div class="meta-value" id="modeValue">Countdown HS</div>
                </div>
                <div class="meta-item">
                    <div class="meta-label">Session</div>
                    <div class="meta-value" id="sessionValue">Solo</div>
                </div>
                <div class="meta-item">
                    <div class="meta-label">Status</div>
                    <div class="meta-value" id="statusValue">Aktiv</div>
                </div>
                <div class="meta-item">
                    <div class="meta-label">Dauer</div>
                    <div class="meta-value" id="durationValue">-</div>
                </div>
            </div>

            <div class="timer-wrap">
                <div class="timer-label">Restzeit</div>
                <div class="timer" id="timerValue">00:00</div>
            </div>

            <div class="duel">
                <div class="player-col">
                    <div class="player-head">
                        <div class="player-name" id="p1Name">Spieler 1</div>
                        <div class="player-disc" id="p1Disc">-</div>
                    </div>
                    <div class="stats">
                        <div class="stat"><div class="stat-label">Punkte</div><div class="stat-value" id="p1Score">0</div></div>
                        <div class="stat"><div class="stat-label">Aufnahmen</div><div class="stat-value" id="p1Innings">0</div></div>
                        <div class="stat"><div class="stat-label">HS</div><div class="stat-value" id="p1High">0</div></div>
                        <div class="stat"><div class="stat-label">DS</div><div class="stat-value" id="p1Avg">0.000</div></div>
                    </div>
                    <div class="history">
                        <div class="history-title">Serien</div>
                        <div class="history-value" id="p1History">-</div>
                    </div>
                </div>

                <div class="player-col">
                    <div class="player-head">
                        <div class="player-name" id="p2Name">Spieler 2</div>
                        <div class="player-disc" id="p2Disc">-</div>
                    </div>
                    <div class="stats">
                        <div class="stat"><div class="stat-label">Punkte</div><div class="stat-value" id="p2Score">0</div></div>
                        <div class="stat"><div class="stat-label">Aufnahmen</div><div class="stat-value" id="p2Innings">0</div></div>
                        <div class="stat"><div class="stat-label">HS</div><div class="stat-value" id="p2High">0</div></div>
                        <div class="stat"><div class="stat-label">DS</div><div class="stat-value" id="p2Avg">0.000</div></div>
                    </div>
                    <div class="history">
                        <div class="history-title">Serien</div>
                        <div class="history-value" id="p2History">-</div>
                    </div>
                </div>
            </div>

            <div class="input-section">
                <input id="seriesInput" class="series-input" type="number" min="0" value="0" />
                <div>
                    <div class="controls">
                        <button class="action-btn primary" onclick="commitInning()">Meine Aufnahme zählen</button>
                        <button class="action-btn" onclick="adjustSeries(1)">+1</button>
                        <button class="action-btn" onclick="adjustSeries(5)">+5</button>
                        <button class="action-btn" onclick="adjustSeries(10)">+10</button>
                        <button class="action-btn" onclick="adjustSeries(-1)">-1</button>
                    </div>
                    <div class="readonly" id="readonlyInfo"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/supabase.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const soloDiscipline = params.get("discipline") || "";
        const soloMinutes = Number(params.get("minutes") || 0);
        const sessionId = params.get("session") || "";

        let currentUser = null;
        let timerId = null;
        let countdownEndMs = 0;
        let countdownStarted = false;
        let isDuelMode = false;
        let isHost = false;
        let sessionData = null;
        let realtimeChannel = null;

        let soloState = {
            p1Name: "Du",
            p1Disc: "",
            p1Series: [],
            p1Score: 0,
            p1Innings: 0,
            p1High: 0
        };

        function parseSeries(value) {
            if (!Array.isArray(value)) return [];
            return value
                .map((x) => Number(x))
                .filter((x) => Number.isFinite(x) && x >= 0);
        }

        function formatTime(totalSeconds) {
            const safe = Math.max(0, totalSeconds);
            const min = Math.floor(safe / 60);
            const sec = safe % 60;
            return String(min).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
        }

        function avg(score, innings) {
            return innings > 0 ? (score / innings).toFixed(3) : "0.000";
        }

        function setText(id, value) {
            const el = document.getElementById(id);
            if (el) el.innerText = value;
        }

        function renderDualFromSession(data) {
            const p1Series = parseSeries(data.host_series);
            const p2Series = parseSeries(data.guest_series);

            setText("sessionValue", data.id ? data.id.slice(0, 8) : "-");
            const started = !!data.countdown_started_at;
            countdownStarted = started;
            setText("statusValue", data.status === "finished" ? "Beendet" : (started ? "Aktiv" : "Warten auf Start"));
            setText("durationValue", String(data.duration_minutes || 0) + " min");

            setText("p1Name", data.host_name || "Spieler 1");
            setText("p1Disc", data.host_discipline || "-");
            setText("p1Score", String(data.host_score || 0));
            setText("p1Innings", String(data.host_innings || 0));
            setText("p1High", String(data.host_high || 0));
            setText("p1Avg", avg(Number(data.host_score || 0), Number(data.host_innings || 0)));
            setText("p1History", p1Series.length ? p1Series.join(", ") : "-");

            setText("p2Name", data.guest_name || "Spieler 2");
            setText("p2Disc", data.guest_discipline || "-");
            setText("p2Score", String(data.guest_score || 0));
            setText("p2Innings", String(data.guest_innings || 0));
            setText("p2High", String(data.guest_high || 0));
            setText("p2Avg", avg(Number(data.guest_score || 0), Number(data.guest_innings || 0)));
            setText("p2History", p2Series.length ? p2Series.join(", ") : "-");

            if (!started) {
                setText("readonlyInfo", isHost
                    ? "Countdown ist noch nicht gestartet. Starte erst, wenn beide eingeloggt sind."
                    : "Warte auf den Start durch Spieler 1.");
            } else {
                setText("readonlyInfo", isHost
                    ? "Du bearbeitest Spieler 1. Spieler 2 bearbeitet seine eigene Seite."
                    : "Du bearbeitest Spieler 2. Spieler 1 bearbeitet seine eigene Seite.");
            }

            const startBtn = document.getElementById("startCountdownBtn");
            if (startBtn) {
                startBtn.style.display = isHost && data.status !== "finished" && !started ? "inline-block" : "none";
            }
        }

        function renderSolo() {
            setText("sessionValue", "Solo");
            setText("statusValue", "Aktiv");
            setText("durationValue", String(soloMinutes) + " min");

            setText("p1Name", "Du");
            setText("p1Disc", soloState.p1Disc || "-");
            setText("p1Score", String(soloState.p1Score));
            setText("p1Innings", String(soloState.p1Innings));
            setText("p1High", String(soloState.p1High));
            setText("p1Avg", avg(soloState.p1Score, soloState.p1Innings));
            setText("p1History", soloState.p1Series.length ? soloState.p1Series.join(", ") : "-");

            setText("p2Name", "-");
            setText("p2Disc", "-");
            setText("p2Score", "0");
            setText("p2Innings", "0");
            setText("p2High", "0");
            setText("p2Avg", "0.000");
            setText("p2History", "-");

            setText("readonlyInfo", "Solo-Modus: nur dein Ergebnis wird geführt.");
        }

        function startVisualTimer() {
            if (timerId) clearInterval(timerId);
            timerId = setInterval(async () => {
                const remaining = Math.max(0, Math.floor((countdownEndMs - Date.now()) / 1000));
                setText("timerValue", formatTime(remaining));
                if (remaining <= 0) {
                    clearInterval(timerId);
                    timerId = null;
                    if (isDuelMode && sessionData?.status !== "finished") {
                        await markSessionFinished();
                    }
                }
            }, 350);
        }

        async function markSessionFinished() {
            if (!sessionData?.id) return;
            const { data } = await supabaseClient
                .from("training_countdown_hs_sessions")
                .select("status")
                .eq("id", sessionData.id)
                .single();
            if (data?.status === "finished") return;
            await supabaseClient
                .from("training_countdown_hs_sessions")
                .update({ status: "finished" })
                .eq("id", sessionData.id);
        }

        function adjustSeries(delta) {
            const input = document.getElementById("seriesInput");
            let value = Number(input.value || 0);
            value += delta;
            if (value < 0) value = 0;
            input.value = value;
        }

        async function commitInning() {
            if (isDuelMode && sessionData?.status === "finished") return;
            if (isDuelMode && !countdownStarted) {
                alert("Countdown wurde noch nicht gestartet.");
                return;
            }
            const remaining = Math.max(0, Math.floor((countdownEndMs - Date.now()) / 1000));
            if (remaining <= 0) return;

            const input = document.getElementById("seriesInput");
            const series = Number(input.value || 0);
            if (!Number.isFinite(series) || series < 0) {
                alert("Bitte eine gültige Serie eingeben (mindestens 0).");
                return;
            }

            if (!isDuelMode) {
                soloState.p1Series.push(series);
                soloState.p1Innings += 1;
                soloState.p1Score += series;
                if (series > soloState.p1High) soloState.p1High = series;
                input.value = 0;
                renderSolo();
                return;
            }

            if (!sessionData?.id) return;

            if (isHost) {
                const nextSeries = parseSeries(sessionData.host_series);
                nextSeries.push(series);
                const nextScore = Number(sessionData.host_score || 0) + series;
                const nextInnings = Number(sessionData.host_innings || 0) + 1;
                const nextHigh = Math.max(Number(sessionData.host_high || 0), series);

                const { error } = await supabaseClient
                    .from("training_countdown_hs_sessions")
                    .update({
                        host_series: nextSeries,
                        host_score: nextScore,
                        host_innings: nextInnings,
                        host_high: nextHigh
                    })
                    .eq("id", sessionData.id);

                if (error) {
                    alert("Deine Serie konnte nicht gespeichert werden: " + error.message);
                    return;
                }

                sessionData.host_series = nextSeries;
                sessionData.host_score = nextScore;
                sessionData.host_innings = nextInnings;
                sessionData.host_high = nextHigh;
            } else {
                const nextSeries = parseSeries(sessionData.guest_series);
                nextSeries.push(series);
                const nextScore = Number(sessionData.guest_score || 0) + series;
                const nextInnings = Number(sessionData.guest_innings || 0) + 1;
                const nextHigh = Math.max(Number(sessionData.guest_high || 0), series);

                const { error } = await supabaseClient
                    .from("training_countdown_hs_sessions")
                    .update({
                        guest_series: nextSeries,
                        guest_score: nextScore,
                        guest_innings: nextInnings,
                        guest_high: nextHigh
                    })
                    .eq("id", sessionData.id);

                if (error) {
                    alert("Deine Serie konnte nicht gespeichert werden: " + error.message);
                    return;
                }

                sessionData.guest_series = nextSeries;
                sessionData.guest_score = nextScore;
                sessionData.guest_innings = nextInnings;
                sessionData.guest_high = nextHigh;
            }

            input.value = 0;
            renderDualFromSession(sessionData);
        }

        async function resetMyStats() {
            if (!confirm("Eigene Werte wirklich zurücksetzen?")) return;

            if (!isDuelMode) {
                soloState.p1Series = [];
                soloState.p1Score = 0;
                soloState.p1Innings = 0;
                soloState.p1High = 0;
                renderSolo();
                document.getElementById("seriesInput").value = 0;
                return;
            }

            if (!sessionData?.id) return;
            let update = {};
            if (isHost) {
                update = {
                    host_series: [],
                    host_score: 0,
                    host_innings: 0,
                    host_high: 0
                };
            } else {
                update = {
                    guest_series: [],
                    guest_score: 0,
                    guest_innings: 0,
                    guest_high: 0
                };
            }

            const { error } = await supabaseClient
                .from("training_countdown_hs_sessions")
                .update(update)
                .eq("id", sessionData.id);

            if (error) {
                alert("Reset fehlgeschlagen: " + error.message);
                return;
            }
            document.getElementById("seriesInput").value = 0;
        }

        async function endSession() {
            if (!isDuelMode || !isHost || !sessionData?.id) return;
            if (!confirm("Session für beide beenden?")) return;

            const { error } = await supabaseClient
                .from("training_countdown_hs_sessions")
                .update({ status: "finished" })
                .eq("id", sessionData.id);

            if (error) {
                alert("Session konnte nicht beendet werden: " + error.message);
            }
        }

        async function startCountdownNow() {
            if (!isDuelMode || !isHost || !sessionData?.id) return;
            if (sessionData.countdown_started_at) return;

            const now = new Date();
            const endsAt = new Date(now.getTime() + Number(sessionData.duration_minutes || 0) * 60000);

            const { data, error } = await supabaseClient
                .from("training_countdown_hs_sessions")
                .update({
                    countdown_started_at: now.toISOString(),
                    started_at: now.toISOString(),
                    ends_at: endsAt.toISOString()
                })
                .eq("id", sessionData.id)
                .is("countdown_started_at", null)
                .select("*")
                .single();

            if (error || !data) {
                alert("Countdown konnte nicht gestartet werden: " + (error?.message || "Unbekannter Fehler"));
                return;
            }

            sessionData = data;
            countdownEndMs = new Date(sessionData.ends_at).getTime();
            countdownStarted = true;
            renderDualFromSession(sessionData);
            startVisualTimer();
        }

        async function claimGuestSeatIfNeeded(data) {
            const myEmail = String(currentUser?.email || "").trim().toLowerCase();
            const guestEmail = String(data?.guest_email || "").trim().toLowerCase();
            if (!myEmail || myEmail !== guestEmail) return data;
            if (data.guest_user_id) return data;

            const name = data.guest_name || getDisplayName(currentUser);
            const { data: updated, error } = await supabaseClient
                .from("training_countdown_hs_sessions")
                .update({
                    guest_user_id: currentUser.id,
                    guest_name: name
                })
                .eq("id", data.id)
                .is("guest_user_id", null)
                .select("*")
                .single();

            if (error || !updated) return data;
            return updated;
        }

        async function loadDualSession() {
            const { data, error } = await supabaseClient
                .from("training_countdown_hs_sessions")
                .select("*")
                .eq("id", sessionId)
                .single();

            if (error || !data) {
                alert("Session konnte nicht geladen werden.");
                window.location.href = "training_countdown_hs.html";
                return false;
            }

            sessionData = await claimGuestSeatIfNeeded(data);

            const myEmail = String(currentUser?.email || "").trim().toLowerCase();
            const allowed =
                String(sessionData.host_user_id || "") === String(currentUser.id) ||
                String(sessionData.guest_user_id || "") === String(currentUser.id) ||
                (myEmail && myEmail === String(sessionData.guest_email || "").trim().toLowerCase());

            if (!allowed) {
                alert("Kein Zugriff auf diese Session.");
                window.location.href = "training_countdown_hs.html";
                return false;
            }

            isHost = String(sessionData.host_user_id || "") === String(currentUser.id);
            setText("modeValue", "Countdown HS (2P)");
            if (sessionData.countdown_started_at) {
                countdownEndMs = new Date(sessionData.ends_at).getTime();
            } else {
                countdownEndMs = Date.now() + Number(sessionData.duration_minutes || 0) * 60000;
            }
            renderDualFromSession(sessionData);
            document.getElementById("endSessionBtn").style.display = isHost ? "inline-block" : "none";
            return true;
        }

        function bindRealtime() {
            if (!sessionData?.id) return;
            realtimeChannel = supabaseClient
                .channel("countdown_hs_" + sessionData.id)
                .on(
                    "postgres_changes",
                    {
                        event: "UPDATE",
                        schema: "public",
                        table: "training_countdown_hs_sessions",
                        filter: "id=eq." + sessionData.id
                    },
                    (payload) => {
                        if (!payload?.new) return;
                        sessionData = payload.new;
                        if (sessionData.countdown_started_at) {
                            countdownEndMs = new Date(sessionData.ends_at).getTime();
                            if (!timerId) startVisualTimer();
                        } else {
                            countdownEndMs = Date.now() + Number(sessionData.duration_minutes || 0) * 60000;
                            setText("timerValue", formatTime(Number(sessionData.duration_minutes || 0) * 60));
                        }
                        renderDualFromSession(sessionData);
                    }
                )
                .subscribe();
        }

        async function initSolo() {
            if (!soloDiscipline || ![30, 45, 60].includes(soloMinutes)) {
                window.location.href = "training_countdown_hs.html";
                return;
            }
            isDuelMode = false;
            setText("modeValue", "Countdown HS (Solo)");
            soloState.p1Disc = soloDiscipline;
            countdownEndMs = Date.now() + soloMinutes * 60000;
            renderSolo();
            startVisualTimer();
        }

        async function initDual() {
            isDuelMode = true;
            const ok = await loadDualSession();
            if (!ok) return;
            if (sessionData?.countdown_started_at) {
                startVisualTimer();
            } else {
                setText("timerValue", formatTime(Number(sessionData.duration_minutes || 0) * 60));
            }
            bindRealtime();
        }

        async function init() {
            currentUser = await requireAuth();
            if (!currentUser) return;

            if (sessionId) {
                await initDual();
            } else {
                await initSolo();
            }

            document.getElementById("seriesInput").addEventListener("keydown", (e) => {
                if (e.key === "Enter") commitInning();
            });
        }

        window.addEventListener("beforeunload", () => {
            if (timerId) clearInterval(timerId);
            if (realtimeChannel) {
                supabaseClient.removeChannel(realtimeChannel);
            }
        });

        init();
    </script>
</body>
</html>
